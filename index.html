<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPER SURVIVORS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a12;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  color: #ddd;
  user-select: none;
  overflow: hidden;
}
canvas { display: block; }
#ui-overlay {
  position: fixed;
  top: 0; left: 0; right: 0;
  pointer-events: none;
  z-index: 10;
}
#top-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
}
#timer { font-size: 22px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; min-width: 60px; }
#wave-info { font-size: 13px; color: #f0c040; }
#kill-count { font-size: 13px; color: #aaa; margin-left: auto; }
#level-info { font-size: 13px; color: #7bf; }
#xp-bar-bg {
  position: fixed; top: 44px; left: 0; right: 0;
  height: 5px; background: rgba(255,255,255,0.06);
  z-index: 10;
}
#xp-bar-fill { height: 100%; background: linear-gradient(90deg, #4af, #7df); width: 0%; transition: width 0.15s; }
#hp-bar-wrap {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  width: min(360px, 80vw); z-index: 10; pointer-events: none;
}
#hp-label { font-size: 11px; color: #aaa; margin-bottom: 3px; text-align: center; }
#hp-bar-bg {
  height: 10px; background: rgba(255,255,255,0.08); border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
}
#hp-bar-fill { height: 100%; background: linear-gradient(90deg, #e44, #f66); border-radius: 5px; width: 100%; transition: width 0.2s; }
#weapon-icons {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 10; pointer-events: none;
}
.weapon-icon {
  width: 36px; height: 36px; border-radius: 6px;
  background: rgba(0,0,0,0.6); border: 1.5px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; backdrop-filter: blur(4px);
}
#upgrade-overlay {
  position: fixed; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 100;
  flex-direction: column;
  gap: 16px;
}
#upgrade-title { font-size: 28px; font-weight: 700; color: #ffe066; text-shadow: 0 0 20px rgba(255,224,102,0.4); }
#upgrade-subtitle { font-size: 14px; color: #aaa; margin-bottom: 8px; }
#upgrade-choices { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
.upgrade-card {
  width: 200px; padding: 18px 16px; background: rgba(20,20,35,0.9);
  border: 2px solid rgba(255,255,255,0.12); border-radius: 12px;
  cursor: pointer; transition: transform 0.15s, border-color 0.15s, background 0.15s;
  pointer-events: auto; text-align: center;
}
.upgrade-card:hover { transform: translateY(-4px); border-color: #ffe066; background: rgba(30,30,50,0.95); }
.uc-icon { font-size: 36px; margin-bottom: 8px; }
.uc-name { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.uc-desc { font-size: 12px; color: #999; line-height: 1.5; }
.uc-level { font-size: 11px; color: #7bf; margin-top: 6px; }
#game-over-overlay {
  position: fixed; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  z-index: 200;
  flex-direction: column;
  gap: 16px;
}
#go-title { font-size: 42px; font-weight: 700; color: #e44; text-shadow: 0 0 30px rgba(230,60,60,0.5); }
#go-stats { font-size: 15px; color: #aaa; text-align: center; line-height: 1.8; }
#go-restart {
  padding: 12px 36px; font-size: 16px; cursor: pointer;
  background: linear-gradient(135deg, #2a2a40, #1a1a2e);
  color: #fff; border: 2px solid rgba(255,255,255,0.15);
  border-radius: 8px; font-family: inherit;
  transition: border-color 0.15s, transform 0.15s;
  pointer-events: auto;
}
#go-restart:hover { border-color: #ffe066; transform: translateY(-2px); }
#start-overlay {
  position: fixed; inset: 0;
  display: flex;
  align-items: center; justify-content: center;
  background: rgba(6,6,14,0.95);
  backdrop-filter: blur(12px);
  z-index: 300;
  flex-direction: column;
  gap: 20px;
}
#start-title {
  font-size: clamp(36px, 8vw, 56px);
  font-weight: 800;
  background: linear-gradient(135deg, #f66, #fa0, #ff0, #4f4, #4af, #c4f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  letter-spacing: 3px;
}
#start-sub { font-size: 15px; color: #777; text-align: center; line-height: 1.7; }
#start-btn {
  padding: 14px 48px; font-size: 18px; cursor: pointer;
  background: linear-gradient(135deg, #e44, #f80);
  color: #fff; border: none; border-radius: 8px;
  font-family: inherit; font-weight: 600;
  transition: transform 0.15s, box-shadow 0.15s;
  pointer-events: auto;
}
#start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(230,60,60,0.4); }
#controls-hint {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(255,255,255,0.2); z-index: 10; pointer-events: none;
  white-space: nowrap;
}
@media (max-width: 640px) {
  .upgrade-card { width: 160px; padding: 14px 12px; }
  .uc-icon { font-size: 28px; }
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui-overlay">
  <div id="top-bar">
    <div id="timer">0:00</div>
    <div id="wave-info">WAVE 1</div>
    <div id="level-info">Lv.1</div>
    <div id="kill-count">KILLS: 0</div>
  </div>
</div>
<div id="xp-bar-bg"><div id="xp-bar-fill"></div></div>

<div id="hp-bar-wrap">
  <div id="hp-label">HP</div>
  <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
</div>

<div id="weapon-icons"></div>
<div id="controls-hint">WASD / Arrow Keys to move (or watch AI play)</div>

<div id="upgrade-overlay">
  <div id="upgrade-title">LEVEL UP!</div>
  <div id="upgrade-subtitle">Choose an upgrade</div>
  <div id="upgrade-choices"></div>
</div>

<div id="game-over-overlay">
  <div id="go-title">GAME OVER</div>
  <div id="go-stats"></div>
  <button id="go-restart">RETRY</button>
</div>

<div id="start-overlay">
  <div id="start-title">HYPER SURVIVORS</div>
  <div id="start-sub">Auto-battle roguelike<br>WASD to move, or watch the AI fight<br>Survive as long as you can</div>
  <button id="start-btn">START</button>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, camX = 0, camY = 0;
const WORLD = 3000;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ── Input ────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; keys[e.code] = false; });

// Mobile touch
let touchDir = { x: 0, y: 0 };
let touching = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touching = true;
  const t = e.touches[0];
  touchDir.sx = t.clientX; touchDir.sy = t.clientY;
  touchDir.x = 0; touchDir.y = 0;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchDir.x = t.clientX - touchDir.sx;
  touchDir.y = t.clientY - touchDir.sy;
}, { passive: false });
canvas.addEventListener('touchend', () => { touching = false; touchDir.x = 0; touchDir.y = 0; });

// ── Game State ───────────────────────────────────────────────
let player, enemies, projectiles, particles, xpGems, damageTexts;
let frame, gameTime, kills, gameOver, paused, started;
let waveNum, waveTimer, bossAlive;
let shakeF = 0, shakeMag = 0;
let pendingLevelUps = 0;
let playerControlled = false;

const PLAYER_SPEED = 3.2;
const PLAYER_MAX_HP = 100;
const XP_ATTRACT_RANGE = 80;
const XP_COLLECT_RANGE = 20;

// ── Weapon Definitions ──────────────────────────────────────
const WEAPONS = {
  orb: {
    name: 'Orbit',
    icon: '🔮',
    desc: 'Spinning orbs deal contact damage',
    maxLvl: 8,
    baseDmg: 12,
    baseCount: 2,
    baseSpeed: 0.03,
    baseRadius: 60,
  },
  bolt: {
    name: 'Magic Bolt',
    icon: '✨',
    desc: 'Auto-fires projectiles at nearest enemy',
    maxLvl: 8,
    baseDmg: 15,
    baseInterval: 50,
    baseSpeed: 7,
    basePierce: 1,
  },
  lightning: {
    name: 'Lightning',
    icon: '⚡',
    desc: 'Strikes a random nearby enemy',
    maxLvl: 8,
    baseDmg: 25,
    baseInterval: 90,
    baseChain: 1,
    baseRange: 200,
  },
  aura: {
    name: 'Holy Aura',
    icon: '🌟',
    desc: 'Damages all enemies in range',
    maxLvl: 8,
    baseDmg: 6,
    baseInterval: 30,
    baseRange: 70,
  },
  wave: {
    name: 'Shockwave',
    icon: '💥',
    desc: 'Periodic explosion around player',
    maxLvl: 8,
    baseDmg: 30,
    baseInterval: 150,
    baseRange: 110,
  },
};

const PASSIVES = {
  maxhp: { name: 'Vitality', icon: '❤️', desc: '+20% Max HP', maxLvl: 5 },
  speed: { name: 'Swiftness', icon: '👟', desc: '+12% Move Speed', maxLvl: 5 },
  damage: { name: 'Might', icon: '⚔️', desc: '+15% All Damage', maxLvl: 5 },
  armor: { name: 'Armor', icon: '🛡️', desc: '-10% Damage Taken', maxLvl: 5 },
  regen: { name: 'Recovery', icon: '💚', desc: '+0.15 HP/sec', maxLvl: 5 },
  attract: { name: 'Magnet', icon: '🧲', desc: '+30% XP Attract Range', maxLvl: 3 },
};

let playerWeapons = {}; // { orb: { level: 1, timer: 0 }, ... }
let playerPassives = {}; // { maxhp: 1, ... }

// ── Enemy Definitions ────────────────────────────────────────
function enemyDef(type, wave) {
  const s = 1 + wave * 0.08;
  const defs = {
    basic: { hp: 15*s, speed: 1.5, dmg: 8, r: 10, color: '#c44', xp: 1, score: 10 },
    fast: { hp: 8*s, speed: 3.2, dmg: 6, r: 8, color: '#e80', xp: 1, score: 15 },
    tank: { hp: 60*s, speed: 0.8, dmg: 15, r: 16, color: '#84c', xp: 3, score: 25 },
    swarm: { hp: 5*s, speed: 2.2, dmg: 4, r: 6, color: '#8c4', xp: 1, score: 5 },
    boss: { hp: 300*s, speed: 1.0, dmg: 25, r: 30, color: '#f4a', xp: 30, score: 200 },
  };
  return { ...defs[type], type };
}

// ── Helper ───────────────────────────────────────────────────
function dist(a, b) { const dx = b.x-a.x, dy = b.y-a.y; return Math.sqrt(dx*dx+dy*dy); }
function angle(a, b) { return Math.atan2(b.y-a.y, b.x-a.x); }
function lerp(a, b, t) { return a + (b-a) * t; }
function rnd(lo, hi) { return lo + Math.random() * (hi - lo); }
function rndInt(lo, hi) { return Math.floor(rnd(lo, hi+1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function getPlayerStats() {
  const dmgMult = 1 + (playerPassives.damage || 0) * 0.15;
  const spdMult = 1 + (playerPassives.speed || 0) * 0.12;
  const armorMult = 1 - (playerPassives.armor || 0) * 0.10;
  const maxHp = PLAYER_MAX_HP * (1 + (playerPassives.maxhp || 0) * 0.20);
  const regen = (playerPassives.regen || 0) * 0.15;
  const attractRange = XP_ATTRACT_RANGE * (1 + (playerPassives.attract || 0) * 0.30);
  return { dmgMult, spdMult, armorMult, maxHp, regen, attractRange };
}

// ── Particles / VFX ──────────────────────────────────────────
function burst(x, y, color, n, spd, size) {
  for (let i = 0; i < n && particles.length < 1500; i++) {
    const a = rnd(0, Math.PI*2), s = rnd(0.5, spd);
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1, decay: rnd(0.015, 0.045), color, r: rnd(1.5, size || 4) });
  }
}

function addDmgText(x, y, text, color) {
  damageTexts.push({ x, y, text, color, life: 1, vy: -1.5 });
}

function triggerShake(frames, mag) { shakeF = Math.max(shakeF, frames); shakeMag = Math.max(shakeMag, mag || 5); }

// ── XP & Leveling ────────────────────────────────────────────
function getXpToLevel(level) { return Math.floor(5 + level * 4 + level * level * 0.5); }

function addXp(amount) {
  player.xp += amount;
  while (player.xp >= player.xpNext) {
    player.xp -= player.xpNext;
    player.level++;
    player.xpNext = getXpToLevel(player.level);
    pendingLevelUps++;
  }
  if (pendingLevelUps > 0 && !paused) showUpgradeMenu();
}

function showUpgradeMenu() {
  paused = true;
  pendingLevelUps--;
  const choices = generateUpgradeChoices(3);
  const el = document.getElementById('upgrade-choices');
  el.innerHTML = '';
  choices.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'upgrade-card';
    const currentLvl = c.isWeapon ? (playerWeapons[c.key]?.level || 0) : (playerPassives[c.key] || 0);
    card.innerHTML = `
      <div class="uc-icon">${c.icon}</div>
      <div class="uc-name">${c.name}</div>
      <div class="uc-desc">${c.desc}</div>
      <div class="uc-level">Lv.${currentLvl} → Lv.${currentLvl + 1}</div>
    `;
    card.addEventListener('click', () => applyUpgrade(c));
    el.appendChild(card);
  });
  document.getElementById('upgrade-overlay').style.display = 'flex';
}

function generateUpgradeChoices(n) {
  const pool = [];
  // Weapons
  for (const [key, w] of Object.entries(WEAPONS)) {
    const lvl = playerWeapons[key]?.level || 0;
    if (lvl < w.maxLvl) {
      pool.push({ key, name: w.name, icon: w.icon, desc: w.desc, isWeapon: true });
    }
  }
  // Passives
  for (const [key, p] of Object.entries(PASSIVES)) {
    const lvl = playerPassives[key] || 0;
    if (lvl < p.maxLvl) {
      pool.push({ key, name: p.name, icon: p.icon, desc: p.desc, isWeapon: false });
    }
  }
  // Shuffle and pick
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, n);
}

function applyUpgrade(choice) {
  if (choice.isWeapon) {
    if (!playerWeapons[choice.key]) {
      playerWeapons[choice.key] = { level: 1, timer: 0, angle: 0 };
    } else {
      playerWeapons[choice.key].level++;
    }
  } else {
    playerPassives[choice.key] = (playerPassives[choice.key] || 0) + 1;
    if (choice.key === 'maxhp') {
      const stats = getPlayerStats();
      player.hp = Math.min(player.hp + 20, stats.maxHp);
    }
  }
  document.getElementById('upgrade-overlay').style.display = 'none';
  updateWeaponIcons();

  if (pendingLevelUps > 0) {
    setTimeout(() => showUpgradeMenu(), 200);
  } else {
    paused = false;
  }
}

function updateWeaponIcons() {
  const el = document.getElementById('weapon-icons');
  el.innerHTML = Object.entries(playerWeapons).map(([k, w]) =>
    `<div class="weapon-icon" title="${WEAPONS[k].name} Lv.${w.level}">${WEAPONS[k].icon}</div>`
  ).join('');
}

// ── Spawn Enemies ────────────────────────────────────────────
function spawnWave() {
  waveNum++;
  waveTimer = 0;

  const count = Math.min(8 + waveNum * 3, 60);
  const types = ['basic'];
  if (waveNum >= 2) types.push('fast');
  if (waveNum >= 3) types.push('swarm', 'swarm');
  if (waveNum >= 4) types.push('tank');
  if (waveNum >= 5) types.push('fast', 'swarm');

  for (let i = 0; i < count; i++) {
    const a = rnd(0, Math.PI * 2);
    const d = rnd(500, 700);
    const type = types[Math.floor(Math.random() * types.length)];
    const def = enemyDef(type, waveNum);
    enemies.push({
      ...def,
      x: player.x + Math.cos(a) * d,
      y: player.y + Math.sin(a) * d,
      maxHp: def.hp,
      flashTimer: 0,
      hitCooldown: 0,
    });
  }

  // Boss every 5 waves
  if (waveNum % 5 === 0) {
    const a = rnd(0, Math.PI * 2);
    const def = enemyDef('boss', waveNum);
    enemies.push({
      ...def,
      x: player.x + Math.cos(a) * 550,
      y: player.y + Math.sin(a) * 550,
      maxHp: def.hp,
      flashTimer: 0,
      hitCooldown: 0,
    });
    bossAlive = true;
  }
}

// Continuous ambient spawns between waves
function ambientSpawn() {
  if (enemies.length > 150) return;
  const maxAmbient = Math.min(3 + Math.floor(waveNum * 0.5), 8);
  for (let i = 0; i < maxAmbient; i++) {
    const a = rnd(0, Math.PI * 2);
    const d = rnd(500, 650);
    const types = ['basic', 'swarm'];
    if (waveNum >= 3) types.push('fast');
    const type = types[Math.floor(Math.random() * types.length)];
    const def = enemyDef(type, waveNum);
    enemies.push({
      ...def,
      x: player.x + Math.cos(a) * d,
      y: player.y + Math.sin(a) * d,
      maxHp: def.hp,
      flashTimer: 0,
      hitCooldown: 0,
    });
  }
}

// ── Weapon Logic ─────────────────────────────────────────────
function updateWeapons() {
  const stats = getPlayerStats();

  // Orb
  if (playerWeapons.orb) {
    const w = playerWeapons.orb;
    const count = w.level + WEAPONS.orb.baseCount - 1;
    const dmg = WEAPONS.orb.baseDmg * (1 + w.level * 0.3) * stats.dmgMult;
    const radius = WEAPONS.orb.baseRadius + w.level * 8;
    const speed = WEAPONS.orb.baseSpeed + w.level * 0.003;
    w.angle += speed;

    for (let i = 0; i < count; i++) {
      const a = w.angle + (Math.PI * 2 / count) * i;
      const ox = player.x + Math.cos(a) * radius;
      const oy = player.y + Math.sin(a) * radius;

      enemies.forEach(e => {
        if (dist({ x: ox, y: oy }, e) < e.r + 10) {
          if (e.hitCooldown <= 0) {
            damageEnemy(e, dmg, ox, oy);
            e.hitCooldown = 15;
          }
        }
      });
    }
  }

  // Bolt
  if (playerWeapons.bolt) {
    const w = playerWeapons.bolt;
    const interval = Math.max(15, WEAPONS.bolt.baseInterval - w.level * 5);
    w.timer++;
    if (w.timer >= interval) {
      w.timer = 0;
      const targets = enemies.filter(e => dist(player, e) < 350).sort((a, b) => dist(player, a) - dist(player, b));
      const shotCount = Math.min(1 + Math.floor(w.level / 3), 3);
      for (let i = 0; i < Math.min(shotCount, targets.length); i++) {
        const t = targets[i];
        const a = angle(player, t);
        const dmg = WEAPONS.bolt.baseDmg * (1 + w.level * 0.25) * stats.dmgMult;
        const pierce = WEAPONS.bolt.basePierce + Math.floor(w.level / 2);
        projectiles.push({
          x: player.x, y: player.y,
          vx: Math.cos(a) * WEAPONS.bolt.baseSpeed,
          vy: Math.sin(a) * WEAPONS.bolt.baseSpeed,
          dmg, pierce, r: 4 + w.level * 0.5,
          color: '#4af', life: 120,
          hit: new Set(),
        });
      }
    }
  }

  // Lightning
  if (playerWeapons.lightning) {
    const w = playerWeapons.lightning;
    const interval = Math.max(30, WEAPONS.lightning.baseInterval - w.level * 7);
    w.timer++;
    if (w.timer >= interval) {
      w.timer = 0;
      const range = WEAPONS.lightning.baseRange + w.level * 25;
      const chains = WEAPONS.lightning.baseChain + Math.floor(w.level / 2);
      const dmg = WEAPONS.lightning.baseDmg * (1 + w.level * 0.3) * stats.dmgMult;

      let targets = enemies.filter(e => dist(player, e) < range);
      if (targets.length > 0) {
        let current = targets[Math.floor(Math.random() * targets.length)];
        const struck = new Set();
        let prev = { x: player.x, y: player.y };

        for (let c = 0; c < chains && current; c++) {
          struck.add(current);
          damageEnemy(current, dmg * (c === 0 ? 1 : 0.7), current.x, current.y);

          // Lightning visual
          drawLightningBolt(prev.x, prev.y, current.x, current.y, '#aaf');
          burst(current.x, current.y, '#88f', 8, 3, 3);
          triggerShake(4, 2);

          prev = current;
          targets = enemies.filter(e => !struck.has(e) && dist(current, e) < range * 0.7);
          current = targets.length > 0 ? targets[Math.floor(Math.random() * targets.length)] : null;
        }
      }
    }
  }

  // Aura
  if (playerWeapons.aura) {
    const w = playerWeapons.aura;
    const interval = Math.max(10, WEAPONS.aura.baseInterval - w.level * 2);
    w.timer++;
    if (w.timer >= interval) {
      w.timer = 0;
      const range = WEAPONS.aura.baseRange + w.level * 10;
      const dmg = WEAPONS.aura.baseDmg * (1 + w.level * 0.25) * stats.dmgMult;
      enemies.forEach(e => {
        if (dist(player, e) < range + e.r) {
          damageEnemy(e, dmg, e.x, e.y);
        }
      });
    }
  }

  // Shockwave
  if (playerWeapons.wave) {
    const w = playerWeapons.wave;
    const interval = Math.max(60, WEAPONS.wave.baseInterval - w.level * 10);
    w.timer++;
    if (w.timer >= interval) {
      w.timer = 0;
      const range = WEAPONS.wave.baseRange + w.level * 15;
      const dmg = WEAPONS.wave.baseDmg * (1 + w.level * 0.35) * stats.dmgMult;
      enemies.forEach(e => {
        if (dist(player, e) < range + e.r) {
          damageEnemy(e, dmg, e.x, e.y);
          const a = angle(player, e);
          e.x += Math.cos(a) * 30;
          e.y += Math.sin(a) * 30;
        }
      });
      // Visual
      burst(player.x, player.y, '#fa4', 30, 6, 5);
      triggerShake(8, 4);
    }
  }
}

let lightningBolts = [];
function drawLightningBolt(x1, y1, x2, y2, color) {
  lightningBolts.push({ x1, y1, x2, y2, color, life: 12 });
}

function damageEnemy(e, dmg, x, y) {
  e.hp -= dmg;
  e.flashTimer = 6;
  addDmgText(x + rnd(-10, 10), y - e.r, Math.ceil(dmg).toString(), '#fff');
  if (e.hp <= 0) {
    kills++;
    burst(e.x, e.y, e.color, 12, 4, 4);
    // Drop XP gems
    const gemCount = e.type === 'boss' ? 10 : (e.xp >= 3 ? 3 : 1);
    const xpEach = e.xp / gemCount;
    for (let i = 0; i < gemCount; i++) {
      xpGems.push({
        x: e.x + rnd(-15, 15), y: e.y + rnd(-15, 15),
        xp: xpEach,
        r: xpEach >= 5 ? 6 : (xpEach >= 2 ? 4.5 : 3),
        color: xpEach >= 5 ? '#f4a' : (xpEach >= 2 ? '#4af' : '#4f4'),
        life: 600,
      });
    }
    if (e.type === 'boss') {
      triggerShake(20, 8);
      burst(e.x, e.y, '#fff', 40, 8, 6);
      burst(e.x, e.y, e.color, 30, 6, 5);
      bossAlive = false;
    }
  }
}

// ── AI Movement ──────────────────────────────────────────────
function aiMove() {
  // Simple AI: move toward nearest XP if safe, otherwise dodge enemies
  let dx = 0, dy = 0;

  // Threat avoidance
  let threatX = 0, threatY = 0, threatCount = 0;
  enemies.forEach(e => {
    const d = dist(player, e);
    if (d < 120) {
      const a = angle(e, player);
      const force = (120 - d) / 120;
      threatX += Math.cos(a) * force;
      threatY += Math.sin(a) * force;
      threatCount++;
    }
  });

  if (threatCount > 2) {
    // Flee from danger
    const mag = Math.sqrt(threatX*threatX + threatY*threatY) || 1;
    dx = threatX / mag;
    dy = threatY / mag;
  } else {
    // Move toward nearest XP gem
    let nearest = null, nearDist = Infinity;
    xpGems.forEach(g => {
      const d = dist(player, g);
      if (d < nearDist) { nearDist = d; nearest = g; }
    });

    if (nearest && nearDist > XP_COLLECT_RANGE) {
      const a = angle(player, nearest);
      dx = Math.cos(a);
      dy = Math.sin(a);
    } else if (enemies.length > 0) {
      // Kite: move perpendicular to nearest enemy cluster
      let ne = null, ned = Infinity;
      enemies.forEach(e => { const d = dist(player, e); if (d < ned) { ned = d; ne = e; }});
      if (ne) {
        const a = angle(ne, player);
        // Slightly toward enemies to stay in combat range
        if (ned > 200) {
          dx = -Math.cos(a); dy = -Math.sin(a);
        } else {
          // Strafe perpendicular
          dx = Math.cos(a + Math.PI * 0.4);
          dy = Math.sin(a + Math.PI * 0.4);
        }
      }
    }

    // Add threat avoidance
    if (threatCount > 0) {
      const mag = Math.sqrt(threatX*threatX + threatY*threatY) || 1;
      dx += (threatX / mag) * 0.7;
      dy += (threatY / mag) * 0.7;
    }
  }

  // Boundary avoidance
  const margin = 100;
  if (player.x < -WORLD/2 + margin) dx += 0.5;
  if (player.x > WORLD/2 - margin) dx -= 0.5;
  if (player.y < -WORLD/2 + margin) dy += 0.5;
  if (player.y > WORLD/2 - margin) dy -= 0.5;

  const mag = Math.sqrt(dx*dx + dy*dy) || 1;
  return { x: dx/mag, y: dy/mag };
}

// ── Init ─────────────────────────────────────────────────────
function init() {
  player = {
    x: 0, y: 0, hp: PLAYER_MAX_HP, level: 1,
    xp: 0, xpNext: getXpToLevel(1),
    invincible: 0,
  };
  enemies = []; projectiles = []; particles = []; xpGems = []; damageTexts = [];
  lightningBolts = [];
  frame = 0; gameTime = 0; kills = 0; gameOver = false; paused = false;
  waveNum = 0; waveTimer = 0; bossAlive = false;
  shakeF = 0; shakeMag = 0; pendingLevelUps = 0;
  playerControlled = false;

  playerWeapons = {};
  playerPassives = {};
  // Start with orb
  playerWeapons.orb = { level: 1, timer: 0, angle: 0 };

  updateWeaponIcons();
  document.getElementById('game-over-overlay').style.display = 'none';
  document.getElementById('upgrade-overlay').style.display = 'none';

  spawnWave();
}

// ── Update ───────────────────────────────────────────────────
function update() {
  if (gameOver || paused) return;
  frame++;
  gameTime = frame / 60;

  const stats = getPlayerStats();

  // Player movement
  let mdx = 0, mdy = 0;
  if (keys['w'] || keys['W'] || keys['ArrowUp']) { mdy = -1; playerControlled = true; }
  if (keys['s'] || keys['S'] || keys['ArrowDown']) { mdy = 1; playerControlled = true; }
  if (keys['a'] || keys['A'] || keys['ArrowLeft']) { mdx = -1; playerControlled = true; }
  if (keys['d'] || keys['D'] || keys['ArrowRight']) { mdx = 1; playerControlled = true; }

  if (touching && (Math.abs(touchDir.x) > 10 || Math.abs(touchDir.y) > 10)) {
    mdx = touchDir.x; mdy = touchDir.y;
    playerControlled = true;
  }

  // AI takes over if no input for a while
  if (mdx === 0 && mdy === 0) {
    if (playerControlled && frame % 120 === 0) playerControlled = false;
    if (!playerControlled) {
      const ai = aiMove();
      mdx = ai.x; mdy = ai.y;
    }
  }

  const mmag = Math.sqrt(mdx*mdx + mdy*mdy) || 1;
  const speed = PLAYER_SPEED * stats.spdMult;
  player.x += (mdx/mmag) * speed;
  player.y += (mdy/mmag) * speed;
  player.x = clamp(player.x, -WORLD/2, WORLD/2);
  player.y = clamp(player.y, -WORLD/2, WORLD/2);

  if (player.invincible > 0) player.invincible--;

  // HP regen
  if (stats.regen > 0 && player.hp < stats.maxHp) {
    player.hp = Math.min(stats.maxHp, player.hp + stats.regen / 60);
  }

  // Waves
  waveTimer++;
  if (waveTimer >= 900 + waveNum * 60) { // ~15s + scaling
    spawnWave();
  }

  // Ambient spawns
  if (frame % 90 === 0) ambientSpawn();

  // Update weapons
  updateWeapons();

  // Update projectiles
  projectiles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    enemies.forEach(e => {
      if (p.pierce <= 0 || p.hit.has(e)) return;
      if (dist(p, e) < e.r + p.r) {
        damageEnemy(e, p.dmg, e.x, e.y);
        p.hit.add(e);
        p.pierce--;
        burst(e.x, e.y, p.color, 5, 2, 3);
      }
    });
  });
  projectiles = projectiles.filter(p => p.life > 0 && p.pierce > 0);

  // Update enemies
  enemies.forEach(e => {
    if (e.hp <= 0) return;
    const a = angle(e, player);
    e.x += Math.cos(a) * e.speed;
    e.y += Math.sin(a) * e.speed;
    if (e.flashTimer > 0) e.flashTimer--;
    if (e.hitCooldown > 0) e.hitCooldown--;

    // Contact damage to player
    if (dist(e, player) < e.r + 12 && player.invincible <= 0) {
      const dmg = e.dmg * stats.armorMult;
      player.hp -= dmg;
      player.invincible = 30;
      addDmgText(player.x, player.y - 20, Math.ceil(dmg).toString(), '#f44');
      burst(player.x, player.y, '#f44', 8, 3, 3);
      triggerShake(6, 3);
    }
  });
  enemies = enemies.filter(e => e.hp > 0);

  // XP gems
  xpGems.forEach(g => {
    g.life--;
    const d = dist(player, g);
    if (d < stats.attractRange) {
      const a = angle(g, player);
      const pull = Math.min(8, (stats.attractRange - d) / stats.attractRange * 8);
      g.x += Math.cos(a) * pull;
      g.y += Math.sin(a) * pull;
    }
    if (d < XP_COLLECT_RANGE) {
      addXp(g.xp);
      g.life = 0;
    }
  });
  xpGems = xpGems.filter(g => g.life > 0);

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  // Damage texts
  damageTexts.forEach(t => { t.y += t.vy; t.life -= 0.025; });
  damageTexts = damageTexts.filter(t => t.life > 0);

  // Lightning bolts
  lightningBolts.forEach(b => b.life--);
  lightningBolts = lightningBolts.filter(b => b.life > 0);

  if (shakeF > 0) { shakeF--; if (shakeF === 0) shakeMag = 0; }

  // Check death
  if (player.hp <= 0) {
    gameOver = true;
    burst(player.x, player.y, '#f44', 50, 8, 6);
    burst(player.x, player.y, '#fff', 30, 6, 5);
    triggerShake(30, 10);
    showGameOver();
  }

  // UI updates
  if (frame % 6 === 0) updateUI();
}

function showGameOver() {
  const el = document.getElementById('game-over-overlay');
  const min = Math.floor(gameTime / 60);
  const sec = Math.floor(gameTime % 60);
  document.getElementById('go-stats').innerHTML =
    `Time: ${min}:${sec.toString().padStart(2,'0')}<br>` +
    `Wave: ${waveNum}<br>` +
    `Kills: ${kills}<br>` +
    `Level: ${player.level}<br>` +
    `Weapons: ${Object.keys(playerWeapons).map(k => WEAPONS[k].icon).join(' ')}`;
  el.style.display = 'flex';
}

function updateUI() {
  const stats = getPlayerStats();
  const min = Math.floor(gameTime / 60);
  const sec = Math.floor(gameTime % 60);
  document.getElementById('timer').textContent = `${min}:${sec.toString().padStart(2,'0')}`;
  document.getElementById('wave-info').textContent = `WAVE ${waveNum}`;
  document.getElementById('kill-count').textContent = `KILLS: ${kills}`;
  document.getElementById('level-info').textContent = `Lv.${player.level}`;
  document.getElementById('xp-bar-fill').style.width = (player.xp / player.xpNext * 100) + '%';
  document.getElementById('hp-bar-fill').style.width = (Math.max(0, player.hp) / stats.maxHp * 100) + '%';
  document.getElementById('hp-label').textContent = `HP: ${Math.ceil(Math.max(0, player.hp))} / ${Math.ceil(stats.maxHp)}`;
}

// ── Drawing ──────────────────────────────────────────────────
function draw() {
  // Camera
  camX = lerp(camX, player.x - W/2, 0.08);
  camY = lerp(camY, player.y - H/2, 0.08);

  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  if (shakeF > 0) {
    ctx.translate(rnd(-shakeMag, shakeMag), rnd(-shakeMag, shakeMag));
  }
  ctx.translate(-camX, -camY);

  // Grid
  const gridSize = 80;
  ctx.strokeStyle = '#14141e';
  ctx.lineWidth = 1;
  const startX = Math.floor((camX) / gridSize) * gridSize;
  const startY = Math.floor((camY) / gridSize) * gridSize;
  for (let x = startX; x < camX + W + gridSize; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, camY); ctx.lineTo(x, camY + H); ctx.stroke();
  }
  for (let y = startY; y < camY + H + gridSize; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(camX, y); ctx.lineTo(camX + W, y); ctx.stroke();
  }

  // World bounds
  ctx.strokeStyle = '#2a1a1a';
  ctx.lineWidth = 3;
  ctx.strokeRect(-WORLD/2, -WORLD/2, WORLD, WORLD);

  // XP gems
  xpGems.forEach(g => {
    const pulse = 0.7 + 0.3 * Math.sin(frame * 0.08 + g.x);
    ctx.save();
    ctx.shadowColor = g.color;
    ctx.shadowBlur = 8 * pulse;
    ctx.beginPath();
    // Diamond shape
    ctx.moveTo(g.x, g.y - g.r);
    ctx.lineTo(g.x + g.r * 0.7, g.y);
    ctx.lineTo(g.x, g.y + g.r);
    ctx.lineTo(g.x - g.r * 0.7, g.y);
    ctx.closePath();
    ctx.fillStyle = g.color;
    ctx.globalAlpha = pulse;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life * p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Lightning bolts
  lightningBolts.forEach(b => {
    ctx.globalAlpha = b.life / 12;
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 2 + b.life / 4;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    // Jagged line
    const dx = b.x2 - b.x1, dy = b.y2 - b.y1;
    const steps = 5;
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const jx = i < steps ? rnd(-15, 15) : 0;
      const jy = i < steps ? rnd(-15, 15) : 0;
      ctx.lineTo(b.x1 + dx * t + jx, b.y1 + dy * t + jy);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  });

  // Enemies
  enemies.forEach(e => {
    if (e.hp <= 0) return;
    const sx = e.x - camX, sy = e.y - camY;
    if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) return;

    ctx.save();
    if (e.flashTimer > 0) {
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 15;
    }

    // Body
    ctx.beginPath();
    if (e.type === 'boss') {
      // Boss: octagon
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 / 8) * i + frame * 0.01;
        const px = e.x + Math.cos(a) * e.r;
        const py = e.y + Math.sin(a) * e.r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
    } else if (e.type === 'tank') {
      // Tank: square-ish
      ctx.rect(e.x - e.r, e.y - e.r, e.r*2, e.r*2);
    } else if (e.type === 'fast') {
      // Fast: triangle
      ctx.moveTo(e.x, e.y - e.r);
      ctx.lineTo(e.x + e.r, e.y + e.r * 0.7);
      ctx.lineTo(e.x - e.r, e.y + e.r * 0.7);
      ctx.closePath();
    } else {
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    }
    ctx.fillStyle = e.flashTimer > 0 ? '#fff' : e.color;
    ctx.fill();
    ctx.restore();

    // HP bar for tanks and bosses
    if (e.type === 'tank' || e.type === 'boss') {
      const bw = e.r * 2.5, bh = 3;
      const bx = e.x - bw/2, by = e.y - e.r - 8;
      ctx.fillStyle = '#111';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = e.type === 'boss' ? '#f4a' : '#84c';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);
    }
  });

  // Projectiles
  projectiles.forEach(p => {
    ctx.save();
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  });

  // Aura visual
  if (playerWeapons.aura) {
    const w = playerWeapons.aura;
    const range = WEAPONS.aura.baseRange + w.level * 10;
    const pulse = 0.08 + 0.04 * Math.sin(frame * 0.06);
    ctx.beginPath();
    ctx.arc(player.x, player.y, range, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 220, 80, ${pulse})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(255, 220, 80, ${pulse * 2})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Orb visual
  if (playerWeapons.orb) {
    const w = playerWeapons.orb;
    const count = w.level + WEAPONS.orb.baseCount - 1;
    const radius = WEAPONS.orb.baseRadius + w.level * 8;

    // Orbit trail
    ctx.beginPath();
    ctx.arc(player.x, player.y, radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(120, 80, 255, 0.08)';
    ctx.lineWidth = 10;
    ctx.stroke();

    for (let i = 0; i < count; i++) {
      const a = w.angle + (Math.PI * 2 / count) * i;
      const ox = player.x + Math.cos(a) * radius;
      const oy = player.y + Math.sin(a) * radius;
      ctx.save();
      ctx.shadowColor = '#a6f';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(ox, oy, 8 + w.level, 0, Math.PI * 2);
      ctx.fillStyle = '#a6f';
      ctx.fill();
      ctx.restore();
    }
  }

  // Shockwave visual
  if (playerWeapons.wave) {
    const w = playerWeapons.wave;
    const interval = Math.max(60, WEAPONS.wave.baseInterval - w.level * 10);
    const progress = w.timer / interval;
    if (progress > 0.85) {
      const range = WEAPONS.wave.baseRange + w.level * 15;
      const pulse = (progress - 0.85) / 0.15;
      ctx.beginPath();
      ctx.arc(player.x, player.y, range * pulse, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 160, 60, ${(1 - pulse) * 0.4})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }

  // Player
  const blink = player.invincible > 0 && Math.floor(frame / 3) % 2;
  if (!blink) {
    ctx.save();
    ctx.shadowColor = '#4af';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(player.x, player.y, 12, 0, Math.PI * 2);
    ctx.fillStyle = '#4af';
    ctx.fill();
    ctx.restore();

    // Inner glow
    ctx.beginPath();
    ctx.arc(player.x, player.y, 7, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  // Damage texts
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
  damageTexts.forEach(t => {
    ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color;
    ctx.fillText(t.text, t.x, t.y);
  });
  ctx.globalAlpha = 1;

  ctx.restore();

  // Minimap
  drawMinimap();

  // Enemy count warning off-screen indicators
  drawOffscreenIndicators();
}

function drawMinimap() {
  const size = 100;
  const mx = W - size - 10, my = 55;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(mx, my, size, size);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx, my, size, size);

  const scale = size / WORLD;

  // Enemies as dots
  enemies.forEach(e => {
    const ex = mx + (e.x + WORLD/2) * scale;
    const ey = my + (e.y + WORLD/2) * scale;
    ctx.fillStyle = e.type === 'boss' ? '#f4a' : 'rgba(200,60,60,0.7)';
    ctx.fillRect(ex - 1, ey - 1, e.type === 'boss' ? 3 : 2, e.type === 'boss' ? 3 : 2);
  });

  // Player
  const px = mx + (player.x + WORLD/2) * scale;
  const py = my + (player.y + WORLD/2) * scale;
  ctx.fillStyle = '#4af';
  ctx.fillRect(px - 2, py - 2, 4, 4);
}

function drawOffscreenIndicators() {
  enemies.forEach(e => {
    if (e.type !== 'boss' && e.type !== 'tank') return;
    const sx = e.x - camX, sy = e.y - camY;
    if (sx > -20 && sx < W + 20 && sy > -20 && sy < H + 20) return;

    // Arrow at screen edge
    const cx = W/2, cy = H/2;
    const a = Math.atan2(sy - cy, sx - cx);
    const margin = 30;
    let ix = cx + Math.cos(a) * (W/2 - margin);
    let iy = cy + Math.sin(a) * (H/2 - margin);
    ix = clamp(ix, margin, W - margin);
    iy = clamp(iy, margin, H - margin);

    ctx.save();
    ctx.translate(ix, iy);
    ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-6, -5);
    ctx.lineTo(-6, 5);
    ctx.closePath();
    ctx.fillStyle = e.type === 'boss' ? '#f4a' : '#84c';
    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(frame * 0.08);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

// ── Main Loop ────────────────────────────────────────────────
let started = false;

function loop() {
  if (started) {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-overlay').style.display = 'none';
  started = true;
  init();
});

document.getElementById('go-restart').addEventListener('click', () => {
  init();
});

loop();
</script>
