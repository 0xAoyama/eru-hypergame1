<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PARALLEL TREASURE — 並行世界トレハン</title>
<style>
@font-face{font-family:'DotFont';src:local('Courier New'),local('monospace');}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#ccc;font-family:'DotFont','Courier New',monospace;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;overflow-y:auto;-webkit-font-smoothing:none;}
#app{width:100%;max-width:420px;min-height:100vh;background:#0a0c1a;border-left:4px solid #e8e8e0;border-right:4px solid #e8e8e0;position:relative;display:flex;flex-direction:column;overflow:hidden;image-rendering:pixelated;}

/* Field canvas */
#field-wrap{position:relative;flex-shrink:0;border-bottom:3px solid #e8e8e0;}
#field-canvas{display:block;width:100%;height:180px;background:#87CEEB;}

/* Controls overlay on field */
#field-controls{position:absolute;top:4px;right:4px;display:flex;gap:3px;align-items:center;z-index:10;}
#field-controls button{background:rgba(20,24,48,0.75);border:2px solid #3a3d50;color:#aab;padding:2px 6px;font-size:10px;font-family:inherit;cursor:pointer;backdrop-filter:blur(2px);}
#field-controls button:hover{border-color:#fa0;color:#fff;}
#field-controls button.active{border-color:#fa0;color:#fa0;}

/* Distance display */
#dist-display{position:absolute;bottom:6px;right:8px;font-size:12px;font-weight:900;color:#fa0;text-shadow:1px 1px 0 #000,2px 2px 0 #000;}

/* Status comparison panel */
#status-panel{display:flex;gap:0;border-bottom:3px solid #e8e8e0;flex-shrink:0;}
.status-side{flex:1;padding:6px 8px;background:#111430;}
.status-side:first-child{border-right:2px solid #e8e8e0;}
.status-label{font-size:9px;font-weight:900;color:#fa0;letter-spacing:2px;margin-bottom:3px;text-align:center;}
.status-name{font-size:11px;font-weight:900;color:#fff;text-align:center;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-row{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:1px 0;}
.stat-key{color:#667a9a;}
.stat-val{color:#dde;font-weight:700;}
.stat-val.hp-low{color:#f66;}
.hp-bar-wrap{height:6px;background:#1a1a30;margin:2px 0 3px;border:1px solid #2a2d40;}
.hp-bar{height:100%;transition:width 0.2s;}
.hp-bar.player{background:#4c8;}
.hp-bar.enemy{background:#f44;}
.hp-bar.boss{background:#f4f;}

/* Stat +/- buttons inline */
.stat-alloc{display:flex;align-items:center;gap:1px;}
.stat-alloc .sp-btn{background:none;border:1px solid #3a3d50;color:#667a9a;width:14px;height:14px;font-size:10px;font-family:inherit;cursor:pointer;padding:0;line-height:12px;text-align:center;}
.stat-alloc .sp-btn:hover{border-color:#fa0;color:#fa0;}
.stat-alloc .sp-btn.can-alloc{border-color:#fa0;color:#fa0;}
.sp-label{font-size:9px;color:#fa0;font-weight:900;text-align:center;padding:1px 0;}

/* Inventory panel */
#inv-panel{border-bottom:3px solid #e8e8e0;padding:5px 8px;background:#0e1025;flex-shrink:0;}
#inv-panel .panel-title{font-size:9px;font-weight:900;color:#889;letter-spacing:2px;margin-bottom:3px;}
#inv-grid{display:flex;gap:3px;flex-wrap:wrap;}
.inv-slot{width:36px;height:36px;background:#161830;border:2px solid #2a2d40;font-size:7px;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;position:relative;overflow:hidden;}
.inv-slot:hover{border-color:#fa0;}
.inv-slot .inv-icon{font-size:14px;line-height:1;}
.inv-slot .inv-name{font-size:6px;color:#aab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:32px;}
.inv-slot.empty{cursor:default;opacity:0.3;}
.inv-slot.empty:hover{border-color:#2a2d40;}

/* Equip panel */
#equip-panel{border-bottom:3px solid #e8e8e0;padding:6px 8px;background:#0e1025;flex-shrink:0;}
#equip-panel .panel-title{font-size:9px;font-weight:900;color:#889;letter-spacing:2px;margin-bottom:4px;}
#equip-slots{display:flex;gap:4px;flex-wrap:wrap;}
.eq-slot-box{flex:1;min-width:60px;background:#161830;border:2px solid #2a2d40;padding:4px;font-size:9px;text-align:center;}
.eq-slot-box .eq-icon{font-size:16px;display:block;margin-bottom:2px;}
.eq-slot-box .eq-label{color:#556;font-size:8px;}
.eq-slot-box .eq-name{color:#dde;font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eq-slot-box .eq-detail{color:#667;font-size:8px;}
.rarity-common{color:#aaa;}.rarity-uncommon{color:#4e8;}.rarity-rare{color:#4af;}.rarity-epic{color:#c4f;}.rarity-legendary{color:#fa0;}

/* LOG — 5 lines */
#log-panel{overflow:hidden;padding:4px 8px;background:#0a0c1a;flex-shrink:0;border-bottom:2px solid #e8e8e0;}
#log-panel .log-entry{padding:1px 0;font-size:10px;line-height:1.4;color:#556a80;}
#log-panel .log-entry.combat{color:#f88;}
#log-panel .log-entry.loot{color:#fa0;}
#log-panel .log-entry.levelup{color:#4f4;}
#log-panel .log-entry.boss{color:#f4f;}
#log-panel .log-entry.equip{color:#4af;}
#log-panel .log-entry.drop-stat{color:#fc6;}

/* Footer */
#seed-footer{font-size:9px;color:#556;text-align:center;padding:4px 8px;background:#080a16;border-top:2px solid #e8e8e0;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
#seed-footer .title{color:#fa0;font-weight:900;letter-spacing:1px;}
#seed-footer .seed-info{color:#334;}

/* Vignette overlay */
#app::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.3) 100%);z-index:100;}

/* Scanline effect */
#app::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:101;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);}

@media(min-width:500px){
  body{align-items:center;padding:20px 0;}
  #app{min-height:calc(100vh - 40px);max-height:calc(100vh - 40px);border-top:4px solid #e8e8e0;border-bottom:4px solid #e8e8e0;border-radius:8px;overflow-y:auto;}
}
</style>
</head>
<body>

<div id="app">
  <div id="field-wrap">
    <canvas id="field-canvas"></canvas>
    <div id="field-controls">
      <button id="btn-slow">×½</button>
      <button id="btn-normal" class="active">×1</button>
      <button id="btn-fast">×3</button>
      <button id="btn-turbo">×10</button>
      <button id="btn-pause">⏸</button>
      <button id="btn-reset">↺</button>
      <button id="btn-newseed">🎲</button>
    </div>
    <div id="dist-display">0km</div>
  </div>

  <div id="status-panel">
    <div class="status-side" id="player-status">
      <div class="status-label">ゆうしゃ</div>
      <div class="status-name" id="p-name">Lv1 ゆうしゃ</div>
      <div class="hp-bar-wrap"><div class="hp-bar player" id="p-hp-bar" style="width:100%"></div></div>
      <div id="p-stats"></div>
    </div>
    <div class="status-side" id="enemy-status">
      <div class="status-label">てき</div>
      <div class="status-name" id="e-name">---</div>
      <div class="hp-bar-wrap"><div class="hp-bar enemy" id="e-hp-bar" style="width:0%"></div></div>
      <div id="e-stats"></div>
    </div>
  </div>

  <div id="inv-panel">
    <div class="panel-title">◆ もちもの</div>
    <div id="inv-grid"></div>
  </div>

  <div id="equip-panel">
    <div class="panel-title">◆ そうび</div>
    <div id="equip-slots"></div>
  </div>

  <div id="log-panel"></div>

  <div id="seed-footer">
    <span class="title">PARALLEL TREASURE</span>
    <span class="seed-info" id="seed-text">SEED: ---</span>
  </div>
</div>

<script>
'use strict';
// ===== Seeded RNG =====
function makeRNG(seed){
  let s=seed|0;if(s===0)s=1;
  return{next(){s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296;},
    nextInt(a,b){return a+Math.floor(this.next()*(b-a+1));},
    pick(arr){return arr[this.nextInt(0,arr.length-1)];},
    chance(p){return this.next()<p;},seed:seed};
}
function getSeed(){
  const p=new URLSearchParams(location.search);
  if(p.has('seed'))return parseInt(p.get('seed'),10)||1;
  return(Date.now()^(Math.random()*0xffff))&0x7fffffff;
}

// ===== Balance constants =====
const BALANCE={
  attackDuration:0.30,
  counterDuration:0.20,
  atkIntervalBase:0.80,
  atkIntervalMin:0.10,
  atkIntervalSpdScale:0.03,
  playerHpBase:8,
  playerHpPerVit:2,
  enemyHpBase:6,
  enemyHpPerLv:2,
  enemyDistScale:0.018,
  enemyAtkBase:1,
  enemyAtkPerLv:0.5,
  bossHpBase:20,
  bossHpPerDist:4,
  bossAtkBase:2,
  bossAtkPerDist:0.8,
  bossHpMult:0.92,
  dropRate:0.30,
  chestRate:0.07,
  expNextBase:10,
  expNextScale:1.4,
  safeMobGap:5,
  killHealMin:1,
  killHealPct:0.15,
};

const BOSS_INTERVAL=50;
const SLOT_NAMES=['ぶき','たて','よろい','ゆびわ','ペット'];
const SLOT_ICONS=['⚔️','🛡️','🧥','💍','🐾'];
const RARITIES=['common','uncommon','rare','epic','legendary'];
const RARITY_LABELS=['コモン','アンコモン','レア','エピック','レジェンダリ'];
const RARITY_COLORS=['#aaa','#4e8','#4af','#c4f','#fa0'];
const RARITY_MULT=[1,1.3,1.7,2.2,3];
const ENCHANT_POOL=[
  {id:'atk',label:'ATK+',fn:(v,s)=>{s.bonusAtk+=v;},range:[1,5]},
  {id:'vit',label:'VIT+',fn:(v,s)=>{s.bonusVit+=v;},range:[1,6]},
  {id:'spd',label:'SPD+',fn:(v,s)=>{s.bonusSpd+=v;},range:[1,3]},
  {id:'luk',label:'LUK+',fn:(v,s)=>{s.bonusLuk+=v;},range:[1,4]},
  {id:'crit',label:'クリティカル',fn:(v,s)=>{s.crit+=v;},range:[2,10]},
  {id:'lifesteal',label:'きゅうけつ',fn:(v,s)=>{s.lifesteal+=v;},range:[1,6]},
  {id:'poison',label:'どく',fn:(v,s)=>{s.poison+=v;},range:[1,3]},
  {id:'thorns',label:'はんげき',fn:(v,s)=>{s.thorns+=v;},range:[2,10]},
  {id:'chest',label:'たからばこ率+',fn:(v,s)=>{s.chestBonus+=v;},range:[2,12]},
  {id:'expup',label:'けいけんち+',fn:(v,s)=>{s.expBonus+=v;},range:[3,15]},
  {id:'regen',label:'じどうかいふく',fn:(v,s)=>{s.regen+=v;},range:[1,2]},
  {id:'int',label:'INT+',fn:(v,s)=>{s.bonusInt+=v;},range:[1,4]},
];
const ENEMY_NAMES=['スライム','ゴブリン','コボルド','スケルトン','バット','ウルフ','オーク','トロール','ガーゴイル','リザードマン','デーモン','ワイバーン','キメラ','リッチ','ドラゴン'];
const BOSS_NAMES=['やみのばんにん','えんごくのデーモン','ひょうけつのリヴァイアサン','しんえんのリッチ','しゅうえんのドラゴン'];
const PET_NAMES=['こいぬ','こねこ','ことり','ようせい','ドラゴンパピー','スライムくん','ゴーレムJr','フェニックスひな'];
const WEAPON_NAMES=['きのえだ','ショートソード','ロングソード','バトルアクス','カタナ','ハルバード','ダガー','まけん','せいけん','ルーンブレード'];
const SHIELD_NAMES=['きのたて','てつのたて','タワーシールド','まほうのたて','ドラゴンシールド','せいたて'];
const ARMOR_NAMES=['かわよろい','くさりかたびら','プレートメイル','ローブ','ミスリルアーマー','ドラゴンメイル'];
const RING_NAMES=['どうのゆびわ','ぎんのゆびわ','きんのゆびわ','ルビーリング','サファイアリング','エメラルドリング','ダイヤリング'];
const GEM_NAMES=['ローズクォーツ','アメジスト','トパーズ','サファイア','エメラルド','ルビー','ダイヤモンド'];
const EQUIP_NAME_POOL=[WEAPON_NAMES,SHIELD_NAMES,ARMOR_NAMES,RING_NAMES,PET_NAMES];

// ===== Tile-based visual constants =====
const TILE_W=36;
const PLAYER_TILE_OFFSET=3;
const INV_MAX=10;

// ===== Game state =====
let R,seed,player,cells,gameTime,eventLog,paused,speedMult;
let inventory=[]; // temp storage for picked up items
let canvas,ctx,sidebarDirty;

// Visual state
let visualCell=0, hopProgress=0, lastCell=0, hopping=false;
let combatAnim={hitFlash:0,heroHitFlash:0,heroLungeX:0,heroHopY:0,enemyLungeX:0,enemyHopY:0,contactSpark:0,impactX:0,impactY:0,attackActive:false,attackTimer:0,attackDuration:BALANCE.attackDuration,counterActive:false,counterTimer:0,counterDuration:BALANCE.counterDuration,heroKnockX:0,pendingHeroHit:null,heroDamageApplied:false,pendingCounterHit:null,counterDamageApplied:false};
let deathAnim={active:false,type:'none',timer:0,duration:0.6,startX:0,startY:0,entity:null,cellRef:null,particlesSpawned:false};
let currentCombatDist=0;
const PARTICLE_MAX=250;
let particles=[], floaters=[];
let cellDecoCache={};

function getCellDeco(cellIdx){
  if(cellDecoCache[cellIdx])return cellDecoCache[cellIdx];
  let h=(cellIdx*2654435761)>>>0;
  const type=(h%100);
  let deco='none';
  if(type<15)deco='grass';
  else if(type<22)deco='rock';
  else if(type<26)deco='flower';
  else if(type<30)deco='bush';
  else if(type<33)deco='tree';
  else if(type<35)deco='sign';
  const variant=(h>>8)%4;
  const height=6+((h>>12)%8);
  cellDecoCache[cellIdx]={deco,variant,height};
  return cellDecoCache[cellIdx];
}

function spawnParticle(x,y,color,count){
  for(let i=0;i<count&&particles.length<PARTICLE_MAX;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*3,vy:-Math.random()*3-1,life:0.6+Math.random()*0.4,maxLife:1,color,size:Math.random()*3+1});
  }
}

function spawnDustPuff(x,y){
  for(let i=0;i<5;i++){
    particles.push({x:x+(Math.random()-0.5)*6,y,vx:(Math.random()-0.5)*2,vy:-Math.random()*1.5-0.5,life:0.4+Math.random()*0.3,maxLife:0.7,color:'rgba(160,140,100,0.6)',size:Math.random()*3+2});
  }
}

function spawnFloater(x,y,text,color){
  floaters.push({x,y,text,color,life:1.2,maxLife:1.2});
}

function clearNearbyMobs(fromCell){
  const gap=BALANCE.safeMobGap;
  for(let i=fromCell;i<fromCell+gap&&i<cells.length;i++){
    if(cells[i]&&cells[i].enemy){cells[i].enemy=null;cells[i].type='empty';}
  }
}

function initGame(s){
  seed=s;R=makeRNG(seed);
  document.getElementById('seed-text').textContent='SEED: '+seed;
  paused=false;speedMult=1;
  gameTime=0;eventLog=[];
  inventory=[];
  player={
    cell:0,lv:1,exp:0,expNext:10,
    baseAtk:1,baseInt:1,baseVit:1,baseSpd:2,baseLuk:1,
    hp:0,maxHp:0,
    bonusAtk:0,bonusInt:0,bonusVit:0,bonusSpd:0,bonusLuk:0,
    crit:5,lifesteal:0,poison:0,thorns:0,chestBonus:0,expBonus:0,regen:0,
    equips:[null,null,null,null,null],
    kills:0,bossKills:0,guard:0,
    combatTarget:null,combatTimer:0,moveTimer:0,regenTimer:0,
    floor:1,maxFloor:1,totalDistance:0,
    sp:0,
  };
  recalcStats();player.hp=player.maxHp;
  cells=[];generateCells(0,80);
  clearNearbyMobs(player.cell);
  visualCell=0;hopProgress=0;lastCell=0;hopping=false;
  combatAnim={hitFlash:0,heroHitFlash:0,heroLungeX:0,heroHopY:0,enemyLungeX:0,enemyHopY:0,contactSpark:0,impactX:0,impactY:0,attackActive:false,attackTimer:0,attackDuration:BALANCE.attackDuration,counterActive:false,counterTimer:0,counterDuration:BALANCE.counterDuration,heroKnockX:0,pendingHeroHit:null,heroDamageApplied:false,pendingCounterHit:null,counterDamageApplied:false};
  deathAnim={active:false,type:'none',timer:0,duration:0.6,startX:0,startY:0,entity:null,cellRef:null,particlesSpawned:false};
  currentCombatDist=0;
  particles=[];floaters=[];
  cellDecoCache={};
  sidebarDirty=true;
  addLog('ぼうけんかいし！ Seed:'+seed,'levelup');
}

function generateCells(from,count){
  for(let i=from;i<from+count;i++){
    if(cells[i])continue;
    const cell={type:'empty',enemy:null};
    const dist=i+1;
    if(dist>0&&dist%BOSS_INTERVAL===0){cell.type='boss';cell.enemy=makeBoss(dist);}
    else if(R.chance(0.35+Math.min(dist*0.002,0.2))){cell.type='enemy';cell.enemy=makeEnemy(dist);}
    else if(R.chance(BALANCE.chestRate)){cell.type='chest';}
    cells[i]=cell;
  }
}

function makeEnemy(dist){
  const tier=Math.min(Math.floor(dist/10),ENEMY_NAMES.length-1);
  const nameIdx=R.nextInt(Math.max(0,tier-2),tier);
  const lvl=Math.max(1,dist+R.nextInt(-2,2));
  const safeZone=BALANCE.safeMobGap*6;
  const combatLv=1+Math.floor(Math.max(0,dist-safeZone)/12);
  const mult=1+Math.max(0,dist-safeZone)*BALANCE.enemyDistScale;
  const hpRaw=Math.floor((BALANCE.enemyHpBase+combatLv*BALANCE.enemyHpPerLv)*mult);
  const atk=Math.floor((BALANCE.enemyAtkBase+combatLv*BALANCE.enemyAtkPerLv)*mult);
  return{name:ENEMY_NAMES[nameIdx],lv:lvl,
    hp:hpRaw,maxHp:hpRaw,
    atk:atk,int:Math.max(1,Math.floor(combatLv*0.4*mult)),
    vit:Math.max(1,Math.floor(combatLv*0.5*mult)),spd:Math.max(1,2+Math.floor(combatLv*0.2)),
    luk:Math.max(1,Math.floor(1+combatLv*0.15)),guard:0,
    exp:Math.floor(2+lvl+dist*0.2),isBoss:false,poisonDmg:0,
    power:Math.floor(atk+hpRaw*0.1)};
}

function makeBoss(dist){
  const bIdx=Math.min(Math.floor(dist/BOSS_INTERVAL)-1,BOSS_NAMES.length-1);
  const lvl=dist+5;
  const bHpRaw=Math.floor((BALANCE.bossHpBase+dist*BALANCE.bossHpPerDist)*BALANCE.bossHpMult);
  const bAtk=Math.floor(BALANCE.bossAtkBase+dist*BALANCE.bossAtkPerDist);
  return{name:'【BOSS】'+BOSS_NAMES[Math.max(0,bIdx)],lv:lvl,
    hp:bHpRaw,maxHp:bHpRaw,
    atk:bAtk,int:Math.max(1,Math.floor(lvl*0.6)),
    vit:Math.max(1,Math.floor(lvl*0.8)),spd:Math.max(2,3+Math.floor(lvl*0.15)),
    luk:Math.max(1,Math.floor(1+lvl*0.2)),guard:Math.floor(lvl*0.3),
    exp:Math.floor(10+dist*2),isBoss:true,poisonDmg:0,
    power:Math.floor(bAtk+bHpRaw*0.05)};
}

function recalcStats(){
  player.bonusAtk=0;player.bonusInt=0;player.bonusVit=0;player.bonusSpd=0;player.bonusLuk=0;
  player.crit=5;player.lifesteal=0;player.poison=0;player.thorns=0;player.chestBonus=0;player.expBonus=0;player.regen=0;
  player.guard=0;
  for(const eq of player.equips){
    if(!eq)continue;
    if(eq.slot===1)player.guard+=Math.floor(eq.ilvl*RARITY_MULT[eq.rarity]*0.5);
    for(const ench of eq.enchants){
      const def=ENCHANT_POOL.find(e=>e.id===ench.id);
      if(def)def.fn(ench.val,player);
    }
  }
  const tv=player.baseVit+player.bonusVit;
  const oldMax=player.maxHp;
  player.maxHp=BALANCE.playerHpBase+tv*BALANCE.playerHpPerVit;
  if(oldMax>0&&player.hp>0)player.hp=Math.min(player.hp+(player.maxHp-oldMax),player.maxHp);
}

function totalAtk(){return player.baseAtk+player.bonusAtk;}
function totalInt(){return player.baseInt+player.bonusInt;}
function totalVit(){return player.baseVit+player.bonusVit;}
function totalSpd(){return player.baseSpd+player.bonusSpd;}
function totalLuk(){return player.baseLuk+player.bonusLuk;}
function playerPower(){return totalAtk()+totalInt()*0.5+totalVit()*0.3+totalSpd()*0.2+totalLuk()*0.1+player.guard*0.5;}

// ===== Equipment =====
function makeEquip(dist,slotHint){
  const slot=slotHint!=null?slotHint:R.nextInt(0,4);
  const luck=totalLuk();
  let rarIdx=0;const roll=R.next()*100;
  if(roll<1+luck*0.3)rarIdx=4;
  else if(roll<5+luck*0.5)rarIdx=3;
  else if(roll<15+luck*0.8)rarIdx=2;
  else if(roll<40+luck)rarIdx=1;
  const baseName=R.pick(EQUIP_NAME_POOL[slot]);
  const ilvl=Math.max(1,dist+R.nextInt(-3,3));
  const numEnch=rarIdx+1+((R.chance(0.2))?1:0);
  const enchants=[];const used=new Set();
  for(let i=0;i<numEnch&&i<ENCHANT_POOL.length;i++){
    let e,tries=0;
    do{e=R.pick(ENCHANT_POOL);tries++;}while(used.has(e.id)&&tries<20);
    if(used.has(e.id))continue;used.add(e.id);
    const val=R.nextInt(e.range[0],Math.floor(e.range[1]*RARITY_MULT[rarIdx]*(1+ilvl*0.02)));
    enchants.push({id:e.id,label:e.label,val});
  }
  return{name:baseName,slot,rarity:rarIdx,ilvl,enchants};
}

function equipScore(eq){
  if(!eq)return 0;
  let s=eq.ilvl*RARITY_MULT[eq.rarity];
  for(const e of eq.enchants)s+=e.val*1.5;return s;
}

function pickupEquip(eq){
  // Auto-equip if better, otherwise add to inventory
  const cur=player.equips[eq.slot];
  if(!cur||equipScore(eq)>equipScore(cur)){
    // If replacing, old item goes to inventory
    if(cur) addToInventory(cur);
    player.equips[eq.slot]=eq;recalcStats();
    addLog(SLOT_ICONS[eq.slot]+' Lv'+eq.ilvl+eq.name+'をそうび！','equip');
  } else {
    addToInventory(eq);
  }
}

function addToInventory(eq){
  if(inventory.length>=INV_MAX){
    // Drop oldest (lowest score) item
    let minIdx=0,minScore=Infinity;
    for(let i=0;i<inventory.length;i++){
      const sc=equipScore(inventory[i]);
      if(sc<minScore){minScore=sc;minIdx=i;}
    }
    if(equipScore(eq)>minScore){
      inventory.splice(minIdx,1);
      inventory.push(eq);
    }
    // else discard eq silently
  } else {
    inventory.push(eq);
  }
  sidebarDirty=true;
}

function equipFromInventory(idx){
  if(idx<0||idx>=inventory.length)return;
  const eq=inventory[idx];
  const cur=player.equips[eq.slot];
  // Swap: equip this, put current in inventory slot
  player.equips[eq.slot]=eq;
  if(cur){
    inventory[idx]=cur;
  } else {
    inventory.splice(idx,1);
  }
  recalcStats();
  addLog(SLOT_ICONS[eq.slot]+' Lv'+eq.ilvl+eq.name+'をそうび！','equip');
  sidebarDirty=true;
}

// ===== Level up =====
function giveExp(amount){
  const bonus=1+player.expBonus/100;
  player.exp+=Math.floor(amount*bonus);
  while(player.exp>=player.expNext){
    player.exp-=player.expNext;player.lv++;
    player.expNext=Math.floor(BALANCE.expNextBase+player.lv*player.lv*BALANCE.expNextScale);
    player.sp+=3;
    player.hp=player.maxHp;
    addLog('★ レベルアップ！ ➜ Lv'+player.lv+' (SP+3)','levelup');
    sidebarDirty=true;
  }
}

function allocStat(s){
  if(player.sp<=0)return;
  player.sp--;
  switch(s){case'atk':player.baseAtk++;break;case'int':player.baseInt++;break;
    case'vit':player.baseVit++;break;case'spd':player.baseSpd++;break;case'luk':player.baseLuk++;break;}
  recalcStats();
  sidebarDirty=true;
}

// ===== Event Log =====
function addLog(msg,cls){
  eventLog.unshift({msg,cls,t:gameTime});
  if(eventLog.length>300)eventLog.length=300;
  sidebarDirty=true;
}

// ===== Game Update =====
function update(dt){
  if(paused)return;
  const sDt=dt*speedMult;gameTime+=sDt;

  if(player.cell+30>=cells.length)generateCells(cells.length,60);

  // Regen
  player.regenTimer+=sDt;
  if(player.regenTimer>=1){
    player.regenTimer-=1;
    if(player.regen>0&&player.hp<player.maxHp)player.hp=Math.min(player.maxHp,player.hp+player.regen);
    if(player.hp<player.maxHp*0.7){
      const intHeal=Math.floor(totalInt()*0.5);
      if(intHeal>0)player.hp=Math.min(player.maxHp,player.hp+intHeal);
    }
  }

  const cellAt1=cells[player.cell+1];
  if(cellAt1&&cellAt1.enemy&&cellAt1.enemy.hp>0){cellAt1.enemy=null;cellAt1.type='empty';}
  const cellAt2=cells[player.cell+2];
  const has2=cellAt2&&cellAt2.enemy&&cellAt2.enemy.hp>0;
  const nextCell=has2?cellAt2:null;
  const nextHasEnemy=has2&&!deathAnim.active;
  currentCombatDist=2;

  if(nextHasEnemy){
    if(player.combatTarget!==nextCell.enemy){
      player.combatTimer=0;
      combatAnim.pendingHeroHit=null;combatAnim.heroDamageApplied=false;
      combatAnim.pendingCounterHit=null;combatAnim.counterDamageApplied=false;
    }
    player.combatTarget=nextCell.enemy;
    if(!combatAnim.attackActive&&!combatAnim.counterActive){
      player.combatTimer+=sDt;
    }
    const atkInterval=Math.max(BALANCE.atkIntervalMin,BALANCE.atkIntervalBase-totalSpd()*BALANCE.atkIntervalSpdScale);
    if(player.combatTimer>=atkInterval&&!combatAnim.attackActive&&!combatAnim.counterActive){
      player.combatTimer-=atkInterval;
      const en=nextCell.enemy;
      const atkVar=Math.max(1,Math.floor(totalAtk()*0.3));
      let dmg=Math.max(1,totalAtk()+R.nextInt(-atkVar,atkVar));
      let critHit=false;
      if(R.chance(player.crit/100)){dmg=Math.floor(dmg*1.8);critHit=true;}
      let poisonDmg=0;
      if(player.poison>0){en.poisonDmg+=player.poison;}
      if(en.poisonDmg>0){poisonDmg=Math.floor(en.poisonDmg*0.3);}
      const eVar=en.atk<=1?0:Math.max(1,Math.floor(en.atk*0.25));
      let eDmg=Math.max(1,en.atk+R.nextInt(-eVar,eVar)-Math.floor(totalVit()*0.15)-Math.floor(player.guard*0.3));
      if(eDmg<1)eDmg=1;
      combatAnim.pendingHeroHit={dmg,critHit,poisonDmg,en,nextCell};
      combatAnim.heroDamageApplied=false;
      combatAnim.pendingCounterHit={eDmg,en,nextCell};
      combatAnim.counterDamageApplied=false;
      combatAnim.attackActive=true;combatAnim.attackTimer=0;
    }
  } else {
    player.combatTarget=null;
    player.combatTimer=0;
    combatAnim.pendingHeroHit=null;combatAnim.heroDamageApplied=false;
    combatAnim.pendingCounterHit=null;combatAnim.counterDamageApplied=false;
    if(deathAnim.active){sidebarDirty=true;return;}
    player.moveTimer+=sDt;
    const moveInterval=Math.max(0.1,0.5-totalSpd()*0.008);
    if(player.moveTimer>=moveInterval){
      player.moveTimer-=moveInterval;player.cell++;player.totalDistance++;
      player.floor=Math.floor(player.cell/BOSS_INTERVAL)+1;
      if(player.floor>player.maxFloor)player.maxFloor=player.floor;
      lastCell=player.cell-1;
      hopping=true;
      hopProgress=0;
      const c=cells[player.cell];
      if(c&&c.type==='chest'){
        const eq=makeEquip(player.cell);
        addLog('たからばこ！ Lv'+eq.ilvl+eq.name+'('+RARITY_LABELS[eq.rarity]+')','loot');
        pickupEquip(eq);c.type='empty';
      }
    }
  }
  sidebarDirty=true;
}

// ===== Render field canvas =====
function applyHeroHit(){
  const h=combatAnim.pendingHeroHit;if(!h||combatAnim.heroDamageApplied)return;
  combatAnim.heroDamageApplied=true;
  const en=h.en;
  en.hp-=h.dmg;
  if(h.poisonDmg>0){en.hp-=h.poisonDmg;en.poisonDmg=Math.max(0,en.poisonDmg-h.poisonDmg*0.5);}
  if(player.lifesteal>0)player.hp=Math.min(player.maxHp,player.hp+Math.floor(h.dmg*player.lifesteal/100));
  const contactX=(PLAYER_TILE_OFFSET+currentCombatDist)*TILE_W+TILE_W*0.1;
  const totalDmg=h.dmg+h.poisonDmg;
  spawnFloater(contactX+Math.random()*10-5,60+Math.random()*10,'-'+totalDmg,h.critHit?'#f4f':'#ff4');
  spawnParticle(contactX,80,'#f84',4);
  combatAnim.hitFlash=0.35;
  if(en.hp<=0){
    handleEnemyDefeat(en,h.nextCell);
  }
}

function applyEnemyCounterHit(){
  const c=combatAnim.pendingCounterHit;if(!c||combatAnim.counterDamageApplied)return;
  combatAnim.counterDamageApplied=true;
  const en=c.en;
  player.hp-=c.eDmg;
  if(player.thorns>0){
    const thornsDmg=Math.floor(c.eDmg*player.thorns/100);
    en.hp-=thornsDmg;
  }
  const contactX=PLAYER_TILE_OFFSET*TILE_W+TILE_W/2;
  spawnFloater(contactX+Math.random()*10-5,50+Math.random()*10,'-'+c.eDmg,'#fa4');
  if(en.hp<=0){
    handleEnemyDefeat(en,c.nextCell);
  }
  if(player.hp<=0&&!deathAnim.active){
    deathAnim={active:true,type:'player',timer:0,duration:1.0,startX:0,startY:0,entity:null,cellRef:null,particlesSpawned:false};
    player.combatTarget=null;
    combatAnim.pendingHeroHit=null;combatAnim.pendingCounterHit=null;
    combatAnim.attackActive=false;combatAnim.counterActive=false;
  }
}

function handleEnemyDefeat(en,nextCell){
  if(deathAnim.active)return;
  const defeatX=(PLAYER_TILE_OFFSET+currentCombatDist)*TILE_W+TILE_W/2;
  spawnParticle(defeatX,80,en.isBoss?'#f4f':'#f84',12);
  combatAnim.hitFlash=0.5;
  addLog(en.name+'をたおした！(+'+en.exp+'EXP)'+(en.isBoss?' 🏆':''),'combat');
  const healAmt=Math.max(BALANCE.killHealMin,Math.floor(player.maxHp*BALANCE.killHealPct));
  if(player.hp>0&&player.hp<player.maxHp){player.hp=Math.min(player.maxHp,player.hp+healAmt);}
  giveExp(en.exp);player.kills++;
  if(en.isBoss)player.bossKills++;
  const dropRate=BALANCE.dropRate+totalLuk()*0.005+player.chestBonus/100;
  if(R.chance(dropRate)){
    const eq=makeEquip(player.cell+currentCombatDist);
    const gem=R.pick(GEM_NAMES);
    const statGain=R.pick(['ATK','VIT','SPD','LUK','INT']);
    addLog('Lv'+eq.ilvl+eq.name+'をゲット！('+RARITY_LABELS[eq.rarity]+')','loot');
    if(R.chance(0.3))addLog(gem+'もドロップ！('+statGain+'+1)','drop-stat');
    pickupEquip(eq);
  }
  deathAnim={active:true,type:'enemy',timer:0,duration:0.6,startX:defeatX,startY:60,entity:en,cellRef:nextCell,particlesSpawned:false,dist:currentCombatDist};
  player.combatTarget=null;
  combatAnim.pendingCounterHit=null;combatAnim.pendingHeroHit=null;
  combatAnim.attackActive=false;combatAnim.counterActive=false;
}

function updateVisualState(dt){
  const sDt=dt*speedMult;
  const inCombat=!!(player.combatTarget&&player.combatTarget.hp>0);

  if(hopping&&!paused){
    const hopSpeed=Math.max(4,8+speedMult*2);
    hopProgress+=dt*hopSpeed;
    if(hopProgress>=1){
      hopProgress=0;
      hopping=false;
      visualCell=player.cell;
      const W=canvas.width/devicePixelRatio;
      const groundY=(canvas.height/devicePixelRatio)*0.78;
      const px=PLAYER_TILE_OFFSET*TILE_W+TILE_W/2;
      spawnDustPuff(px,groundY);
    }
  }
  if(!hopping){
    visualCell=player.cell;
  }

  if(combatAnim.attackActive){
    combatAnim.attackTimer+=dt;
    const dur=combatAnim.attackDuration;
    const p=Math.min(combatAnim.attackTimer/dur,1);
    const reach=currentCombatDist>=2?TILE_W*0.9:TILE_W*0.22;
    if(p<0.35){
      const t=p/0.35;
      const arcY=hopArcY(t*0.85)*0.6;
      combatAnim.heroLungeX=reach*t;
      combatAnim.heroHopY=arcY;
      combatAnim.enemyLungeX=0;combatAnim.enemyHopY=0;
    } else if(p<0.50){
      const t=(p-0.35)/0.15;
      combatAnim.heroLungeX=reach*(1-t*0.15);
      combatAnim.heroHopY=0;
      combatAnim.enemyLungeX=4*Math.sin(t*Math.PI);
      combatAnim.enemyHopY=0;
      if(t<0.3){combatAnim.contactSpark=1;applyHeroHit();}
    } else {
      const t=(p-0.50)/0.50;
      combatAnim.heroLungeX=reach*(1-t)*0.85;
      combatAnim.heroHopY=-Math.sin(t*Math.PI)*4;
      combatAnim.enemyLungeX=4*(1-t)*Math.max(0,1-t*2);
      combatAnim.enemyHopY=0;
      combatAnim.contactSpark*=0.85;
    }
    if(p>=1){
      combatAnim.attackActive=false;combatAnim.attackTimer=0;
      combatAnim.heroLungeX=0;combatAnim.heroHopY=0;
      combatAnim.enemyLungeX=0;combatAnim.enemyHopY=0;
      combatAnim.contactSpark=0;
      if(inCombat&&combatAnim.pendingCounterHit&&combatAnim.pendingCounterHit.en.hp>0){
        combatAnim.counterActive=true;combatAnim.counterTimer=0;
      }
    }
  } else if(combatAnim.counterActive){
    combatAnim.counterTimer+=dt;
    const dur=combatAnim.counterDuration;
    const p=Math.min(combatAnim.counterTimer/dur,1);
    const reach=currentCombatDist>=2?TILE_W*1.8:TILE_W*0.18;
    if(p<0.35){
      const t=p/0.35;
      const arcY=hopArcY(t*0.85)*(currentCombatDist>=2?0.8:0.5);
      combatAnim.enemyLungeX=-reach*t;
      combatAnim.enemyHopY=arcY;
      combatAnim.heroLungeX=0;combatAnim.heroHopY=0;
    } else if(p<0.50){
      const t=(p-0.35)/0.15;
      combatAnim.enemyLungeX=-reach*(1-t*0.15);
      combatAnim.enemyHopY=0;
      const knockStr=currentCombatDist>=2?8:3;
      combatAnim.heroKnockX=-knockStr*Math.sin(t*Math.PI);
      if(t<0.3){combatAnim.contactSpark=1;combatAnim.heroHitFlash=0.35;applyEnemyCounterHit();}
    } else {
      const t=(p-0.50)/0.50;
      combatAnim.enemyLungeX=-reach*(1-t)*0.85;
      combatAnim.enemyHopY=-Math.sin(t*Math.PI)*3;
      const knockStr=currentCombatDist>=2?8:3;
      combatAnim.heroKnockX=-knockStr*(1-t)*Math.max(0,1-t*2);
      combatAnim.contactSpark*=0.85;
    }
    if(p>=1){
      combatAnim.counterActive=false;combatAnim.counterTimer=0;
      combatAnim.heroLungeX=0;combatAnim.heroHopY=0;
      combatAnim.enemyLungeX=0;combatAnim.enemyHopY=0;
      combatAnim.heroKnockX=0;combatAnim.contactSpark=0;
    }
  } else {
    combatAnim.heroLungeX*=0.8;combatAnim.enemyLungeX*=0.8;
    combatAnim.heroHopY*=0.8;combatAnim.enemyHopY*=0.8;
    combatAnim.heroKnockX*=0.8;
    combatAnim.contactSpark*=0.8;
  }
  combatAnim.hitFlash=Math.max(0,combatAnim.hitFlash-dt*2);
  combatAnim.heroHitFlash=Math.max(0,combatAnim.heroHitFlash-dt*2);

  // Death animation
  if(deathAnim.active){
    deathAnim.timer+=dt;
    const dp=Math.min(deathAnim.timer/deathAnim.duration,1);
    if(!deathAnim.particlesSpawned){
      const spawnAt=deathAnim.type==='enemy'?0.05:0.6;
      if(dp>spawnAt){
        deathAnim.particlesSpawned=true;
        if(deathAnim.type==='enemy'){
          const bx=deathAnim.startX;
          for(let i=0;i<25&&particles.length<PARTICLE_MAX;i++){
            particles.push({x:bx,y:80,vx:(Math.random()*4+1)+(Math.random()-0.5)*2,vy:-Math.random()*5-2,life:0.5+Math.random()*0.5,maxLife:1,color:'#f84',size:Math.random()*4+2});
          }
        } else {
          const bx=PLAYER_TILE_OFFSET*TILE_W+TILE_W/2;
          const gy=(canvas.height/devicePixelRatio)*0.78;
          for(let i=0;i<15&&particles.length<PARTICLE_MAX;i++){
            particles.push({x:bx-8+Math.random()*16,y:gy,vx:(Math.random()-0.5)*3,vy:-Math.random()*2-0.5,life:0.3+Math.random()*0.3,maxLife:0.6,color:'#a89070',size:Math.random()*3+1});
          }
        }
      }
    }
    if(dp>=1){
      if(deathAnim.type==='enemy'){
        if(deathAnim.cellRef){deathAnim.cellRef.enemy=null;deathAnim.cellRef.type='empty';}
      } else {
        player.hp=player.maxHp;player.cell=Math.max(0,player.cell-5);
        visualCell=player.cell;hopProgress=0;hopping=false;lastCell=player.cell;
        clearNearbyMobs(player.cell);
        addLog('ちからつきた… 5マスもどる','combat');
      }
      deathAnim.active=false;
    }
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=3*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.y-=dt*40;f.life-=dt;
    if(f.life<=0)floaters.splice(i,1);
  }
}

// ===== Hop arc easing =====
function hopArcY(t){
  const peak=0.4;
  if(t<peak){
    const p=t/peak;
    return -Math.sin(p*Math.PI)*14;
  } else {
    const p=(t-peak)/(1-peak);
    return -Math.sin((1-p)*Math.PI*0.5)*14 * (1-p*0.3);
  }
}

function hopSquash(t){
  if(t>0.85) return 1+Math.sin((t-0.85)/0.15*Math.PI)*0.15;
  return 1;
}

function renderField(){
  const W=canvas.width/devicePixelRatio,H=canvas.height/devicePixelRatio;
  ctx.save();
  ctx.clearRect(0,0,W,H);

  const groundY=H*0.78;
  const hopFrac=hopping?hopProgress:0;
  const smoothCell=visualCell+hopFrac;
  const cameraCell=smoothCell-PLAYER_TILE_OFFSET;

  // === Sky ===
  const skyGrad=ctx.createLinearGradient(0,0,0,groundY);
  skyGrad.addColorStop(0,'#5BACEE');
  skyGrad.addColorStop(0.5,'#7EC8F0');
  skyGrad.addColorStop(1,'#B8E4F8');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,groundY);

  // === Clouds ===
  const cloudScroll=cameraCell*TILE_W*0.03;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  for(let i=0;i<6;i++){
    const cx=((i*150+80-cloudScroll)%900+900)%900-100;
    const cy=15+i*8%30;
    const cw=40+i*12%30;
    ctx.beginPath();
    ctx.ellipse(cx,cy,cw,10+i%3*3,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx+cw*0.3,cy-5,cw*0.6,8+i%2*4,0,0,Math.PI*2);ctx.fill();
  }

  // === Mountains ===
  const mtScroll=cameraCell*TILE_W*0.08;
  ctx.fillStyle='#8BA8C8';
  ctx.beginPath();ctx.moveTo(0,groundY);
  for(let x=0;x<=W;x+=3){
    const wx=x+mtScroll;
    const h=Math.sin(wx*0.006)*25+Math.sin(wx*0.003)*35+Math.sin(wx*0.015)*10;
    ctx.lineTo(x,groundY-45-h);
  }
  ctx.lineTo(W,groundY);ctx.closePath();ctx.fill();

  ctx.fillStyle='#E8F0F8';
  ctx.beginPath();ctx.moveTo(0,groundY);
  for(let x=0;x<=W;x+=3){
    const wx=x+mtScroll;
    const h=Math.sin(wx*0.006)*25+Math.sin(wx*0.003)*35+Math.sin(wx*0.015)*10;
    const peak=groundY-45-h;
    ctx.lineTo(x,peak+8);
  }
  ctx.lineTo(W,groundY);ctx.closePath();ctx.fill();
  ctx.fillStyle='#8BA8C8';
  ctx.beginPath();ctx.moveTo(0,groundY);
  for(let x=0;x<=W;x+=3){
    const wx=x+mtScroll;
    const h=Math.sin(wx*0.006)*25+Math.sin(wx*0.003)*35+Math.sin(wx*0.015)*10;
    const peak=groundY-45-h;
    ctx.lineTo(x,peak+12);
  }
  ctx.lineTo(W,groundY);ctx.closePath();ctx.fill();

  // === Hills ===
  const hillScroll=cameraCell*TILE_W*0.2;
  ctx.fillStyle='#6AAF50';
  ctx.beginPath();ctx.moveTo(0,groundY);
  for(let x=0;x<=W;x+=3){
    const wx=x+hillScroll;
    const h=Math.sin(wx*0.01)*15+Math.sin(wx*0.022)*10+Math.cos(wx*0.006)*18;
    ctx.lineTo(x,groundY-12-h);
  }
  ctx.lineTo(W,groundY);ctx.closePath();ctx.fill();

  ctx.fillStyle='#7CC060';
  ctx.beginPath();ctx.moveTo(0,groundY);
  for(let x=0;x<=W;x+=3){
    const wx=x+hillScroll*1.2+200;
    const h=Math.sin(wx*0.013)*10+Math.sin(wx*0.03)*6;
    ctx.lineTo(x,groundY-5-h);
  }
  ctx.lineTo(W,groundY);ctx.closePath();ctx.fill();

  // === Ground ===
  const gndGrad=ctx.createLinearGradient(0,groundY,0,H);
  gndGrad.addColorStop(0,'#8BC060');
  gndGrad.addColorStop(0.3,'#7AAA50');
  gndGrad.addColorStop(1,'#6A8840');
  ctx.fillStyle=gndGrad;ctx.fillRect(0,groundY,W,H-groundY);

  ctx.fillStyle='#C4A060';
  ctx.fillRect(0,groundY+2,W,10);
  ctx.fillStyle='#B89050';
  ctx.fillRect(0,groundY+5,W,4);

  // === Tile grid ===
  const firstTile=Math.floor(cameraCell);
  const tilePx=-(cameraCell-firstTile)*TILE_W;

  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;
  for(let i=-1;i<=Math.ceil(W/TILE_W)+1;i++){
    const tx=tilePx+i*TILE_W;
    ctx.beginPath();ctx.moveTo(tx,groundY);ctx.lineTo(tx,H);ctx.stroke();
  }

  ctx.fillStyle='rgba(80,60,30,0.25)';ctx.font='7px monospace';
  for(let i=-1;i<=Math.ceil(W/TILE_W)+1;i++){
    const cellIdx=firstTile+i;
    const tx=tilePx+i*TILE_W;
    if(cellIdx>=0){
      ctx.fillText(cellIdx,tx+2,H-2);
    }
  }

  // === Cell contents ===
  for(let i=-2;i<=Math.ceil(W/TILE_W)+2;i++){
    const cellIdx=firstTile+i;
    if(cellIdx<0)continue;
    const tx=tilePx+i*TILE_W;
    if(tx<-TILE_W||tx>W+TILE_W)continue;
    const cx=tx+TILE_W/2;

    const deco=getCellDeco(cellIdx);
    if(deco.deco!=='none'){
      ctx.save();
      const baseY=groundY;
      switch(deco.deco){
        case 'grass':
          ctx.strokeStyle='#3a8a30';ctx.lineWidth=1;
          for(let g=0;g<3;g++){
            const gx=cx+g*4-4;
            const sway=Math.sin(gameTime*2+cellIdx+g)*2;
            ctx.beginPath();ctx.moveTo(gx,baseY);ctx.lineTo(gx+sway,baseY-deco.height-2);ctx.stroke();
          }
          break;
        case 'rock':
          ctx.fillStyle='#8a8870';
          ctx.beginPath();ctx.moveTo(cx-6,baseY);ctx.lineTo(cx-4,baseY-deco.height);ctx.lineTo(cx+4,baseY-deco.height+1);ctx.lineTo(cx+7,baseY);ctx.closePath();ctx.fill();
          ctx.fillStyle='#9a9880';ctx.fillRect(cx-2,baseY-deco.height+1,3,2);
          break;
        case 'flower':
          ctx.strokeStyle='#3a7a30';ctx.lineWidth=1;
          ctx.beginPath();ctx.moveTo(cx,baseY);ctx.lineTo(cx,baseY-8);ctx.stroke();
          ctx.fillStyle=['#f48','#fa0','#48f','#f4f'][deco.variant];
          ctx.beginPath();ctx.arc(cx,baseY-9,2.5,0,Math.PI*2);ctx.fill();
          break;
        case 'bush':
          ctx.fillStyle='#3a8530';
          ctx.beginPath();ctx.arc(cx,baseY-5,7,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#4a9540';
          ctx.beginPath();ctx.arc(cx+3,baseY-7,5,0,Math.PI*2);ctx.fill();
          break;
        case 'tree':
          ctx.fillStyle='#6a4828';ctx.fillRect(cx-2,baseY-22,4,22);
          ctx.fillStyle='#2a7a22';
          ctx.beginPath();ctx.arc(cx,baseY-28,11,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#3a9a32';
          ctx.beginPath();ctx.arc(cx+4,baseY-32,7,0,Math.PI*2);ctx.fill();
          break;
        case 'sign':
          ctx.fillStyle='#7a5830';ctx.fillRect(cx-1,baseY-14,2,14);
          ctx.fillStyle='#9a7840';ctx.fillRect(cx-6,baseY-18,12,7);
          ctx.fillStyle='#ba9860';ctx.fillRect(cx-4,baseY-16,8,3);
          break;
      }
      ctx.restore();
    }

    const cell=cells[cellIdx];
    if(!cell)continue;

    const combatCellIdx=player.combatTarget?player.cell+currentCombatDist:-1;
    if(cell.enemy&&cell.enemy.hp>0&&cellIdx!==combatCellIdx){
      const en=cell.enemy;
      const ey=groundY-20;
      const bobE=Math.sin(gameTime*4+cellIdx)*2;
      ctx.fillStyle=en.isBoss?'#a030a0':'#a03030';
      const sz=en.isBoss?14:10;
      ctx.fillRect(cx-sz/2,ey-sz+bobE,sz,sz);
      ctx.fillStyle='#f44';
      ctx.fillRect(cx-3,ey-sz+3+bobE,2,2);
      ctx.fillRect(cx+1,ey-sz+3+bobE,2,2);
      if(en.isBoss){
        ctx.fillStyle='#c040c0';
        ctx.fillRect(cx-sz/2-2,ey-sz-4+bobE,3,5);
        ctx.fillRect(cx+sz/2-1,ey-sz-4+bobE,3,5);
      }
      const ehpPct=en.hp/en.maxHp;
      ctx.fillStyle='#300';ctx.fillRect(cx-12,ey-sz-6+bobE,24,3);
      ctx.fillStyle=en.isBoss?'#f4f':'#f44';ctx.fillRect(cx-12,ey-sz-6+bobE,Math.max(0,24*ehpPct),3);
      ctx.fillStyle='#555';ctx.font='7px monospace';
      ctx.fillText('Lv'+en.lv,cx-10,ey-sz-8+bobE);
    }

    if(cell.type==='chest'){
      const cy=groundY-14;
      const shine=Math.sin(gameTime*3+cellIdx)*0.3+0.7;
      ctx.fillStyle='rgb('+Math.floor(200*shine)+','+Math.floor(150*shine)+','+Math.floor(40*shine)+')';
      ctx.fillRect(cx-7,cy-8,14,10);
      ctx.fillStyle='#fa0';ctx.fillRect(cx-2,cy-6,4,3);
      ctx.strokeStyle='#a08020';ctx.lineWidth=1;
      ctx.strokeRect(cx-7,cy-8,14,10);
    }
  }

  // === Current enemy (combat) ===
  const inCombat=!!(player.combatTarget&&player.combatTarget.hp>0);
  const playerTileX=tilePx+(player.cell-firstTile)*TILE_W;
  const px=playerTileX+TILE_W/2;

  if(inCombat){
    const en=player.combatTarget;
    const enemyBaseX=px+TILE_W*currentCombatDist;
    const ex=enemyBaseX+combatAnim.enemyLungeX;
    const ey=groundY-20+combatAnim.enemyHopY;
    const sz=en.isBoss?16:12;

    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath();ctx.ellipse(ex,groundY,7-Math.abs(combatAnim.enemyHopY)*0.15,2.5,0,0,Math.PI*2);ctx.fill();

    ctx.save();
    ctx.fillStyle=en.isBoss?'#8020a0':'#a03030';
    ctx.fillRect(ex-sz/2,ey-sz,sz,sz);
    ctx.fillStyle=combatAnim.hitFlash>0?'#fff':'#f44';
    ctx.fillRect(ex-3,ey-sz+3,2,2);
    ctx.fillRect(ex+2,ey-sz+3,2,2);
    ctx.fillStyle='#800';ctx.fillRect(ex-2,ey-sz+7,4,2);
    if(en.isBoss){
      ctx.fillStyle='#a040d0';
      ctx.fillRect(ex-sz/2-2,ey-sz-5,3,6);
      ctx.fillRect(ex+sz/2-1,ey-sz-5,3,6);
    }
    if(combatAnim.hitFlash>0){
      ctx.fillStyle='rgba(255,255,255,'+combatAnim.hitFlash+')';
      ctx.fillRect(ex-sz/2-1,ey-sz-1,sz+2,sz+2);
    }
    ctx.restore();

    const ehpPct=en.hp/en.maxHp;
    ctx.fillStyle='#300';ctx.fillRect(ex-14,ey-sz-8,28,4);
    ctx.fillStyle=en.isBoss?'#f4f':'#f44';ctx.fillRect(ex-14,ey-sz-8,Math.max(0,28*ehpPct),4);
    ctx.fillStyle='#333';ctx.font='bold 8px monospace';
    ctx.fillText(en.name,ex-14,ey-sz-12);

    if(combatAnim.contactSpark>0.3){
      const sparkX=(px+combatAnim.heroLungeX+ex)/2;
      const sparkY=groundY-16;
      const sparkAlpha=combatAnim.contactSpark;
      ctx.save();ctx.globalAlpha=sparkAlpha;
      ctx.strokeStyle='#ffe040';ctx.lineWidth=2;
      const rays=5;const sparkR=6*sparkAlpha;
      for(let r=0;r<rays;r++){
        const angle=r*Math.PI*2/rays-Math.PI/2;
        ctx.beginPath();
        ctx.moveTo(sparkX+Math.cos(angle)*2,sparkY+Math.sin(angle)*2);
        ctx.lineTo(sparkX+Math.cos(angle)*sparkR,sparkY+Math.sin(angle)*sparkR);
        ctx.stroke();
      }
      ctx.fillStyle='rgba(255,240,200,'+sparkAlpha*0.5+')';
      ctx.beginPath();ctx.arc(sparkX,sparkY,4*sparkAlpha,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  // === Death animation (enemy) ===
  if(deathAnim.active&&deathAnim.type==='enemy'&&deathAnim.entity){
    const dp=Math.min(deathAnim.timer/deathAnim.duration,1);
    const den=deathAnim.entity;
    const dsz=den.isBoss?16:12;
    const flyX=deathAnim.startX+dp*TILE_W*2.5;
    const flyY=deathAnim.startY-dp*80-Math.sin(dp*Math.PI)*40;
    const rot=dp*Math.PI*3;
    const scale=Math.max(0,(1-dp*1.2));
    const alpha=Math.max(0,1-dp*1.5);
    ctx.save();ctx.globalAlpha=alpha;
    ctx.translate(flyX,flyY);ctx.rotate(rot);ctx.scale(scale,scale);
    ctx.fillStyle=den.isBoss?'#8020a0':'#a03030';
    ctx.fillRect(-dsz/2,-dsz/2,dsz,dsz);
    ctx.fillStyle='#f44';ctx.fillRect(-3,-dsz/2+3,2,2);ctx.fillRect(2,-dsz/2+3,2,2);
    ctx.fillStyle='rgba(255,255,200,'+Math.max(0,0.8-dp)+')';
    ctx.fillRect(-dsz/2-1,-dsz/2-1,dsz+2,dsz+2);
    ctx.restore();
    if(dp<0.7){
      ctx.save();ctx.globalAlpha=Math.max(0,1-dp/0.7);
      ctx.fillStyle='#ff4';ctx.font='bold 14px monospace';
      ctx.fillText('DEFEAT!',deathAnim.startX-25,deathAnim.startY-20-dp*30);
      ctx.restore();
    }
  }

  // === Player character ===
  let heroX=px+combatAnim.heroLungeX+combatAnim.heroKnockX;
  let hopY=inCombat?combatAnim.heroHopY:0;
  let squash=1;
  let stepAlt=player.cell%2;

  if(hopping){
    const fromX=tilePx+(lastCell-firstTile)*TILE_W+TILE_W/2;
    const toX=tilePx+(player.cell-firstTile)*TILE_W+TILE_W/2;
    heroX=fromX+(toX-fromX)*hopProgress+combatAnim.heroLungeX+combatAnim.heroKnockX;
    hopY=hopArcY(hopProgress);
    squash=hopSquash(hopProgress);
    stepAlt=hopProgress<0.5?0:1;
  }

  const baseHeroY=groundY-22;
  const heroY=baseHeroY+hopY;

  const playerDying=deathAnim.active&&deathAnim.type==='player';
  if(playerDying){
    const dp=Math.min(deathAnim.timer/deathAnim.duration,1);
    const staggerX=dp<0.3? -dp/0.3*8 : -8;
    let fallRot=0, fallY=0;
    if(dp>=0.3&&dp<0.7){
      const fp=(dp-0.3)/0.4;
      fallRot=fp*Math.PI*0.5;
      fallY=fp*fp*(groundY-heroY-4);
    } else if(dp>=0.7){
      fallRot=Math.PI*0.5;
      fallY=groundY-heroY-4;
    }
    const blinkAlpha=dp>=0.7?(Math.sin((dp-0.7)/0.3*Math.PI*6)>0?1:0.3):1;
    ctx.save();ctx.globalAlpha=blinkAlpha;
    ctx.translate(heroX+staggerX,heroY+fallY);ctx.rotate(fallRot);
    ctx.fillStyle='#3070d0';ctx.fillRect(-5,-6,10,10);
    ctx.fillStyle='#e8c090';ctx.fillRect(-4,-12,8,7);
    ctx.fillStyle='#604020';ctx.fillRect(-4,-14,8,4);
    ctx.fillStyle='#404880';ctx.fillRect(-3,4,3,5);ctx.fillRect(1,4,3,5);
    if(dp<0.35){
      ctx.fillStyle='rgba(255,80,80,'+Math.max(0,0.8-dp*2.5)+')';
      ctx.fillRect(-7,-15,14,22);
    }
    ctx.restore();
    if(dp<0.6){
      ctx.save();ctx.globalAlpha=Math.max(0,1-dp/0.6);
      ctx.fillStyle='#f44';ctx.font='bold 13px monospace';
      ctx.fillText('やられた！',heroX-30,heroY-25-dp*20);
      ctx.restore();
    }
    ctx.fillStyle='#030';ctx.fillRect(heroX-12,heroY-20,24,4);
    ctx.fillStyle='#f44';ctx.fillRect(heroX-12,heroY-20,0,4);
  } else {
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath();ctx.ellipse(heroX,groundY,8-Math.abs(hopY)*0.2,3,0,0,Math.PI*2);ctx.fill();

    ctx.save();
    ctx.translate(heroX,heroY+6);
    ctx.scale(1+(squash-1)*0.5,1/squash);
    ctx.translate(-heroX,-(heroY+6));

    ctx.fillStyle='#3070d0';ctx.fillRect(heroX-5,heroY-6,10,10);
    ctx.fillStyle='#e8c090';ctx.fillRect(heroX-4,heroY-12,8,7);
    ctx.fillStyle='#604020';ctx.fillRect(heroX-4,heroY-14,8,4);
    ctx.fillStyle='#222';ctx.fillRect(heroX+1,heroY-10,2,2);ctx.fillRect(heroX+4,heroY-10,1,2);

    ctx.fillStyle='#404880';
    const legExt=stepAlt?3:-3;
    ctx.fillRect(heroX-3,heroY+4,3,5+legExt);
    ctx.fillRect(heroX+1,heroY+4,3,5-legExt);
    ctx.fillStyle='#604020';
    ctx.fillRect(heroX-4,heroY+8+legExt,4,2);
    ctx.fillRect(heroX+1,heroY+8-legExt,4,2);

    const armSwing=combatAnim.attackActive?Math.sin(combatAnim.attackTimer/combatAnim.attackDuration*Math.PI*2)*8:(hopping?Math.sin(hopProgress*Math.PI)*4:0);
    ctx.fillStyle='#e8c090';
    ctx.save();
    ctx.translate(heroX+5,heroY-3);ctx.rotate(armSwing*0.15);
    ctx.fillRect(0,-2,7,3);
    ctx.fillStyle='#c0c0d0';ctx.fillRect(6,-3,2,8);
    ctx.fillStyle='#fa0';ctx.fillRect(5,-1,4,2);
    ctx.restore();
    ctx.fillStyle='#4060a0';ctx.fillRect(heroX-7,heroY-5,3,7);
    ctx.fillStyle='#5080c0';ctx.fillRect(heroX-6,heroY-3,1,3);

    if(combatAnim.heroHitFlash>0){
      ctx.fillStyle='rgba(255,255,255,'+combatAnim.heroHitFlash+')';
      ctx.fillRect(heroX-6,heroY-14,12,24);
    }

    ctx.restore();
  }

  const hpPct=player.hp/player.maxHp;
  ctx.fillStyle='#030';ctx.fillRect(heroX-12,heroY-20+hopY*0.3,24,4);
  ctx.fillStyle=hpPct>0.3?'#4c8':'#f44';ctx.fillRect(heroX-12,heroY-20+hopY*0.3,Math.max(0,24*hpPct),4);
  ctx.fillStyle='#c60';ctx.font='bold 8px monospace';
  ctx.fillText('Lv'+player.lv,heroX-10,heroY-22+hopY*0.3);

  for(const p of particles){
    const alpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;ctx.globalAlpha=alpha;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  }
  ctx.globalAlpha=1;

  for(const f of floaters){
    const alpha=Math.min(1,f.life/0.3);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=f.color;ctx.font='bold 11px monospace';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;

  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,H-14,W,14);
  ctx.fillStyle='#eee';ctx.font='9px monospace';
  ctx.fillText('Floor '+player.floor+'  |  '+player.kills+' kills  |  Cell '+player.cell,4,H-4);

  ctx.restore();

  document.getElementById('dist-display').textContent=player.totalDistance+'km';
}

// ===== UI Updates =====
function updateUI(){
  document.getElementById('p-name').textContent='Lv'+player.lv+' ゆうしゃ';
  const hpPct=Math.max(0,player.hp/player.maxHp*100);
  const pBar=document.getElementById('p-hp-bar');
  pBar.style.width=hpPct+'%';
  pBar.className='hp-bar player';

  const hasSp=player.sp>0;
  const spInfo=hasSp?'<div class="sp-label">SP:'+player.sp+'</div>':'';

  function allocRow(label,total,base,statKey){
    const btn=hasSp?'<div class="stat-alloc"><span class="stat-val">'+total+'</span><button class="sp-btn can-alloc" data-stat="'+statKey+'">+</button></div>':'<span class="stat-val">'+total+'</span>';
    return '<div class="stat-row"><span class="stat-key">'+label+'</span>'+btn+'</div>';
  }

  const ps=document.getElementById('p-stats');
  ps.innerHTML=
    sRow('HP',player.hp+'/'+player.maxHp,hpPct<30)+
    spInfo+
    allocRow('ATK',totalAtk(),player.baseAtk,'atk')+
    allocRow('INT',totalInt(),player.baseInt,'int')+
    allocRow('VIT',totalVit(),player.baseVit,'vit')+
    allocRow('SPD',totalSpd(),player.baseSpd,'spd')+
    allocRow('LUK',totalLuk(),player.baseLuk,'luk')+
    sRow('ガード',player.guard)+
    sRow('つよさ',Math.floor(playerPower()));

  const en=player.combatTarget;
  if(en){
    document.getElementById('e-name').textContent='Lv'+en.lv+' '+en.name;
    const eHpPct=Math.max(0,en.hp/en.maxHp*100);
    const eBar=document.getElementById('e-hp-bar');
    eBar.style.width=eHpPct+'%';
    eBar.className='hp-bar '+(en.isBoss?'boss':'enemy');
    document.getElementById('e-stats').innerHTML=
      sRow('HP',Math.max(0,en.hp)+'/'+en.maxHp)+
      sRow('ATK',en.atk)+sRow('INT',en.int)+
      sRow('VIT',en.vit)+sRow('SPD',en.spd)+
      sRow('LUK',en.luk)+sRow('ガード',en.guard)+
      sRow('つよさ',en.power);
  } else {
    document.getElementById('e-name').textContent='---';
    document.getElementById('e-hp-bar').style.width='0%';
    document.getElementById('e-stats').innerHTML=
      sRow('HP','---')+sRow('ATK','---')+sRow('INT','---')+
      sRow('VIT','---')+sRow('SPD','---')+sRow('LUK','---')+
      sRow('ガード','---')+sRow('つよさ','---');
  }

  // Inventory
  const ig=document.getElementById('inv-grid');
  let invHtml='';
  for(let i=0;i<INV_MAX;i++){
    if(i<inventory.length){
      const eq=inventory[i];
      invHtml+='<div class="inv-slot rarity-'+RARITIES[eq.rarity]+'" data-inv="'+i+'" title="Lv'+eq.ilvl+' '+eq.name+' ('+RARITY_LABELS[eq.rarity]+')\n'+eq.enchants.map(e=>e.label+':'+e.val).join('\n')+'"><span class="inv-icon">'+SLOT_ICONS[eq.slot]+'</span><span class="inv-name">'+eq.name+'</span></div>';
    } else {
      invHtml+='<div class="inv-slot empty"><span class="inv-icon" style="opacity:0.2">-</span></div>';
    }
  }
  ig.innerHTML=invHtml;

  // Equips
  const es=document.getElementById('equip-slots');
  es.innerHTML=player.equips.map((eq,i)=>{
    const icon=SLOT_ICONS[i];
    if(!eq)return '<div class="eq-slot-box"><span class="eq-icon">'+icon+'</span><span class="eq-label">'+SLOT_NAMES[i]+'</span><span class="eq-name" style="color:#334">—</span></div>';
    return '<div class="eq-slot-box"><span class="eq-icon">'+icon+'</span><span class="eq-label">'+SLOT_NAMES[i]+'</span><span class="eq-name rarity-'+RARITIES[eq.rarity]+'">'+eq.name+'</span><span class="eq-detail">Lv'+eq.ilvl+' '+RARITY_LABELS[eq.rarity]+'</span></div>';
  }).join('');

  updateLog();
}

function sRow(label,val,warn){
  return '<div class="stat-row"><span class="stat-key">'+label+'</span><span class="stat-val'+(warn?' hp-low':'')+'">'+val+'</span></div>';
}

function updateLog(){
  const lp=document.getElementById('log-panel');
  const show=eventLog.slice(0,5);
  let html='';
  for(const e of show){
    html+='<div class="log-entry'+(e.cls?' '+e.cls:'')+'">'+e.msg+'</div>';
  }
  lp.innerHTML=html;
}

// ===== Main loop =====
let lastTime=0,uiTimer=0;
function loop(ts){
  if(!lastTime)lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts;
  update(dt);updateVisualState(dt);renderField();
  uiTimer+=dt;
  if(sidebarDirty&&uiTimer>0.2){updateUI();sidebarDirty=false;uiTimer=0;}
  requestAnimationFrame(loop);
}

// ===== Init =====
function resizeCanvas(){
  const wrap=document.getElementById('field-wrap');
  const w=wrap.clientWidth;
  const h=180;
  canvas.width=w*devicePixelRatio;
  canvas.height=h*devicePixelRatio;
  canvas.style.height=h+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}

function start(){
  canvas=document.getElementById('field-canvas');
  ctx=canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
  const s=getSeed();initGame(s);

  document.getElementById('btn-pause').addEventListener('click',()=>{
    paused=!paused;document.getElementById('btn-pause').textContent=paused?'▶':'⏸';});
  const speedBtns=[['btn-slow',0.5],['btn-normal',1],['btn-fast',3],['btn-turbo',10]];
  for(const[id,spd] of speedBtns){
    document.getElementById(id).addEventListener('click',()=>{
      speedMult=spd;
      for(const[sid] of speedBtns)document.getElementById(sid).classList.remove('active');
      document.getElementById(id).classList.add('active');
    });
  }
  document.getElementById('btn-reset').addEventListener('click',()=>{initGame(seed);});
  document.getElementById('btn-newseed').addEventListener('click',()=>{
    const ns=(Date.now()^(Math.random()*0xffff))&0x7fffffff;
    history.replaceState(null,'','?seed='+ns);initGame(ns);
  });

  // Stat allocation — event delegation on player stats
  document.getElementById('p-stats').addEventListener('click',(e)=>{
    const btn=e.target.closest('.sp-btn');
    if(!btn)return;
    const stat=btn.dataset.stat;
    if(stat)allocStat(stat);
  });

  // Inventory — click to equip
  document.getElementById('inv-grid').addEventListener('click',(e)=>{
    const slot=e.target.closest('.inv-slot[data-inv]');
    if(!slot)return;
    const idx=parseInt(slot.dataset.inv,10);
    equipFromInventory(idx);
  });

  requestAnimationFrame(loop);
}
start();
</script>
