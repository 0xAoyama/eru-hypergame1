<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PARALLEL TREASURE — 並行世界トレハン</title>
<style>
@font-face{font-family:'DotFont';src:local('Courier New'),local('monospace');}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#ccc;font-family:'DotFont','Courier New',monospace;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;overflow-y:auto;-webkit-font-smoothing:none;}
#app{width:100%;max-width:420px;min-height:100vh;background:#0a0c1a;border-left:4px solid #e8e8e0;border-right:4px solid #e8e8e0;position:relative;display:flex;flex-direction:column;overflow:hidden;image-rendering:pixelated;}

/* Top bar */
#top-bar{background:#0d0f20;padding:6px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #e8e8e0;flex-shrink:0;}
#top-bar h1{font-size:13px;font-weight:900;color:#fa0;letter-spacing:2px;}
#top-bar .controls{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
#top-bar button,#top-bar select{background:#1a1d30;border:2px solid #3a3d50;color:#aab;padding:3px 7px;font-size:10px;font-family:inherit;cursor:pointer;}
#top-bar button:hover,#top-bar select:hover{border-color:#fa0;color:#fff;}
#top-bar button.active{border-color:#fa0;color:#fa0;}

/* Field canvas */
#field-wrap{position:relative;flex-shrink:0;border-bottom:3px solid #e8e8e0;}
#field-canvas{display:block;width:100%;height:180px;background:#0a0c1a;}

/* Distance display */
#dist-display{position:absolute;bottom:6px;right:8px;font-size:12px;font-weight:900;color:#fa0;text-shadow:1px 1px 0 #000,2px 2px 0 #000;}

/* Ghost timelines */
#ghost-bar{position:absolute;top:4px;left:4px;right:4px;display:flex;gap:2px;flex-direction:column;}
.ghost-line{height:3px;background:rgba(100,120,180,0.15);border-radius:1px;position:relative;}
.ghost-dot{position:absolute;width:5px;height:3px;background:rgba(100,180,255,0.3);border-radius:1px;top:0;}

/* Status comparison panel */
#status-panel{display:flex;gap:0;border-bottom:3px solid #e8e8e0;flex-shrink:0;}
.status-side{flex:1;padding:6px 8px;background:#111430;}
.status-side:first-child{border-right:2px solid #e8e8e0;}
.status-label{font-size:9px;font-weight:900;color:#fa0;letter-spacing:2px;margin-bottom:3px;text-align:center;}
.status-name{font-size:11px;font-weight:900;color:#fff;text-align:center;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-row{display:flex;justify-content:space-between;font-size:10px;padding:1px 0;}
.stat-key{color:#667a9a;}
.stat-val{color:#dde;font-weight:700;}
.stat-val.hp-low{color:#f66;}
.hp-bar-wrap{height:6px;background:#1a1a30;margin:2px 0 3px;border:1px solid #2a2d40;}
.hp-bar{height:100%;transition:width 0.2s;}
.hp-bar.player{background:#4c8;}
.hp-bar.enemy{background:#f44;}
.hp-bar.boss{background:#f4f;}

/* Equip panel */
#equip-panel{border-bottom:3px solid #e8e8e0;padding:6px 8px;background:#0e1025;flex-shrink:0;}
#equip-panel .panel-title{font-size:9px;font-weight:900;color:#889;letter-spacing:2px;margin-bottom:4px;}
#equip-slots{display:flex;gap:4px;flex-wrap:wrap;}
.eq-slot-box{flex:1;min-width:60px;background:#161830;border:2px solid #2a2d40;padding:4px;font-size:9px;text-align:center;}
.eq-slot-box .eq-icon{font-size:16px;display:block;margin-bottom:2px;}
.eq-slot-box .eq-label{color:#556;font-size:8px;}
.eq-slot-box .eq-name{color:#dde;font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eq-slot-box .eq-detail{color:#667;font-size:8px;}
.rarity-common{color:#aaa;}.rarity-uncommon{color:#4e8;}.rarity-rare{color:#4af;}.rarity-epic{color:#c4f;}.rarity-legendary{color:#fa0;}

/* Last drop */
#drop-banner{background:#1a1530;border-bottom:2px solid #e8e8e0;padding:4px 8px;font-size:10px;color:#889;flex-shrink:0;min-height:24px;}

/* LOG — the heart of the game */
#log-panel{flex:1;overflow-y:auto;padding:4px 8px;background:#0a0c1a;display:flex;flex-direction:column;min-height:200px;}
#log-panel .log-entry{padding:2px 0;font-size:10px;line-height:1.5;color:#556a80;}
#log-panel .log-entry.combat{color:#f88;}
#log-panel .log-entry.loot{color:#fa0;}
#log-panel .log-entry.levelup{color:#4f4;}
#log-panel .log-entry.boss{color:#f4f;}
#log-panel .log-entry.equip{color:#4af;}
#log-panel .log-entry.drop-stat{color:#fc6;}

/* Seed footer */
#seed-footer{font-size:9px;color:#334;text-align:center;padding:4px;background:#080a16;border-top:2px solid #e8e8e0;flex-shrink:0;}

/* Vignette overlay */
#app::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%);z-index:100;}

/* Scanline effect */
#app::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:101;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);}

@media(min-width:500px){
  body{align-items:center;padding:20px 0;}
  #app{min-height:calc(100vh - 40px);max-height:calc(100vh - 40px);border-top:4px solid #e8e8e0;border-bottom:4px solid #e8e8e0;border-radius:8px;overflow-y:auto;}
}
</style>
</head>
<body>

<div id="app">
  <div id="top-bar">
    <h1>PARALLEL TREASURE</h1>
    <div class="controls">
      <select id="strat-select" title="ステ振り方針">
        <option value="balanced">Bal</option>
        <option value="power">ATK</option>
        <option value="treasure">LUK</option>
        <option value="survival">VIT</option>
        <option value="speed">SPD</option>
      </select>
      <button id="btn-slow">×½</button>
      <button id="btn-normal" class="active">×1</button>
      <button id="btn-fast">×3</button>
      <button id="btn-turbo">×10</button>
      <button id="btn-pause">⏸</button>
      <button id="btn-reset">↺</button>
      <button id="btn-newseed">🎲</button>
    </div>
  </div>

  <div id="field-wrap">
    <canvas id="field-canvas"></canvas>
    <div id="dist-display">0km</div>
    <div id="ghost-bar">
      <div class="ghost-line"><div class="ghost-dot" id="g0"></div></div>
      <div class="ghost-line"><div class="ghost-dot" id="g1"></div></div>
      <div class="ghost-line"><div class="ghost-dot" id="g2"></div></div>
    </div>
  </div>

  <div id="status-panel">
    <div class="status-side" id="player-status">
      <div class="status-label">ゆうしゃ</div>
      <div class="status-name" id="p-name">Lv1 ゆうしゃ</div>
      <div class="hp-bar-wrap"><div class="hp-bar player" id="p-hp-bar" style="width:100%"></div></div>
      <div id="p-stats"></div>
    </div>
    <div class="status-side" id="enemy-status">
      <div class="status-label">てき</div>
      <div class="status-name" id="e-name">---</div>
      <div class="hp-bar-wrap"><div class="hp-bar enemy" id="e-hp-bar" style="width:0%"></div></div>
      <div id="e-stats"></div>
    </div>
  </div>

  <div id="equip-panel">
    <div class="panel-title">◆ そうび</div>
    <div id="equip-slots"></div>
  </div>

  <div id="drop-banner">—</div>

  <div id="log-panel"></div>

  <div id="seed-footer">SEED: ---</div>
</div>

<script>
'use strict';
// ===== Seeded RNG =====
function makeRNG(seed){
  let s=seed|0;if(s===0)s=1;
  return{next(){s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296;},
    nextInt(a,b){return a+Math.floor(this.next()*(b-a+1));},
    pick(arr){return arr[this.nextInt(0,arr.length-1)];},
    chance(p){return this.next()<p;},seed:seed};
}
function getSeed(){
  const p=new URLSearchParams(location.search);
  if(p.has('seed'))return parseInt(p.get('seed'),10)||1;
  return(Date.now()^(Math.random()*0xffff))&0x7fffffff;
}

// ===== Constants =====
const BOSS_INTERVAL=25;
const SLOT_NAMES=['ぶき','たて','よろい','ゆびわ','ペット'];
const SLOT_ICONS=['⚔️','🛡️','🧥','💍','🐾'];
const RARITIES=['common','uncommon','rare','epic','legendary'];
const RARITY_LABELS=['コモン','アンコモン','レア','エピック','レジェンダリ'];
const RARITY_COLORS=['#aaa','#4e8','#4af','#c4f','#fa0'];
const RARITY_MULT=[1,1.3,1.7,2.2,3];
const ENCHANT_POOL=[
  {id:'atk',label:'ATK+',fn:(v,s)=>{s.bonusAtk+=v;},range:[2,20]},
  {id:'vit',label:'VIT+',fn:(v,s)=>{s.bonusVit+=v;},range:[3,25]},
  {id:'spd',label:'SPD+',fn:(v,s)=>{s.bonusSpd+=v;},range:[1,10]},
  {id:'luk',label:'LUK+',fn:(v,s)=>{s.bonusLuk+=v;},range:[1,15]},
  {id:'crit',label:'クリティカル',fn:(v,s)=>{s.crit+=v;},range:[3,15]},
  {id:'lifesteal',label:'きゅうけつ',fn:(v,s)=>{s.lifesteal+=v;},range:[2,10]},
  {id:'poison',label:'どく',fn:(v,s)=>{s.poison+=v;},range:[2,12]},
  {id:'thorns',label:'はんげき',fn:(v,s)=>{s.thorns+=v;},range:[3,15]},
  {id:'chest',label:'たからばこ率+',fn:(v,s)=>{s.chestBonus+=v;},range:[3,20]},
  {id:'expup',label:'けいけんち+',fn:(v,s)=>{s.expBonus+=v;},range:[5,25]},
  {id:'regen',label:'じどうかいふく',fn:(v,s)=>{s.regen+=v;},range:[1,8]},
  {id:'int',label:'INT+',fn:(v,s)=>{s.bonusInt+=v;},range:[2,15]},
];
const ENEMY_NAMES=['スライム','ゴブリン','コボルド','スケルトン','バット','ウルフ','オーク','トロール','ガーゴイル','リザードマン','デーモン','ワイバーン','キメラ','リッチ','ドラゴン'];
const BOSS_NAMES=['やみのばんにん','えんごくのデーモン','ひょうけつのリヴァイアサン','しんえんのリッチ','しゅうえんのドラゴン'];
const PET_NAMES=['こいぬ','こねこ','ことり','ようせい','ドラゴンパピー','スライムくん','ゴーレムJr','フェニックスひな'];
const WEAPON_NAMES=['きのえだ','ショートソード','ロングソード','バトルアクス','カタナ','ハルバード','ダガー','まけん','せいけん','ルーンブレード'];
const SHIELD_NAMES=['きのたて','てつのたて','タワーシールド','まほうのたて','ドラゴンシールド','せいたて'];
const ARMOR_NAMES=['かわよろい','くさりかたびら','プレートメイル','ローブ','ミスリルアーマー','ドラゴンメイル'];
const RING_NAMES=['どうのゆびわ','ぎんのゆびわ','きんのゆびわ','ルビーリング','サファイアリング','エメラルドリング','ダイヤリング'];
const GEM_NAMES=['ローズクォーツ','アメジスト','トパーズ','サファイア','エメラルド','ルビー','ダイヤモンド'];
const EQUIP_NAME_POOL=[WEAPON_NAMES,SHIELD_NAMES,ARMOR_NAMES,RING_NAMES,PET_NAMES];

// ===== Game state =====
let R,seed,player,cells,gameTime,eventLog,lastDrop,paused,speedMult,strategy;
let canvas,ctx,sidebarDirty;
// Ghost parallel world positions
let ghosts=[{pos:0},{pos:0},{pos:0}];

// Visual state for field rendering
let worldScroll=0, stepPhase=0, combatAnim={lungeX:0,hitFlash:0,shakeX:0,shakeY:0,slashTimer:0};
let particles=[], floaters=[], envObjects=[];
let stars=[];

function initStars(count){
  stars=[];for(let i=0;i<count;i++)stars.push({x:Math.random(),y:Math.random()*0.35,size:Math.random()*1.5+0.5,blink:Math.random()*6});
}

function initEnvObjects(){
  envObjects=[];
  for(let i=0;i<40;i++){
    const t=R.next();
    let type;
    if(t<0.25)type='grass';
    else if(t<0.4)type='rock';
    else if(t<0.5)type='sign';
    else if(t<0.6)type='tree';
    else if(t<0.7)type='flower';
    else if(t<0.78)type='bush';
    else type='grass';
    envObjects.push({x:i*120+R.next()*80,type,h:R.next()*6+4,variant:R.nextInt(0,3)});
  }
}

function spawnParticle(x,y,color,count){
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*3,vy:-Math.random()*3-1,life:0.6+Math.random()*0.4,maxLife:1,color,size:Math.random()*3+1});
  }
}

function spawnFloater(x,y,text,color){
  floaters.push({x,y,text,color,life:1.2,maxLife:1.2});
}

function initGame(s){
  seed=s;R=makeRNG(seed);
  document.getElementById('seed-footer').textContent='SEED: '+seed;
  paused=false;speedMult=1;strategy='balanced';
  document.getElementById('strat-select').value='balanced';
  gameTime=0;eventLog=[];lastDrop=null;
  player={
    cell:0,lv:1,exp:0,expNext:10,
    baseAtk:5,baseInt:3,baseVit:10,baseSpd:5,baseLuk:3,
    hp:0,maxHp:0,
    bonusAtk:0,bonusInt:0,bonusVit:0,bonusSpd:0,bonusLuk:0,
    crit:5,lifesteal:0,poison:0,thorns:0,chestBonus:0,expBonus:0,regen:0,
    equips:[null,null,null,null,null],
    kills:0,bossKills:0,guard:0,
    combatTarget:null,combatTimer:0,moveTimer:0,regenTimer:0,
    floor:1,maxFloor:1,totalDistance:0,
  };
  recalcStats();player.hp=player.maxHp;
  cells=[];generateCells(0,80);
  ghosts=[{pos:0,speed:0.9+R.next()*0.4},{pos:0,speed:0.8+R.next()*0.5},{pos:0,speed:0.7+R.next()*0.6}];
  worldScroll=0;stepPhase=0;
  combatAnim={lungeX:0,hitFlash:0,shakeX:0,shakeY:0,slashTimer:0};
  particles=[];floaters=[];
  initStars(50);initEnvObjects();
  sidebarDirty=true;
  addLog('ぼうけんかいし！ Seed:'+seed,'levelup');
}

function generateCells(from,count){
  for(let i=from;i<from+count;i++){
    if(cells[i])continue;
    const cell={type:'empty',enemy:null};
    const dist=i+1;
    if(dist>0&&dist%BOSS_INTERVAL===0){cell.type='boss';cell.enemy=makeBoss(dist);}
    else if(R.chance(0.35+Math.min(dist*0.002,0.2))){cell.type='enemy';cell.enemy=makeEnemy(dist);}
    else if(R.chance(0.05)){cell.type='chest';}
    cells[i]=cell;
  }
}

function makeEnemy(dist){
  const tier=Math.min(Math.floor(dist/10),ENEMY_NAMES.length-1);
  const nameIdx=R.nextInt(Math.max(0,tier-2),tier);
  const lvl=Math.max(1,dist+R.nextInt(-2,2));
  const mult=1+dist*0.12;
  return{name:ENEMY_NAMES[nameIdx],lv:lvl,
    hp:Math.floor((15+lvl*6)*mult),maxHp:Math.floor((15+lvl*6)*mult),
    atk:Math.floor((3+lvl*2)*mult),int:Math.floor((1+lvl)*mult*0.5),
    vit:Math.floor((2+lvl*1.5)*mult*0.4),spd:Math.max(1,3+Math.floor(lvl*0.3)),
    luk:Math.floor(1+lvl*0.2),guard:0,
    exp:Math.floor(5+lvl*3+dist*0.5),isBoss:false,poisonDmg:0,
    power:Math.floor((3+lvl*2)*mult+(15+lvl*6)*mult*0.1)};
}

function makeBoss(dist){
  const bIdx=Math.min(Math.floor(dist/BOSS_INTERVAL)-1,BOSS_NAMES.length-1);
  const lvl=dist+5;const mult=2+dist*0.15;
  return{name:'【BOSS】'+BOSS_NAMES[Math.max(0,bIdx)],lv:lvl,
    hp:Math.floor((100+lvl*20)*mult),maxHp:Math.floor((100+lvl*20)*mult),
    atk:Math.floor((10+lvl*4)*mult),int:Math.floor((3+lvl*2)*mult*0.5),
    vit:Math.floor((5+lvl*3)*mult*0.4),spd:Math.max(2,5+Math.floor(lvl*0.2)),
    luk:Math.floor(2+lvl*0.3),guard:Math.floor(lvl*0.5),
    exp:Math.floor(50+lvl*15+dist*5),isBoss:true,poisonDmg:0,
    power:Math.floor((10+lvl*4)*mult+(100+lvl*20)*mult*0.05)};
}

function recalcStats(){
  player.bonusAtk=0;player.bonusInt=0;player.bonusVit=0;player.bonusSpd=0;player.bonusLuk=0;
  player.crit=5;player.lifesteal=0;player.poison=0;player.thorns=0;player.chestBonus=0;player.expBonus=0;player.regen=0;
  player.guard=0;
  for(const eq of player.equips){
    if(!eq)continue;
    if(eq.slot===1)player.guard+=Math.floor(eq.ilvl*RARITY_MULT[eq.rarity]*0.5);
    for(const ench of eq.enchants){
      const def=ENCHANT_POOL.find(e=>e.id===ench.id);
      if(def)def.fn(ench.val,player);
    }
  }
  const totalVit=player.baseVit+player.bonusVit;
  const oldMax=player.maxHp;
  player.maxHp=30+totalVit*5;
  if(oldMax>0&&player.hp>0)player.hp=Math.min(player.hp+(player.maxHp-oldMax),player.maxHp);
}

function totalAtk(){return player.baseAtk+player.bonusAtk;}
function totalInt(){return player.baseInt+player.bonusInt;}
function totalVit(){return player.baseVit+player.bonusVit;}
function totalSpd(){return player.baseSpd+player.bonusSpd;}
function totalLuk(){return player.baseLuk+player.bonusLuk;}
function playerPower(){return totalAtk()+totalInt()*0.5+totalVit()*0.3+totalSpd()*0.2+totalLuk()*0.1+player.guard*0.5;}

// ===== Equipment =====
function makeEquip(dist,slotHint){
  const slot=slotHint!=null?slotHint:R.nextInt(0,4);
  const luck=totalLuk();
  let rarIdx=0;const roll=R.next()*100;
  if(roll<1+luck*0.3)rarIdx=4;
  else if(roll<5+luck*0.5)rarIdx=3;
  else if(roll<15+luck*0.8)rarIdx=2;
  else if(roll<40+luck)rarIdx=1;
  const baseName=R.pick(EQUIP_NAME_POOL[slot]);
  const ilvl=Math.max(1,dist+R.nextInt(-3,3));
  const numEnch=rarIdx+1+((R.chance(0.2))?1:0);
  const enchants=[];const used=new Set();
  for(let i=0;i<numEnch&&i<ENCHANT_POOL.length;i++){
    let e,tries=0;
    do{e=R.pick(ENCHANT_POOL);tries++;}while(used.has(e.id)&&tries<20);
    if(used.has(e.id))continue;used.add(e.id);
    const val=R.nextInt(e.range[0],Math.floor(e.range[1]*RARITY_MULT[rarIdx]*(1+ilvl*0.02)));
    enchants.push({id:e.id,label:e.label,val});
  }
  return{name:baseName,slot,rarity:rarIdx,ilvl,enchants};
}

function equipScore(eq){
  if(!eq)return 0;
  let s=eq.ilvl*RARITY_MULT[eq.rarity];
  for(const e of eq.enchants)s+=e.val*1.5;return s;
}

function tryEquip(eq){
  const cur=player.equips[eq.slot];
  if(!cur||equipScore(eq)>equipScore(cur)){
    player.equips[eq.slot]=eq;recalcStats();
    addLog(SLOT_ICONS[eq.slot]+' Lv'+eq.ilvl+eq.name+'をそうび！','equip');
    return true;
  }
  return false;
}

// ===== Level up =====
function giveExp(amount){
  const bonus=1+player.expBonus/100;
  player.exp+=Math.floor(amount*bonus);
  while(player.exp>=player.expNext){
    player.exp-=player.expNext;player.lv++;
    player.expNext=Math.floor(10+player.lv*player.lv*1.5);
    doStatAlloc();player.hp=player.maxHp;
    addLog('★ レベルアップ！ ➜ Lv'+player.lv,'levelup');
  }
}
function doStatAlloc(){
  const pts=3;
  for(let i=0;i<pts;i++){
    switch(strategy){
      case'power':allocStat(['atk','atk','atk','spd'][R.nextInt(0,3)]);break;
      case'treasure':allocStat(['luk','luk','luk','spd'][R.nextInt(0,3)]);break;
      case'survival':allocStat(['vit','vit','int','vit'][R.nextInt(0,3)]);break;
      case'speed':allocStat(['spd','spd','atk','spd'][R.nextInt(0,3)]);break;
      default:allocStat(['atk','vit','spd','luk','int'][R.nextInt(0,4)]);break;
    }
  }
  recalcStats();
}
function allocStat(s){
  switch(s){case'atk':player.baseAtk++;break;case'int':player.baseInt++;break;
    case'vit':player.baseVit++;break;case'spd':player.baseSpd++;break;case'luk':player.baseLuk++;break;}
}

// ===== Event Log =====
function addLog(msg,cls){
  eventLog.unshift({msg,cls,t:gameTime});
  if(eventLog.length>300)eventLog.length=300;
  sidebarDirty=true;
}

// ===== Game Update =====
function update(dt){
  if(paused)return;
  const sDt=dt*speedMult;gameTime+=sDt;

  if(player.cell+30>=cells.length)generateCells(cells.length,60);

  const myCell=cells[player.cell];

  // Regen
  player.regenTimer+=sDt;
  if(player.regenTimer>=1){
    player.regenTimer-=1;
    if(player.regen>0&&player.hp<player.maxHp)player.hp=Math.min(player.maxHp,player.hp+player.regen);
    if(player.hp<player.maxHp*0.7){
      const intHeal=Math.floor(totalInt()*0.5);
      if(intHeal>0)player.hp=Math.min(player.maxHp,player.hp+intHeal);
    }
  }

  // Ghost parallel worlds
  for(const g of ghosts){g.pos+=(sDt*g.speed*(0.8+Math.sin(gameTime*0.3+g.speed)*0.3));}

  // Combat or move
  if(myCell&&myCell.enemy&&myCell.enemy.hp>0){
    player.combatTarget=myCell.enemy;
    player.combatTimer+=sDt;
    const atkInterval=Math.max(0.15,1.2-totalSpd()*0.03);
    if(player.combatTimer>=atkInterval){
      player.combatTimer-=atkInterval;
      let dmg=Math.max(1,totalAtk()+R.nextInt(-2,2));
      let critHit=false;
      if(R.chance(player.crit/100)){dmg=Math.floor(dmg*1.8);critHit=true;}
      myCell.enemy.hp-=dmg;
      if(player.poison>0)myCell.enemy.poisonDmg+=player.poison;
      if(myCell.enemy.poisonDmg>0){
        const pdmg=Math.floor(myCell.enemy.poisonDmg*0.3);
        myCell.enemy.hp-=pdmg;myCell.enemy.poisonDmg=Math.max(0,myCell.enemy.poisonDmg-pdmg*0.5);
      }
      if(player.lifesteal>0)player.hp=Math.min(player.maxHp,player.hp+Math.floor(dmg*player.lifesteal/100));
      // Enemy attacks back
      if(myCell.enemy.hp>0){
        let eDmg=Math.max(1,myCell.enemy.atk+R.nextInt(-1,1)-Math.floor(totalVit()*0.2)-Math.floor(player.guard*0.3));
        if(eDmg<1)eDmg=1;
        player.hp-=eDmg;
        if(player.thorns>0)myCell.enemy.hp-=Math.floor(eDmg*player.thorns/100);
      }

      if(myCell.enemy.hp<=0){
        const en=myCell.enemy;
        spawnParticle(190,80,en.isBoss?'#f4f':'#f84',12);
        spawnFloater(170,50,'DEFEAT!','#ff4');
        combatAnim.hitFlash=0.5;
        addLog(en.name+'をたおした！(+'+en.exp+'EXP)'+(en.isBoss?' 🏆':''),'combat');
        giveExp(en.exp);player.kills++;
        if(en.isBoss)player.bossKills++;
        // Drop
        const dropRate=0.25+totalLuk()*0.005+player.chestBonus/100;
        if(R.chance(dropRate)){
          const eq=makeEquip(player.cell);lastDrop=eq;
          const gem=R.pick(GEM_NAMES);
          const statGain=R.pick(['ATK','VIT','SPD','LUK','INT']);
          addLog(en.name+'がトレジャードロップ！','loot');
          addLog('Lv'+eq.ilvl+eq.name+'をゲット！('+RARITY_LABELS[eq.rarity]+')','loot');
          if(R.chance(0.3))addLog(en.name+'が'+gem+'をドロップ！('+statGain+'+1)','drop-stat');
          tryEquip(eq);
        }
        myCell.enemy=null;myCell.type='empty';player.combatTarget=null;
      }
      if(player.hp<=0){
        player.hp=player.maxHp;player.cell=Math.max(0,player.cell-5);
        addLog('ちからつきた… 5マスもどる','combat');
        player.combatTarget=null;
      }
    }
  } else {
    player.combatTarget=null;
    player.moveTimer+=sDt;
    const moveInterval=Math.max(0.1,0.5-totalSpd()*0.008);
    if(player.moveTimer>=moveInterval){
      player.moveTimer-=moveInterval;player.cell++;player.totalDistance++;
      player.floor=Math.floor(player.cell/BOSS_INTERVAL)+1;
      if(player.floor>player.maxFloor)player.maxFloor=player.floor;
      const c=cells[player.cell];
      if(c&&c.type==='chest'){
        const eq=makeEquip(player.cell);lastDrop=eq;
        addLog('たからばこはっけん！','loot');
        addLog('Lv'+eq.ilvl+eq.name+'をゲット！('+RARITY_LABELS[eq.rarity]+')','loot');
        tryEquip(eq);c.type='empty';
      }
    }
  }
  sidebarDirty=true;
}

// ===== Render field canvas =====
let prevEnemyHp={};

function updateVisualState(dt){
  const sDt=dt*speedMult;
  // World scroll — always scrolling when walking, stop when fighting
  const inCombat=!!(player.combatTarget&&player.combatTarget.hp>0);
  if(!inCombat&&!paused){
    worldScroll+=sDt*60;
    stepPhase+=sDt*8;
  } else if(inCombat){
    // Combat animation cycle
    combatAnim.slashTimer+=sDt*6;
    const phase=Math.sin(combatAnim.slashTimer);
    combatAnim.lungeX=phase>0.3?8*(phase-0.3)/0.7:0;
    if(phase>0.8){combatAnim.hitFlash=0.3;combatAnim.shakeX=(Math.random()-0.5)*3;combatAnim.shakeY=(Math.random()-0.5)*2;}
    // small idle bob even in combat
    stepPhase+=sDt*3;
  }
  // Decay combat visuals
  combatAnim.hitFlash=Math.max(0,combatAnim.hitFlash-dt*2);
  combatAnim.shakeX*=0.9;combatAnim.shakeY*=0.9;

  // Track enemy hp changes for damage numbers
  if(inCombat){
    const en=player.combatTarget;
    const key='e';
    if(prevEnemyHp[key]!==undefined&&en.hp<prevEnemyHp[key]){
      const dmg=prevEnemyHp[key]-en.hp;
      spawnFloater(180+Math.random()*20,70+Math.random()*10,'-'+dmg,'#ff4');
      spawnParticle(190,90,'#f84',4);
    }
    prevEnemyHp[key]=en.hp;
  }

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=3*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
  // Update floaters
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.y-=dt*40;f.life-=dt;
    if(f.life<=0)floaters.splice(i,1);
  }
}

function renderField(){
  const W=canvas.width/devicePixelRatio,H=canvas.height/devicePixelRatio;
  ctx.save();
  ctx.clearRect(0,0,W,H);

  const groundY=H*0.78;

  // === Sky gradient ===
  const skyGrad=ctx.createLinearGradient(0,0,0,groundY);
  skyGrad.addColorStop(0,'#080c22');skyGrad.addColorStop(0.5,'#0e1438');skyGrad.addColorStop(1,'#141a40');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,groundY);

  // === Stars (far background, very slow parallax) ===
  const starScroll=worldScroll*0.02;
  for(const s of stars){
    const sx=((s.x*W*3-starScroll)%W+W)%W;
    const bright=0.3+0.7*Math.abs(Math.sin(gameTime*0.5+s.blink));
    ctx.fillStyle='rgba(200,220,255,'+bright+')';
    ctx.fillRect(sx,s.y*H,s.size,s.size);
  }

  // === Far mountains (slow parallax) ===
  const mtScroll=worldScroll*0.05;
  ctx.fillStyle='#0f1530';
  ctx.beginPath();ctx.moveTo(0,groundY);
  for(let x=0;x<=W;x+=3){
    const wx=x+mtScroll;
    const h=Math.sin(wx*0.008)*18+Math.sin(wx*0.003)*30+Math.sin(wx*0.015)*8;
    ctx.lineTo(x,groundY-40-h);
  }
  ctx.lineTo(W,groundY);ctx.closePath();ctx.fill();

  // === Mid hills (medium parallax) ===
  const hillScroll=worldScroll*0.15;
  ctx.fillStyle='#131838';
  ctx.beginPath();ctx.moveTo(0,groundY);
  for(let x=0;x<=W;x+=3){
    const wx=x+hillScroll;
    const h=Math.sin(wx*0.012)*12+Math.sin(wx*0.025)*8+Math.cos(wx*0.007)*15;
    ctx.lineTo(x,groundY-15-h);
  }
  ctx.lineTo(W,groundY);ctx.closePath();ctx.fill();

  // === Ground ===
  const gndGrad=ctx.createLinearGradient(0,groundY,0,H);
  gndGrad.addColorStop(0,'#1e2440');gndGrad.addColorStop(1,'#0e1225');
  ctx.fillStyle=gndGrad;ctx.fillRect(0,groundY,W,H-groundY);

  // Ground surface line
  ctx.strokeStyle='#3a4060';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(W,groundY);ctx.stroke();

  // === Tile grid lines on ground (scrolling) ===
  const tileW=32;
  const tileScroll=worldScroll%tileW;
  ctx.strokeStyle='rgba(60,70,110,0.25)';ctx.lineWidth=1;
  for(let x=-tileW;x<W+tileW;x+=tileW){
    const tx=x-tileScroll;
    ctx.beginPath();ctx.moveTo(tx,groundY);ctx.lineTo(tx,H);ctx.stroke();
  }
  // Horizontal ground lines
  ctx.strokeStyle='rgba(50,60,100,0.15)';
  for(let y=groundY+12;y<H;y+=12){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // === Road dashes ===
  const dashScroll=worldScroll%20;
  ctx.strokeStyle='#2a3055';ctx.lineWidth=1;
  const roadY=groundY+6;
  for(let x=-20;x<W+20;x+=20){
    const dx=x-dashScroll;
    ctx.beginPath();ctx.moveTo(dx,roadY);ctx.lineTo(dx+10,roadY);ctx.stroke();
  }

  // === Environment objects (grass, rocks, signs, trees) ===
  const envScroll=worldScroll*0.95;
  for(const obj of envObjects){
    const ox=((obj.x-envScroll)%(40*120)+40*120)%(40*120)-200;
    if(ox<-40||ox>W+40)continue;
    const baseY=groundY;
    ctx.save();
    switch(obj.type){
      case 'grass':
        ctx.strokeStyle='#2a4a30';ctx.lineWidth=1;
        for(let i=0;i<3;i++){
          const gx=ox+i*4-4;
          const sway=Math.sin(gameTime*2+obj.x+i)*2;
          ctx.beginPath();ctx.moveTo(gx,baseY);ctx.lineTo(gx+sway,baseY-obj.h-2);ctx.stroke();
        }
        break;
      case 'rock':
        ctx.fillStyle='#2a2d45';
        ctx.beginPath();ctx.moveTo(ox-6,baseY);ctx.lineTo(ox-4,baseY-obj.h);ctx.lineTo(ox+4,baseY-obj.h+1);ctx.lineTo(ox+7,baseY);ctx.closePath();ctx.fill();
        ctx.fillStyle='#353858';ctx.fillRect(ox-2,baseY-obj.h+1,3,2);
        break;
      case 'sign':
        ctx.fillStyle='#4a3820';ctx.fillRect(ox-1,baseY-14,2,14);
        ctx.fillStyle='#6a5030';ctx.fillRect(ox-6,baseY-18,12,7);
        ctx.fillStyle='#8a7050';ctx.fillRect(ox-4,baseY-16,8,3);
        break;
      case 'tree':
        ctx.fillStyle='#3a2818';ctx.fillRect(ox-2,baseY-20,4,20);
        ctx.fillStyle='#1a3a1a';
        ctx.beginPath();ctx.arc(ox,baseY-26,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#224a22';
        ctx.beginPath();ctx.arc(ox+3,baseY-30,7,0,Math.PI*2);ctx.fill();
        break;
      case 'flower':
        ctx.strokeStyle='#2a5a2a';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(ox,baseY);ctx.lineTo(ox,baseY-8);ctx.stroke();
        ctx.fillStyle=['#f48','#fa0','#48f','#f4f'][obj.variant];
        ctx.beginPath();ctx.arc(ox,baseY-9,2.5,0,Math.PI*2);ctx.fill();
        break;
      case 'bush':
        ctx.fillStyle='#1a3518';
        ctx.beginPath();ctx.arc(ox,baseY-5,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#224020';
        ctx.beginPath();ctx.arc(ox+4,baseY-6,5,0,Math.PI*2);ctx.fill();
        break;
    }
    ctx.restore();
  }

  // === Ghost runners (parallel worlds, thin silhouettes in background) ===
  for(let i=0;i<3;i++){
    const gx=((ghosts[i].pos*30)%(W*0.8))+W*0.1;
    const gy=groundY-6;
    ctx.globalAlpha=0.12;
    ctx.fillStyle=['#4af','#a4f','#4fa'][i];
    // tiny running figure
    const bob2=Math.sin(gameTime*6+i*2)*2;
    ctx.fillRect(gx-2,gy-10+bob2,4,8);
    ctx.fillRect(gx-1,gy-12+bob2,2,3);
    ctx.globalAlpha=1;
  }

  // === Upcoming cells — enemies, chests approaching from right ===
  const inCombat=!!(player.combatTarget&&player.combatTarget.hp>0);
  const cellW=40;
  const playerScreenX=W*0.28;

  // Draw upcoming content
  for(let offset=1;offset<=8;offset++){
    const cellIdx=player.cell+offset;
    if(cellIdx<0||cellIdx>=cells.length)continue;
    const cell=cells[cellIdx];
    const moveProgress=player.moveTimer/(Math.max(0.1,0.5-totalSpd()*0.008));
    const ox=playerScreenX+offset*cellW-(inCombat?0:moveProgress*cellW);
    if(ox<0||ox>W+30)continue;

    if(cell&&cell.enemy&&cell.enemy.hp>0){
      const en=cell.enemy;
      const ey=groundY-20;
      // Approaching enemy
      const bobE=Math.sin(gameTime*4+offset)*2;
      ctx.fillStyle=en.isBoss?'#a030a0':'#a03030';
      const sz=en.isBoss?14:10;
      // Body
      ctx.fillRect(ox-sz/2,ey-sz+bobE,sz,sz);
      // Eyes
      ctx.fillStyle='#f44';
      ctx.fillRect(ox-3,ey-sz+3+bobE,2,2);
      ctx.fillRect(ox+1,ey-sz+3+bobE,2,2);
      // Horns for boss
      if(en.isBoss){
        ctx.fillStyle='#c040c0';
        ctx.fillRect(ox-sz/2-2,ey-sz-4+bobE,3,5);
        ctx.fillRect(ox+sz/2-1,ey-sz-4+bobE,3,5);
      }
      // HP bar
      const ehpPct=en.hp/en.maxHp;
      ctx.fillStyle='#300';ctx.fillRect(ox-12,ey-sz-6+bobE,24,3);
      ctx.fillStyle=en.isBoss?'#f4f':'#f44';ctx.fillRect(ox-12,ey-sz-6+bobE,Math.max(0,24*ehpPct),3);
      // Name
      ctx.fillStyle='#888';ctx.font='7px monospace';
      ctx.fillText('Lv'+en.lv,ox-10,ey-sz-8+bobE);
    }

    if(cell&&cell.type==='chest'){
      const cy=groundY-14;
      const shine=Math.sin(gameTime*3+offset)*0.3+0.7;
      ctx.fillStyle='rgb('+Math.floor(180*shine)+','+Math.floor(120*shine)+','+Math.floor(30*shine)+')';
      ctx.fillRect(ox-7,cy-8,14,10);
      ctx.fillStyle='#fa0';ctx.fillRect(ox-2,cy-6,4,3);
      ctx.strokeStyle='#a08020';ctx.lineWidth=1;
      ctx.strokeRect(ox-7,cy-8,14,10);
    }
  }

  // === Current enemy (at combat position, right of player) ===
  if(inCombat){
    const en=player.combatTarget;
    const ex=playerScreenX+50+combatAnim.shakeX;
    const ey=groundY-20+combatAnim.shakeY;
    const bobE=Math.sin(gameTime*5)*1.5;
    const sz=en.isBoss?16:12;

    // Enemy body
    ctx.fillStyle=en.isBoss?'#8020a0':'#a03030';
    ctx.fillRect(ex-sz/2,ey-sz+bobE,sz,sz);
    // Eyes
    ctx.fillStyle=combatAnim.hitFlash>0?'#fff':'#f44';
    ctx.fillRect(ex-3,ey-sz+3+bobE,2,2);
    ctx.fillRect(ex+2,ey-sz+3+bobE,2,2);
    // Mouth
    ctx.fillStyle='#800';ctx.fillRect(ex-2,ey-sz+7+bobE,4,2);
    if(en.isBoss){
      ctx.fillStyle='#a040d0';
      ctx.fillRect(ex-sz/2-2,ey-sz-5+bobE,3,6);
      ctx.fillRect(ex+sz/2-1,ey-sz-5+bobE,3,6);
    }
    // Hit flash overlay
    if(combatAnim.hitFlash>0){
      ctx.fillStyle='rgba(255,255,255,'+combatAnim.hitFlash+')';
      ctx.fillRect(ex-sz/2-1,ey-sz-1+bobE,sz+2,sz+2);
    }
    // Enemy HP bar
    const ehpPct=en.hp/en.maxHp;
    ctx.fillStyle='#300';ctx.fillRect(ex-14,ey-sz-8+bobE,28,4);
    ctx.fillStyle=en.isBoss?'#f4f':'#f44';ctx.fillRect(ex-14,ey-sz-8+bobE,Math.max(0,28*ehpPct),4);
    ctx.fillStyle='#ccc';ctx.font='bold 8px monospace';
    ctx.fillText(en.name,ex-14,ey-sz-12+bobE);

    // Slash effect
    if(combatAnim.lungeX>4){
      ctx.strokeStyle='rgba(255,255,150,0.7)';ctx.lineWidth=2;
      ctx.beginPath();
      const sx=ex-8,sy=ey-sz+bobE;
      ctx.moveTo(sx-6,sy-4);ctx.lineTo(sx+8,sy+6);
      ctx.moveTo(sx-4,sy+6);ctx.lineTo(sx+6,sy-4);
      ctx.stroke();
    }
  }

  // === Player character (pixel art hero) ===
  const px=playerScreenX+combatAnim.lungeX;
  const bob=Math.sin(stepPhase)*3;
  const py=groundY-22+bob;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(px,groundY,8,3,0,0,Math.PI*2);ctx.fill();

  // Body
  ctx.fillStyle='#3070d0';ctx.fillRect(px-5,py-6,10,10); // torso
  // Head
  ctx.fillStyle='#e8c090';ctx.fillRect(px-4,py-12,8,7);
  // Hair
  ctx.fillStyle='#604020';ctx.fillRect(px-4,py-14,8,4);
  // Eyes
  ctx.fillStyle='#222';ctx.fillRect(px+1,py-10,2,2);ctx.fillRect(px+4,py-10,1,2);
  // Legs — walking animation
  const legPhase=Math.sin(stepPhase*1.1);
  ctx.fillStyle='#404880';
  ctx.fillRect(px-3,py+4,3,5+legPhase*2);
  ctx.fillRect(px+1,py+4,3,5-legPhase*2);
  // Feet
  ctx.fillStyle='#604020';
  ctx.fillRect(px-4,py+8+legPhase*2,4,2);
  ctx.fillRect(px+1,py+8-legPhase*2,4,2);
  // Arm + weapon swing
  const armSwing=inCombat?Math.sin(combatAnim.slashTimer*2)*6:Math.sin(stepPhase*0.8)*3;
  ctx.fillStyle='#e8c090';
  ctx.save();
  ctx.translate(px+5,py-3);ctx.rotate(armSwing*0.15);
  ctx.fillRect(0,-2,7,3); // arm
  // Sword
  ctx.fillStyle='#c0c0d0';ctx.fillRect(6,-3,2,8);
  ctx.fillStyle='#fa0';ctx.fillRect(5,-1,4,2); // guard
  ctx.restore();
  // Shield on left arm
  ctx.fillStyle='#4060a0';
  ctx.fillRect(px-7,py-5,3,7);
  ctx.fillStyle='#5080c0';ctx.fillRect(px-6,py-3,1,3);

  // HP bar above player
  const hpPct=player.hp/player.maxHp;
  ctx.fillStyle='#030';ctx.fillRect(px-12,py-20,24,4);
  ctx.fillStyle=hpPct>0.3?'#4c8':'#f44';ctx.fillRect(px-12,py-20,Math.max(0,24*hpPct),4);
  // Lv label
  ctx.fillStyle='#fa0';ctx.font='bold 8px monospace';
  ctx.fillText('Lv'+player.lv,px-10,py-22);

  // === Particles ===
  for(const p of particles){
    const alpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;ctx.globalAlpha=alpha;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  }
  ctx.globalAlpha=1;

  // === Floating damage numbers ===
  for(const f of floaters){
    const alpha=Math.min(1,f.life/0.3);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=f.color;ctx.font='bold 11px monospace';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;

  // === Floor/Distance overlay ===
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,H-14,W,14);
  ctx.fillStyle='#667';ctx.font='9px monospace';
  ctx.fillText('Floor '+player.floor+'  |  '+player.kills+' kills',4,H-4);

  ctx.restore();

  // Distance display
  document.getElementById('dist-display').textContent=player.totalDistance+'km';

  // Update ghost dots
  for(let i=0;i<3;i++){
    const dot=document.getElementById('g'+i);
    if(dot){const pct=((ghosts[i].pos*2)%100);dot.style.left=pct+'%';}
  }
}

// ===== UI Updates =====
function updateUI(){
  // Player status
  document.getElementById('p-name').textContent='Lv'+player.lv+' ゆうしゃ';
  const hpPct=Math.max(0,player.hp/player.maxHp*100);
  const pBar=document.getElementById('p-hp-bar');
  pBar.style.width=hpPct+'%';
  pBar.className='hp-bar player';

  const ps=document.getElementById('p-stats');
  ps.innerHTML=
    sRow('HP',player.hp+'/'+player.maxHp,hpPct<30)+
    sRow('ATK',totalAtk())+sRow('INT',totalInt())+
    sRow('VIT',totalVit())+sRow('SPD',totalSpd())+
    sRow('LUK',totalLuk())+sRow('ガード',player.guard)+
    sRow('つよさ',Math.floor(playerPower()));

      sRow('HP',Math.max(0,en.hp)+'/'+en.maxHp)+
      sRow('ATK',en.atk)+sRow('INT',en.int)+
      sRow('VIT',en.vit)+sRow('SPD',en.spd)+
      sRow('LUK',en.luk)+sRow('ガード',en.guard)+
      sRow('つよさ',en.power);
  } else {
    document.getElementById('e-name').textContent='---';
    document.getElementById('e-hp-bar').style.width='0%';
    document.getElementById('e-stats').innerHTML=
      sRow('HP','---')+sRow('ATK','---')+sRow('INT','---')+
      sRow('VIT','---')+sRow('SPD','---')+sRow('LUK','---')+
      sRow('ガード','---')+sRow('つよさ','---');
  }

  // Equip slots
  const es=document.getElementById('equip-slots');
  es.innerHTML=player.equips.map((eq,i)=>{
    const icon=SLOT_ICONS[i];
    if(!eq)return '<div class="eq-slot-box"><span class="eq-icon">'+icon+'</span><span class="eq-label">'+SLOT_NAMES[i]+'</span><span class="eq-name" style="color:#334">—</span></div>';
    return '<div class="eq-slot-box"><span class="eq-icon">'+icon+'</span><span class="eq-label">'+SLOT_NAMES[i]+'</span><span class="eq-name rarity-'+RARITIES[eq.rarity]+'">'+eq.name+'</span><span class="eq-detail">Lv'+eq.ilvl+' '+RARITY_LABELS[eq.rarity]+'</span></div>';
  }).join('');

  // Drop banner
  const db=document.getElementById('drop-banner');
  if(lastDrop){
    db.innerHTML='◆ <span class="rarity-'+RARITIES[lastDrop.rarity]+'">Lv'+lastDrop.ilvl+' '+lastDrop.name+'</span> ('+RARITY_LABELS[lastDrop.rarity]+') '+lastDrop.enchants.map(e=>e.label+':'+e.val).join(' ');
  } else {
    db.textContent='Floor '+player.floor+' / '+player.totalDistance+'km / たおした:'+player.kills;
  }

  // Event log
  updateLog();
}

function sRow(label,val,warn){
  return '<div class="stat-row"><span class="stat-key">'+label+'</span><span class="stat-val'+(warn?' hp-low':'')+'">'+val+'</span></div>';
}

function updateLog(){
  const lp=document.getElementById('log-panel');
  const show=eventLog.slice(0,100);
  let html='';
  for(const e of show){
    html+='<div class="log-entry'+(e.cls?' '+e.cls:'')+'">'+e.msg+'</div>';
  }
  lp.innerHTML=html;
}

// ===== Main loop =====
let lastTime=0,uiTimer=0;
function loop(ts){
  if(!lastTime)lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts;
  update(dt);updateVisualState(dt);renderField();
  uiTimer+=dt;
  if(sidebarDirty&&uiTimer>0.2){updateUI();sidebarDirty=false;uiTimer=0;}
  requestAnimationFrame(loop);
}

// ===== Init =====
function resizeCanvas(){
  const wrap=document.getElementById('field-wrap');
  const w=wrap.clientWidth;
  const h=180;
  canvas.width=w*devicePixelRatio;
  canvas.height=h*devicePixelRatio;
  canvas.style.height=h+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}

function start(){
  canvas=document.getElementById('field-canvas');
  ctx=canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
  const s=getSeed();initGame(s);

  document.getElementById('btn-pause').addEventListener('click',()=>{
    paused=!paused;document.getElementById('btn-pause').textContent=paused?'▶':'⏸';});
  const speedBtns=[['btn-slow',0.5],['btn-normal',1],['btn-fast',3],['btn-turbo',10]];
  for(const[id,spd] of speedBtns){
    document.getElementById(id).addEventListener('click',()=>{
      speedMult=spd;
      for(const[sid] of speedBtns)document.getElementById(sid).classList.remove('active');
      document.getElementById(id).classList.add('active');
    });
  }
  document.getElementById('btn-reset').addEventListener('click',()=>{initGame(seed);});
  document.getElementById('btn-newseed').addEventListener('click',()=>{
    const ns=(Date.now()^(Math.random()*0xffff))&0x7fffffff;
    history.replaceState(null,'','?seed='+ns);initGame(ns);
  });
  document.getElementById('strat-select').addEventListener('change',(e)=>{
    strategy=e.target.value;addLog('ほうしんへんこう: '+strategy,'');
  });
  requestAnimationFrame(loop);
}
start();
</script>
