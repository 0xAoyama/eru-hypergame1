<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>聖杯の騎士団</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#06060c;color:#d4c8a0;font-family:'Segoe UI','Hiragino Kaku Gothic ProN',sans-serif;display:flex;justify-content:center;min-height:100vh;overflow:hidden}
#game{width:100%;max-width:440px;height:100vh;display:flex;flex-direction:column;background:#0a0a14}

/* ── Top: Floor bar ── */
#floor-bar{padding:6px 12px;background:linear-gradient(90deg,#10101c,#18122a,#10101c);border-bottom:1px solid #2a1a3a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#floor-bar .floor{font-weight:800;color:#c8b8ff;font-size:15px}
#floor-bar .info{font-size:12px;display:flex;gap:10px}
#floor-bar .heal-ct{color:#ff6688}
#floor-bar .spd{color:#888;cursor:pointer}

/* ── Dungeon view (canvas) ── */
#dungeon-wrap{flex-shrink:0;height:240px;position:relative;overflow:hidden;border-bottom:1px solid #1a1a2a}
#dcv{display:block;width:100%;height:100%}
/* Enemy HUD overlay on canvas */
#enemy-hud{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;width:80%}
.eh-name{font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 4px #000,0 0 10px rgba(255,80,80,0.3)}
.eh-hp-bg{height:6px;background:rgba(0,0,0,0.6);border-radius:3px;overflow:hidden;margin-top:3px;border:1px solid rgba(255,255,255,0.1)}
.eh-hp{height:100%;background:linear-gradient(90deg,#c33,#f66);border-radius:3px;transition:width .2s}
.eh-stats{font-size:10px;color:rgba(255,200,200,0.7);margin-top:2px}

/* ── Combat log ── */
#log-area{flex-shrink:0;height:80px;overflow-y:auto;padding:4px 10px;background:#08080f;border-bottom:1px solid #1a1a2a;font-size:11px;line-height:1.6}
#log-area .dmg{color:#f88}#log-area .heal{color:#8f8}#log-area .skill{color:#a8f}#log-area .info{color:#666}#log-area .drop{color:#fc6}

/* ── Bottom section (scrollable): party + inventory ── */
#bottom{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}

/* Party row */
.party-row{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;flex-shrink:0;padding-bottom:2px}
.pm{flex:0 0 auto;width:80px;background:linear-gradient(180deg,#14122a,#18162e);border:1.5px solid #2a2a4a;border-radius:10px;padding:6px 4px;text-align:center;cursor:pointer;transition:border-color .15s}
.pm.sel{border-color:#8a6aee;box-shadow:0 0 10px rgba(120,80,240,0.2)}
.pm.dead{opacity:.3;filter:grayscale(.9)}
.pm .av{font-size:22px}
.pm .nm{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm .lv{font-size:9px;color:#888}
.pm .hpb{height:4px;background:#1a0a0a;border-radius:2px;margin-top:3px;overflow:hidden}
.pm .hp{height:100%;border-radius:2px;transition:width .3s}
.pm .hp.hi{background:linear-gradient(90deg,#3a3,#6e6)}.pm .hp.mid{background:linear-gradient(90deg,#cc8,#ee6)}.pm .hp.lo{background:linear-gradient(90deg,#c44,#f66)}
.pm .eq{font-size:8px;color:#555;margin-top:2px;height:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Heal + controls */
.ctrl-row{display:flex;gap:6px;align-items:center;flex-shrink:0}
button{background:#1e1e30;color:#d4c8a0;border:1px solid #3a3a5a;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
button:hover{background:#2a2a44}
button:active{transform:scale(.96)}
button:disabled{opacity:.3;cursor:default;transform:none}
.btn-heal{background:linear-gradient(135deg,#2a1030,#3a1040);border-color:#882266;color:#ff88aa;flex:1}
.btn-heal:hover:not(:disabled){background:#441050}
.btn-heal.reserved{border-color:#ff6688;box-shadow:0 0 12px rgba(255,100,130,0.3);animation:hp 1s infinite}
@keyframes hp{0%,100%{box-shadow:0 0 6px rgba(255,100,130,0.15)}50%{box-shadow:0 0 14px rgba(255,100,130,0.4)}}

/* Inventory */
.inv-title{font-size:11px;color:#6a5a8a;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.inv-slot{background:#12101e;border:1.5px solid #2a2a3a;border-radius:8px;padding:5px 3px;text-align:center;min-height:48px;cursor:pointer;transition:all .15s;font-size:10px}
.inv-slot:hover{border-color:#5a4a8a;background:#1a1830}
.inv-slot.empty{opacity:.3;cursor:default}
.inv-slot.sel{border-color:#ffd700;box-shadow:0 0 8px rgba(255,215,0,0.15)}
.inv-slot .iname{font-size:8px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-slot .ist{font-size:7px;color:#888}
.r-Common{color:#999}.r-Uncommon{color:#4c4}.r-Rare{color:#48f}.r-Epic{color:#c4f}

/* Equip detail */
.eq-detail{background:#14122a;border:1px solid #3a2a5a;border-radius:10px;padding:8px;font-size:11px}
.eq-detail .tl{color:#c8b8ff;font-weight:600;margin-bottom:4px}
.eq-detail .st{color:#aaa;margin-bottom:4px}
.eq-detail button{font-size:10px;padding:4px 8px;margin:2px}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#06060c}::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
</style>
</head>
<body>
<div id="game">
  <div id="floor-bar"></div>
  <div id="dungeon-wrap">
    <canvas id="dcv" width="440" height="240"></canvas>
    <div id="enemy-hud"></div>
  </div>
  <div id="log-area"></div>
  <div id="bottom"></div>
</div>
<script>
'use strict';

// ── Audio ──
const AC=window.AudioContext||window.webkitAudioContext;let actx;
function ea(){if(!actx)actx=new AC()}
function sfx(t){ea();if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);const n=actx.currentTime;
switch(t){
case'hit':o.type='square';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(80,n+.1);g.gain.setValueAtTime(.12,n);g.gain.exponentialRampToValueAtTime(.001,n+.1);o.start(n);o.stop(n+.1);break;
case'crit':o.type='sawtooth';o.frequency.setValueAtTime(400,n);o.frequency.exponentialRampToValueAtTime(100,n+.15);g.gain.setValueAtTime(.13,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.start(n);o.stop(n+.15);break;
case'heal':o.type='sine';o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.08);o.frequency.setValueAtTime(784,n+.16);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.start(n);o.stop(n+.3);break;
case'drop':o.type='triangle';o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(1200,n+.15);g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.001,n+.2);o.start(n);o.stop(n+.2);break;
case'die':o.type='sawtooth';o.frequency.setValueAtTime(250,n);o.frequency.exponentialRampToValueAtTime(40,n+.6);g.gain.setValueAtTime(.13,n);g.gain.exponentialRampToValueAtTime(.001,n+.6);o.start(n);o.stop(n+.6);break;
case'boss':o.type='sawtooth';o.frequency.setValueAtTime(60,n);o.frequency.exponentialRampToValueAtTime(40,n+.5);g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.5);o.start(n);o.stop(n+.5);break;
case'lvl':o.type='sine';o.frequency.setValueAtTime(440,n);o.frequency.setValueAtTime(554,n+.1);o.frequency.setValueAtTime(659,n+.2);o.frequency.setValueAtTime(880,n+.3);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.45);o.start(n);o.stop(n+.45);break;
case'equip':o.type='sine';o.frequency.setValueAtTime(800,n);o.frequency.setValueAtTime(1000,n+.05);g.gain.setValueAtTime(.06,n);g.gain.exponentialRampToValueAtTime(.001,n+.08);o.start(n);o.stop(n+.08);break;
}}

// ── Data ──
const CHARS=[
{id:'amelia',name:'アメリア',cls:'Warrior',emoji:'⚔️',color:'#cc4444',hp:130,atk:28,def:14,dex:10,spd:12,skill:'パワースラッシュ',sCh:.25,sMul:1.8},
{id:'yuri',name:'ユーリ',cls:'Thief',emoji:'🗡️',color:'#44aa44',hp:90,atk:22,def:8,dex:28,spd:22,skill:'急所突き',sCh:.2,sMul:2.2},
{id:'bolton',name:'ボルトン',cls:'Fighter',emoji:'🪓',color:'#aa6622',hp:110,atk:26,def:12,dex:12,spd:14,skill:'ウォークライ',sCh:.22,sMul:2.0},
{id:'tristan',name:'トリスタン',cls:'Priest',emoji:'✝️',color:'#aaaa44',hp:85,atk:12,def:10,dex:12,spd:10,skill:'癒しの光',sCh:.35,sMul:0,isHealer:true},
{id:'delfina',name:'デルフィナ',cls:'Ranger',emoji:'🏹',color:'#44aaaa',hp:95,atk:24,def:9,dex:22,spd:18,skill:'貫通射撃',sCh:.22,sMul:2.0},
];
const ENEMIES=[
{name:'スライム',emoji:'🟢',t:1,hp:45,atk:8,def:2,spd:6,xp:4},
{name:'ゴブリン',emoji:'👺',t:1,hp:60,atk:12,def:4,spd:8,xp:5},
{name:'コウモリ',emoji:'🦇',t:1,hp:35,atk:10,def:2,spd:14,xp:3},
{name:'スケルトン',emoji:'💀',t:2,hp:85,atk:18,def:8,spd:10,xp:8},
{name:'オーク',emoji:'👹',t:2,hp:120,atk:22,def:10,spd:7,xp:10},
{name:'ダークエルフ',emoji:'🧝',t:2,hp:80,atk:26,def:6,spd:16,xp:9},
{name:'ミノタウロス',emoji:'🐂',t:3,hp:170,atk:32,def:14,spd:9,xp:14},
{name:'ワイバーン',emoji:'🐉',t:3,hp:150,atk:36,def:12,spd:18,xp:16},
{name:'デーモン',emoji:'😈',t:3,hp:200,atk:38,def:16,spd:12,xp:18},
{name:'リッチ',emoji:'🧙',t:4,hp:220,atk:42,def:14,spd:14,xp:22},
{name:'ドラゴン',emoji:'🐲',t:4,hp:280,atk:46,def:20,spd:10,xp:28},
];
const BOSSES=[
{name:'スライムキング',emoji:'👑',t:1},{name:'骨の将軍',emoji:'☠️',t:2},
{name:'魔竜ヴァルムング',emoji:'🐲',t:3},{name:'深淵の魔王',emoji:'👿',t:4},
];
const WEAPONS=[
{name:'ショートソード',cls:['Warrior','Fighter'],t:1,atk:5},
{name:'ロングソード',cls:['Warrior','Fighter'],t:2,atk:10},
{name:'バスタードソード',cls:['Warrior','Fighter'],t:3,atk:16},
{name:'聖剣フラガラッハ',cls:['Warrior','Fighter'],t:4,atk:24},
{name:'ダガー',cls:['Thief'],t:1,atk:3,dex:4},{name:'アサシンブレード',cls:['Thief'],t:2,atk:7,dex:8},
{name:'影縫いの短剣',cls:['Thief'],t:3,atk:12,dex:14},{name:'虚無の刃',cls:['Thief'],t:4,atk:18,dex:20},
{name:'ショートボウ',cls:['Ranger'],t:1,atk:4,dex:2},{name:'ロングボウ',cls:['Ranger'],t:2,atk:9,dex:5},
{name:'コンポジットボウ',cls:['Ranger'],t:3,atk:14,dex:9},{name:'銀弓アルテミス',cls:['Ranger'],t:4,atk:22,dex:14},
{name:'木の杖',cls:['Priest'],t:1,atk:3,def:2},{name:'ルーンスタッフ',cls:['Priest'],t:2,atk:7,def:4},
{name:'賢者の杖',cls:['Priest'],t:3,atk:12,def:6},{name:'星杖コスモス',cls:['Priest'],t:4,atk:18,def:10},
];
const ARMORS=[
{name:'革の鎧',cls:null,t:1,def:3,hp:10},{name:'チェインメイル',cls:null,t:2,def:7,hp:20},
{name:'ミスリルメイル',cls:null,t:3,def:12,hp:35},{name:'ドラゴンアーマー',cls:['Warrior','Fighter'],t:4,def:20,hp:55},
{name:'忍びの衣',cls:['Thief','Ranger'],t:2,def:4,hp:12,dex:6},{name:'影の外套',cls:['Thief','Ranger'],t:3,def:7,hp:20,dex:12},
{name:'魔導師のローブ',cls:['Priest'],t:2,def:3,hp:15,atk:4},{name:'星霊のローブ',cls:['Priest'],t:3,def:5,hp:25,atk:10},
{name:'旅人の服',cls:null,t:1,def:1,hp:5},
];
const ALL_EQ=[...WEAPONS,...ARMORS];
const RMUL={Common:1,Uncommon:1.35,Rare:1.75,Epic:2.3};
const RCOL={Common:'#999',Uncommon:'#4c4',Rare:'#48f',Epic:'#c4f'};

// ── Helpers ──
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function ch(p){return Math.random()<p}

function genEquip(floor){
  const tm=Math.min(4,Math.ceil(floor/6)+1);
  const pool=ALL_EQ.filter(e=>e.t<=tm);if(!pool.length)return null;
  const b=pick(pool);
  const r=Math.random(),rar=r<.48?'Common':r<.76?'Uncommon':r<.93?'Rare':'Epic';
  const m=RMUL[rar],isW=WEAPONS.includes(b);
  return{name:b.name,isW,cls:b.cls,rar,atk:Math.round((b.atk||0)*m),def:Math.round((b.def||0)*m),hp:Math.round((b.hp||0)*m),dex:Math.round((b.dex||0)*m)};
}
function statStr(it){const p=[];if(it.atk)p.push('A+'+it.atk);if(it.def)p.push('D+'+it.def);if(it.hp)p.push('H+'+it.hp);if(it.dex)p.push('X+'+it.dex);return p.join(' ')}
function canEquip(cd,it){if(!it.cls)return true;return it.cls.includes(cd.cls)}

function genEnemy(floor){
  const tm=Math.min(4,Math.ceil(floor/5)+1);
  const pool=ENEMIES.filter(e=>e.t<=tm);const b=pick(pool);const s=1+(floor-1)*.15;
  return{name:b.name,emoji:b.emoji,hp:Math.round(b.hp*s),mhp:Math.round(b.hp*s),atk:Math.round(b.atk*s),def:Math.round(b.def*s),spd:b.spd,xp:Math.round(b.xp*s),isBoss:false};
}
function genBoss(floor){
  const tm=Math.min(4,Math.ceil(floor/10));const pool=BOSSES.filter(b=>b.t<=tm);
  const b=pool.length?pick(pool):BOSSES[0];const s=1+(floor-1)*.2;
  return{name:b.name,emoji:b.emoji,hp:Math.round(300*s),mhp:Math.round(300*s),atk:Math.round(32*s),def:Math.round(16*s),spd:8,xp:Math.round(50*s),isBoss:true};
}

// ── State ──
let G;
function defaults(){return{
  floor:1,maxFloor:1,
  party:CHARS.map(c=>({id:c.id,lvl:1,xp:0,hp:c.hp,mhp:c.hp,weapon:null,armor:null,alive:true})),
  inv:[],healCharges:3,maxHealCharges:3,healReserved:false,
  enemy:null,log:[],cQueue:[],speed:1,selChar:-1,selInv:-1,inCombat:false,
}}
function save(){try{localStorage.setItem('grail3',JSON.stringify(G))}catch(e){}}
function load(){try{const s=JSON.parse(localStorage.getItem('grail3'));if(s&&s.floor)return s}catch(e){}return null}

function charStats(pm){
  const d=CHARS.find(c=>c.id===pm.id);
  let hp=d.hp+(pm.lvl-1)*12,atk=d.atk+(pm.lvl-1)*3,df=d.def+(pm.lvl-1)*2,dex=d.dex+(pm.lvl-1),spd=d.spd+(pm.lvl-1);
  if(pm.weapon){hp+=(pm.weapon.hp||0);atk+=(pm.weapon.atk||0);df+=(pm.weapon.def||0);dex+=(pm.weapon.dex||0)}
  if(pm.armor){hp+=(pm.armor.hp||0);atk+=(pm.armor.atk||0);df+=(pm.armor.def||0);dex+=(pm.armor.dex||0)}
  return{hp,atk,def:df,dex,spd};
}
function xpNeeded(lvl){return Math.floor(10+lvl*8+lvl*lvl*.5)}
function refreshHP(){G.party.forEach(pm=>{const s=charStats(pm);pm.mhp=s.hp;pm.hp=Math.min(pm.hp,pm.mhp);pm.alive=pm.hp>0})}

// ── DOM refs ──
const $fb=document.getElementById('floor-bar');
const $eh=document.getElementById('enemy-hud');
const dcv=document.getElementById('dcv'),dx=dcv.getContext('2d');
const $la=document.getElementById('log-area');
const $bt=document.getElementById('bottom');

function h(tag,a,...ch){const el=document.createElement(tag);if(a)for(const[k,v]of Object.entries(a)){if(k==='onclick'||k==='onchange')el[k]=v;else if(k==='className')el.className=v;else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k==='innerHTML')el.innerHTML=v;else if(k==='disabled'){if(v)el.setAttribute(k,'');else el.removeAttribute(k)}else el.setAttribute(k,v)}for(const c of ch){if(typeof c==='string')el.appendChild(document.createTextNode(c));else if(c)el.appendChild(c)}return el}

// ── Render (split into zones) ──
function renderFloorBar(){
  $fb.innerHTML='';
  $fb.appendChild(h('div',{className:'floor'},'Floor '+G.floor));
  const info=h('div',{className:'info'});
  info.appendChild(h('span',{className:'heal-ct'},'❤️‍🩹 '+G.healCharges));
  info.appendChild(h('span',{className:'spd',onclick:()=>{G.speed=G.speed===1?2:G.speed===2?3:1;renderFloorBar()}},G.speed+'x'));
  $fb.appendChild(info);
}

// ── Procedural stone brick texture ──
let brickTex=null;
function makeBrickTex(){
  const c=document.createElement('canvas'),x=c.getContext('2d');
  c.width=64;c.height=64;
  // Dark stone base
  x.fillStyle='#2a2830';x.fillRect(0,0,64,64);
  // Bricks
  const bw=16,bh=10;
  for(let row=0;row<7;row++){
    const offset=(row%2)*8;
    for(let col=-1;col<5;col++){
      const bx=col*bw+offset,by=row*bh;
      // Varied stone color
      const v=Math.random()*20-10|0;
      x.fillStyle=`rgb(${38+v},${34+v},${42+v})`;
      x.fillRect(bx+1,by+1,bw-2,bh-2);
      // Highlight top edge
      x.fillStyle=`rgba(255,255,255,${.03+Math.random()*.02})`;
      x.fillRect(bx+1,by+1,bw-2,1);
    }
  }
  // Noise
  for(let i=0;i<80;i++){
    x.fillStyle=`rgba(${Math.random()>0.5?255:0},${Math.random()>0.5?255:0},${Math.random()>0.5?255:0},${Math.random()*.03})`;
    x.fillRect(Math.random()*64|0,Math.random()*64|0,1,1);
  }
  brickTex=c;
}
makeBrickTex();

let cf=0; // corridor animation frame
function drawDungeon(){
  if(!G)return;
  const W=440,H=240,c=dx;
  cf++;

  // Ceiling
  const cg=c.createLinearGradient(0,0,0,H*.42);
  cg.addColorStop(0,'#060610');cg.addColorStop(1,'#10101e');
  c.fillStyle=cg;c.fillRect(0,0,W,H*.42);

  // Floor
  const fg=c.createLinearGradient(0,H*.58,0,H);
  fg.addColorStop(0,'#14141e');fg.addColorStop(1,'#1e1e28');
  c.fillStyle=fg;c.fillRect(0,H*.58,W,H*.42);

  // Vanishing point (subtle sway for walking feel)
  const vpX=W/2+Math.sin(cf*.012)*2;
  const vpY=H*.47+Math.cos(cf*.009)*1.5;

  // Draw layered corridor depth (5 layers, back to front)
  const layers=6;
  for(let i=0;i<layers;i++){
    const t=i/layers; // 0=far, 1=near
    const tn=(i+1)/layers;
    // Wall edges at this depth
    const margin=60;
    const lxF=vpX-(margin+(W/2-margin)*t);
    const rxF=vpX+(margin+(W/2-margin)*t);
    const lxN=vpX-(margin+(W/2-margin)*tn);
    const rxN=vpX+(margin+(W/2-margin)*tn);
    const yTopF=vpY-(vpY*(t*.8));
    const yBotF=vpY+(vpY*(t*.8));
    const yTopN=vpY-(vpY*(tn*.8));
    const yBotN=vpY+(vpY*(tn*.8));

    // Left wall segment (trapezoid with brick texture tiling)
    c.save();
    c.beginPath();
    c.moveTo(lxF,yTopF);c.lineTo(lxN,yTopN);c.lineTo(lxN,yBotN);c.lineTo(lxF,yBotF);
    c.closePath();c.clip();
    // Darken distant layers
    const brightness=0.3+t*0.7;
    const pat=c.createPattern(brickTex,'repeat');
    c.fillStyle=pat;c.fillRect(lxF-64,yTopF,lxN-lxF+128,yBotN-yTopF+64);
    c.fillStyle=`rgba(0,0,0,${1-brightness})`;c.fillRect(lxF-64,yTopF,lxN-lxF+128,yBotN-yTopF+64);
    c.restore();

    // Right wall segment
    c.save();
    c.beginPath();
    c.moveTo(rxF,yTopF);c.lineTo(rxN,yTopN);c.lineTo(rxN,yBotN);c.lineTo(rxF,yBotF);
    c.closePath();c.clip();
    c.fillStyle=pat;c.fillRect(rxF-64,yTopF,rxN-rxF+128,yBotN-yTopF+64);
    c.fillStyle=`rgba(0,0,0,${1-brightness})`;c.fillRect(rxF-64,yTopF,rxN-rxF+128,yBotN-yTopF+64);
    c.restore();

    // Ceiling segment
    c.save();
    c.beginPath();c.moveTo(lxF,yTopF);c.lineTo(rxF,yTopF);c.lineTo(rxN,yTopN);c.lineTo(lxN,yTopN);c.closePath();c.clip();
    c.fillStyle=`rgb(${10+t*8|0},${8+t*6|0},${16+t*10|0})`;c.fillRect(0,0,W,H);
    c.restore();

    // Floor segment
    c.save();
    c.beginPath();c.moveTo(lxF,yBotF);c.lineTo(rxF,yBotF);c.lineTo(rxN,yBotN);c.lineTo(lxN,yBotN);c.closePath();c.clip();
    c.fillStyle=`rgb(${16+t*12|0},${14+t*10|0},${20+t*12|0})`;c.fillRect(0,0,W,H);
    // Floor tile lines
    c.strokeStyle=`rgba(60,55,80,${.08+t*.06})`;c.lineWidth=1;
    const floorY=(yBotF+yBotN)/2;
    c.beginPath();c.moveTo(lxF,floorY);c.lineTo(rxF,floorY);c.stroke();
    c.restore();
  }

  // Torches (on layer 2 and 4)
  const torchFlicker=Math.sin(cf*.07)*.3+.7;
  [[1.5/layers, -1],[1.5/layers, 1],[3.5/layers, -1],[3.5/layers, 1]].forEach(([t,side])=>{
    const x0=vpX+side*(60+(W/2-60)*t);
    const y0=vpY-(vpY*t*.5);
    // Flame
    const fSize=3+t*4;
    c.fillStyle=`rgba(255,180,40,${(.6+torchFlicker*.3)*t})`;
    c.beginPath();c.arc(x0,y0-fSize,fSize*.7,0,Math.PI*2);c.fill();
    c.fillStyle=`rgba(255,220,100,${(.4+torchFlicker*.2)*t})`;
    c.beginPath();c.arc(x0,y0-fSize-2*Math.sin(cf*.1+t*5),fSize*.4,0,Math.PI*2);c.fill();
    // Glow on wall
    const glow=c.createRadialGradient(x0,y0,0,x0,y0,30+t*40);
    glow.addColorStop(0,`rgba(255,150,40,${.08*torchFlicker*t})`);
    glow.addColorStop(1,'rgba(255,150,40,0)');
    c.fillStyle=glow;c.fillRect(x0-60,y0-50,120,100);
    // Green tint (like original)
    const gg=c.createRadialGradient(x0,y0,0,x0,y0,25+t*30);
    gg.addColorStop(0,`rgba(100,255,100,${.03*torchFlicker*t})`);
    gg.addColorStop(1,'rgba(100,255,100,0)');
    c.fillStyle=gg;c.fillRect(x0-50,y0-40,100,80);
  });

  // Monster in corridor center
  if(G.enemy){
    const e=G.enemy;
    const mScale=e.isBoss?1.4:1.0;
    const mSize=50*mScale;
    const bobY=Math.sin(cf*.04)*3;
    const mx=vpX,my=vpY+bobY-5;

    // Monster shadow on floor
    c.fillStyle='rgba(0,0,0,0.3)';
    c.beginPath();c.ellipse(mx,vpY+30,mSize*.5,8,0,0,Math.PI*2);c.fill();

    // Monster glow
    const mg=c.createRadialGradient(mx,my,mSize*.2,mx,my,mSize*1.2);
    mg.addColorStop(0,e.isBoss?'rgba(200,0,60,0.15)':'rgba(150,40,40,0.1)');
    mg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=mg;c.fillRect(mx-mSize*1.5,my-mSize*1.5,mSize*3,mSize*3);

    // Monster emoji (large)
    c.font=`${mSize}px serif`;
    c.textAlign='center';c.textBaseline='middle';
    c.shadowColor=e.isBoss?'rgba(255,40,40,0.6)':'rgba(200,100,100,0.4)';
    c.shadowBlur=20;
    c.fillText(e.emoji,mx,my);
    c.shadowBlur=0;

    // Boss crown effect
    if(e.isBoss){
      c.font='16px serif';
      c.fillText('👑',mx,my-mSize*.55);
    }
  }

  // Fog / vignette
  const fog=c.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.85);
  fog.addColorStop(0,'rgba(0,0,0,0)');fog.addColorStop(1,'rgba(6,6,12,0.6)');
  c.fillStyle=fog;c.fillRect(0,0,W,H);

  // Floor number overlay top-left
  c.fillStyle='rgba(0,0,0,0.5)';
  c.beginPath();c.arc(28,24,20,0,Math.PI*2);c.fill();
  c.font='bold 11px sans-serif';c.textAlign='center';c.textBaseline='middle';
  c.fillStyle='#c8b8ff';c.fillText('F'+G.floor,28,24);
}

function renderEnemyHUD(){
  $eh.innerHTML='';
  if(!G.enemy)return;
  const e=G.enemy,hpPct=e.mhp>0?(e.hp/e.mhp*100):0;
  $eh.appendChild(h('div',{className:'eh-name'},(e.isBoss?'★ ':'')+e.name));
  $eh.appendChild(h('div',{className:'eh-hp-bg'},h('div',{className:'eh-hp',style:{width:hpPct+'%'}})));
  $eh.appendChild(h('div',{className:'eh-stats'},'HP '+e.hp+'/'+e.mhp));
}

function renderEnemy(){renderEnemyHUD()}

function renderLog(){
  $la.innerHTML='';
  G.log.slice(-20).forEach(l=>$la.appendChild(h('div',{className:l.t},l.m)));
  $la.scrollTop=$la.scrollHeight;
}

function renderBottom(){
  $bt.innerHTML='';

  // Party
  const pr=h('div',{className:'party-row'});
  G.party.forEach((pm,i)=>{
    const d=CHARS.find(c=>c.id===pm.id);
    const hpP=pm.mhp>0?(pm.hp/pm.mhp*100):0;
    const card=h('div',{className:'pm'+(i===G.selChar?' sel':'')+(pm.alive?'':' dead'),onclick:()=>{G.selChar=G.selChar===i?-1:i;G.selInv=-1;renderBottom()}},
      h('div',{className:'av'},d.emoji),
      h('div',{className:'nm'},d.name),
      h('div',{className:'lv'},'Lv.'+pm.lvl),
      h('div',{className:'hpb'},h('div',{className:'hp '+(hpP>50?'hi':hpP>25?'mid':'lo'),style:{width:hpP+'%'}})),
      h('div',{className:'eq',style:{color:pm.weapon?RCOL[pm.weapon.rar]:'#333'}},pm.weapon?'⚔'+pm.weapon.name:'⚔ -'),
      h('div',{className:'eq',style:{color:pm.armor?RCOL[pm.armor.rar]:'#333'}},pm.armor?'🛡'+pm.armor.name:'🛡 -'),
    );
    pr.appendChild(card);
  });
  $bt.appendChild(pr);

  // Heal + controls
  const cr=h('div',{className:'ctrl-row'});
  if(G.inCombat){
    cr.appendChild(h('button',{className:'btn-heal'+(G.healReserved?' reserved':''),onclick:()=>{
      if(G.healCharges>0){G.healReserved=!G.healReserved;renderBottom()}
    },disabled:G.healCharges<=0},G.healReserved?'❤️ 予約中':'❤️ 回復予約 ('+G.healCharges+')'));
  }else{
    cr.appendChild(h('button',{className:'btn-heal',onclick:()=>{
      if(G.healCharges>0&&G.party.some(p=>p.hp<p.mhp||!p.alive)){
        G.healCharges--;G.party.forEach(p=>{p.hp=p.mhp;p.alive=true});
        sfx('heal');addLog('heal','❤️ 全体回復！ 残り'+G.healCharges);renderAll();save()
      }
    },disabled:G.healCharges<=0||G.party.every(p=>p.hp>=p.mhp&&p.alive)},'❤️ 全体回復 ('+G.healCharges+')'));
  }
  $bt.appendChild(cr);

  // Inventory
  $bt.appendChild(h('div',{className:'inv-title'},
    h('span',null,'BAG '+G.inv.length+'/10'),
    G.selInv>=0?h('button',{style:{fontSize:'10px',padding:'2px 6px',color:'#f88',borderColor:'#833'},onclick:()=>{G.inv.splice(G.selInv,1);G.selInv=-1;sfx('equip');renderBottom();save()}},'捨てる'):null
  ));
  const ig=h('div',{className:'inv-grid'});
  for(let i=0;i<10;i++){
    const item=G.inv[i];
    if(item){
      ig.appendChild(h('div',{className:'inv-slot'+(i===G.selInv?' sel':''),onclick:()=>{
        if(G.selChar>=0){tryEquip(G.selChar,i);renderBottom()}
        else{G.selInv=G.selInv===i?-1:i;renderBottom()}
      }},
        h('div',{className:'iname r-'+item.rar},item.name),
        h('div',{className:'ist'},statStr(item)),
      ));
    }else{
      ig.appendChild(h('div',{className:'inv-slot empty'},''));
    }
  }
  $bt.appendChild(ig);

  // Equip detail
  if(G.selChar>=0){
    const pm=G.party[G.selChar],d=CHARS.find(c=>c.id===pm.id),s=charStats(pm);
    const box=h('div',{className:'eq-detail'},
      h('div',{className:'tl'},d.emoji+' '+d.name+' ('+d.cls+')'),
      h('div',{className:'st'},'HP:'+s.hp+' ATK:'+s.atk+' DEF:'+s.def+' DEX:'+s.dex+' SPD:'+s.spd),
    );
    if(pm.weapon)box.appendChild(h('button',{onclick:()=>{unequip(G.selChar,'weapon');renderBottom()},disabled:G.inv.length>=10},'⚔ '+pm.weapon.name+' 外す'));
    if(pm.armor)box.appendChild(h('button',{onclick:()=>{unequip(G.selChar,'armor');renderBottom()},disabled:G.inv.length>=10},'🛡 '+pm.armor.name+' 外す'));
    $bt.appendChild(box);
  }
}

function renderAll(){renderFloorBar();renderEnemy();renderLog();renderBottom()}

function tryEquip(ci,ii){
  const pm=G.party[ci],item=G.inv[ii];if(!item)return;
  const d=CHARS.find(c=>c.id===pm.id);
  if(!canEquip(d,item)){addLog('info',d.name+'は'+item.name+'を装備不可');return}
  const slot=item.isW?'weapon':'armor';
  const old=pm[slot];pm[slot]=item;G.inv.splice(ii,1);
  if(old&&G.inv.length<10)G.inv.push(old);
  refreshHP();sfx('equip');addLog('info',d.name+'が'+item.name+'を装備');
  G.selChar=-1;G.selInv=-1;save();
}
function unequip(ci,slot){
  const pm=G.party[ci];if(!pm[slot]||G.inv.length>=10)return;
  G.inv.push(pm[slot]);pm[slot]=null;refreshHP();sfx('equip');save();
}

function addLog(t,m){G.log.push({t,m});if(G.log.length>50)G.log.shift()}

// ── Game Flow: 1 floor = 1 fight ──
let timer=null;

function nextFloor(){
  G.inCombat=false;
  const isBoss=G.floor%10===0;
  G.enemy=isBoss?genBoss(G.floor):genEnemy(G.floor);
  G.cQueue=[];G.inCombat=true;
  addLog('info','— Floor '+G.floor+(isBoss?' ★BOSS★':'')+' — '+G.enemy.name);
  if(isBoss)sfx('boss');
  renderAll();
  schedCombat();
}

function schedCombat(){
  if(timer)clearTimeout(timer);
  timer=setTimeout(combatTick,650/G.speed);
}

function combatTick(){
  if(!G.enemy||!G.inCombat)return;
  const e=G.enemy;
  if(e.hp<=0){onWin();return}
  if(!G.party.some(p=>p.alive)){onLose();return}

  if(!G.cQueue||G.cQueue.length===0){
    const u=[];
    G.party.forEach((pm,i)=>{if(pm.alive)u.push({t:'a',i,spd:charStats(pm).spd})});
    u.push({t:'e',spd:e.spd});
    u.sort((a,b)=>b.spd-a.spd);
    G.cQueue=u;
  }

  const unit=G.cQueue.shift();
  if(unit.t==='a'){
    const pm=G.party[unit.i];if(!pm.alive){schedCombat();return}
    const d=CHARS.find(c=>c.id===pm.id),st=charStats(pm);
    if(d.isHealer&&ch(d.sCh)){
      const tgt=G.party.filter(p=>p.alive).sort((a,b)=>a.hp/a.mhp-b.hp/b.mhp)[0];
      if(tgt&&tgt.hp<tgt.mhp){
        const amt=Math.round(st.atk*2.5);tgt.hp=Math.min(tgt.mhp,tgt.hp+amt);
        addLog('heal',d.name+'の'+d.skill+'→'+CHARS.find(c=>c.id===tgt.id).name+' +'+amt);
        sfx('heal');renderEnemy();renderLog();renderBottom();schedCombat();return;
      }
    }
    let mul=1,sk=false;
    if(d.sMul>0&&ch(d.sCh)){mul=d.sMul;sk=true}
    let dmg=Math.max(1,Math.round(st.atk*mul-e.def*.4));
    if(ch(st.dex*.01)){dmg=Math.round(dmg*1.5);addLog('skill','CRIT!');sfx('crit')}
    e.hp=Math.max(0,e.hp-dmg);
    addLog(sk?'skill':'dmg',d.name+(sk?' '+d.skill+'! ':' → ')+dmg);
    sfx('hit');
  }else{
    const alive=G.party.filter(p=>p.alive);if(!alive.length){onLose();return}
    const tgt=pick(alive),td=CHARS.find(c=>c.id===tgt.id),st=charStats(tgt);
    let dmg=Math.max(1,Math.round(e.atk-st.def*.4));
    tgt.hp=Math.max(0,tgt.hp-dmg);if(tgt.hp<=0)tgt.alive=false;
    addLog('dmg',e.name+'→'+td.name+' '+dmg+(tgt.alive?'':' 💀'));sfx('hit');
  }

  renderEnemy();renderLog();renderBottom();

  if(e.hp<=0){setTimeout(()=>onWin(),350/G.speed);return}
  if(!G.party.some(p=>p.alive)){setTimeout(()=>onLose(),350/G.speed);return}
  schedCombat();
}

function onWin(){
  const e=G.enemy;
  // XP
  G.party.forEach(pm=>{
    if(!pm.alive)return;
    pm.xp+=e.xp;const need=xpNeeded(pm.lvl);
    if(pm.xp>=need){pm.xp-=need;pm.lvl++;refreshHP();pm.hp=pm.mhp;pm.alive=true;
      sfx('lvl');addLog('skill','★ '+CHARS.find(c=>c.id===pm.id).name+' Lv.'+pm.lvl+'!')}
  });
  // Drop
  if(G.inv.length<10&&ch(e.isBoss?.95:.3)){
    const item=genEquip(G.floor);
    if(item){G.inv.push(item);sfx('drop');addLog('drop','🎁 '+item.name+' ['+item.rar+']')}
  }
  // Heal reservation
  if(G.healReserved&&G.healCharges>0){
    G.healCharges--;G.healReserved=false;
    G.party.forEach(p=>{p.hp=p.mhp;p.alive=true});
    addLog('heal','❤️ 予約回復！ 全員全回復');sfx('heal');
  }
  // Heal charge every 10 floors
  if(G.floor%10===0&&G.healCharges<G.maxHealCharges){G.healCharges++;addLog('heal','❤️ チャージ +1')}
  if(G.floor>G.maxFloor)G.maxFloor=G.floor;
  G.floor++;G.enemy=null;G.inCombat=false;
  save();renderAll();
  timer=setTimeout(()=>nextFloor(),800/G.speed);
}

function onLose(){
  sfx('die');
  addLog('dmg','— 全滅！ Floor -5 —');
  G.floor=Math.max(1,G.floor-5);
  G.party.forEach(p=>{p.hp=p.mhp;p.alive=true});
  G.enemy=null;G.inCombat=false;G.healReserved=false;
  save();renderAll();
  timer=setTimeout(()=>{addLog('info','…再起。Floor '+G.floor);nextFloor()},1500);
}

// ── Init ──
function init(){
  G=load()||defaults();
  G.party.forEach(pm=>{
    if(pm.mhp===undefined){const s=charStats(pm);pm.mhp=s.hp;pm.hp=Math.min(pm.hp||s.hp,pm.mhp)}
    if(pm.alive===undefined)pm.alive=pm.hp>0;
    if(pm.xp===undefined)pm.xp=0;
  });
  if(G.healCharges===undefined){G.healCharges=3;G.maxHealCharges=3}
  if(G.inv===undefined)G.inv=[];
  if(G.log===undefined)G.log=[];
  refreshHP();renderAll();
  nextFloor();
}

document.addEventListener('click',()=>ea(),{once:true});

init();
// Dungeon canvas animation loop (after init so G exists)
function animLoop(){drawDungeon();requestAnimationFrame(animLoop)}
animLoop();
</script>
