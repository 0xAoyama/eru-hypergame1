<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>聖杯の騎士団</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#06060c;color:#d4c8a0;font-family:'Segoe UI','Hiragino Kaku Gothic ProN',sans-serif;display:flex;justify-content:center;min-height:100vh;overflow:hidden}
#game{width:100%;max-width:440px;height:100vh;display:flex;flex-direction:column;background:#0a0a14}

/* ── Dungeon canvas (top, fills all available space above bottom) ── */
#dungeon-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
#dcv{display:block}
#enemy-hud{position:absolute;top:22%;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;width:60%}
#log-overlay{position:absolute;top:0;left:0;right:0;padding:4px 10px;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.3) 80%,transparent 100%)}
#log-overlay div{font-size:11px;line-height:1.5;text-shadow:0 1px 3px #000}
#log-overlay .dmg{color:#f88}#log-overlay .heal{color:#8f8}#log-overlay .skill{color:#a8f}#log-overlay .info{color:#888}#log-overlay .drop{color:#fc6}
.eh-name{font-size:15px;font-weight:700;color:#fff;text-shadow:0 1px 4px #000,0 0 10px rgba(255,80,80,0.3)}
.eh-hp-bg{height:7px;background:rgba(0,0,0,0.6);border-radius:3px;overflow:hidden;margin-top:3px;border:1px solid rgba(255,255,255,0.1)}
.eh-hp{height:100%;background:linear-gradient(90deg,#c33,#f66);border-radius:3px;transition:width .2s}
.eh-stats{font-size:10px;color:rgba(255,200,200,0.7);margin-top:2px}

/* ── Bottom panel (fixed height, never re-laid-out by combat) ── */
#bottom{flex-shrink:0;padding:6px 8px 8px;background:#08080f;border-top:1px solid #1a1a2a;overflow-y:auto;max-height:45vh}

.party-row{display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;flex-shrink:0;padding-bottom:2px}
.pm{flex:0 0 auto;width:78px;background:linear-gradient(180deg,#14122a,#18162e);border:1.5px solid #2a2a4a;border-radius:10px;padding:5px 3px;text-align:center;cursor:pointer;transition:border-color .12s}
.pm.sel{border-color:#8a6aee;box-shadow:0 0 8px rgba(120,80,240,0.2)}
.pm.dead{opacity:.3;filter:grayscale(.9)}
.pm .av{font-size:20px}.pm .nm{font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm .lv{font-size:8px;color:#888}
.pm .hpb{height:3px;background:#1a0a0a;border-radius:2px;margin-top:2px;overflow:hidden}
.pm .hp{height:100%;border-radius:2px;transition:width .3s}
.pm .hp.hi{background:#3a3}.pm .hp.mid{background:#cc8}.pm .hp.lo{background:#c44}
.pm .eq{font-size:7px;color:#555;margin-top:1px;height:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.ctrl-row{display:flex;gap:5px;align-items:center;flex-shrink:0;margin:4px 0}
button{background:#1e1e30;color:#d4c8a0;border:1px solid #3a3a5a;border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;transition:all .12s;font-family:inherit}
button:hover{background:#2a2a44}
button:active{transform:scale(.96)}
button:disabled{opacity:.3;cursor:default;transform:none}
.btn-heal{background:linear-gradient(135deg,#2a1030,#3a1040);border-color:#882266;color:#ff88aa;flex:1}
.btn-heal:hover:not(:disabled){background:#441050}
.btn-heal.reserved{border-color:#ff6688;box-shadow:0 0 10px rgba(255,100,130,0.25);animation:hp 1s infinite}
@keyframes hp{0%,100%{box-shadow:0 0 6px rgba(255,100,130,0.15)}50%{box-shadow:0 0 14px rgba(255,100,130,0.4)}}

.inv-title{font-size:10px;color:#6a5a8a;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
.inv-slot{background:#12101e;border:1.5px solid #2a2a3a;border-radius:7px;padding:4px 2px;text-align:center;min-height:44px;cursor:pointer;transition:all .12s;font-size:9px}
.inv-slot:hover{border-color:#5a4a8a}
.inv-slot.empty{opacity:.25;cursor:default}
.inv-slot.sel{border-color:#ffd700;box-shadow:0 0 6px rgba(255,215,0,0.15)}
.inv-slot .iname{font-size:8px;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-slot .ist{font-size:7px;color:#888}
.r-Common{color:#999}.r-Uncommon{color:#4c4}.r-Rare{color:#48f}.r-Epic{color:#c4f}

.eq-detail{background:#14122a;border:1px solid #3a2a5a;border-radius:8px;padding:6px;font-size:10px}
.eq-detail .tl{color:#c8b8ff;font-weight:600;margin-bottom:3px}
.eq-detail .st{color:#aaa;margin-bottom:3px}
.eq-detail button{font-size:9px;padding:3px 6px;margin:2px}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#06060c}::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
</style>
</head>
<body>
<div id="game">
  <div id="dungeon-wrap">
    <canvas id="dcv"></canvas>
    <div id="log-overlay"></div>
    <div id="enemy-hud"></div>
  </div>
  <div id="bottom"></div>
</div>
<script>
'use strict';

// ── Audio ──
const AC=window.AudioContext||window.webkitAudioContext;let actx;
function ea(){if(!actx)actx=new AC()}
function sfx(t){ea();if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);const n=actx.currentTime;
switch(t){
case'hit':o.type='square';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(80,n+.1);g.gain.setValueAtTime(.12,n);g.gain.exponentialRampToValueAtTime(.001,n+.1);o.start(n);o.stop(n+.1);break;
case'crit':o.type='sawtooth';o.frequency.setValueAtTime(400,n);o.frequency.exponentialRampToValueAtTime(100,n+.15);g.gain.setValueAtTime(.13,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.start(n);o.stop(n+.15);break;
case'heal':o.type='sine';o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.08);o.frequency.setValueAtTime(784,n+.16);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.start(n);o.stop(n+.3);break;
case'drop':o.type='triangle';o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(1200,n+.15);g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.001,n+.2);o.start(n);o.stop(n+.2);break;
case'die':o.type='sawtooth';o.frequency.setValueAtTime(250,n);o.frequency.exponentialRampToValueAtTime(40,n+.6);g.gain.setValueAtTime(.13,n);g.gain.exponentialRampToValueAtTime(.001,n+.6);o.start(n);o.stop(n+.6);break;
case'boss':o.type='sawtooth';o.frequency.setValueAtTime(60,n);o.frequency.exponentialRampToValueAtTime(40,n+.5);g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.5);o.start(n);o.stop(n+.5);break;
case'lvl':o.type='sine';o.frequency.setValueAtTime(440,n);o.frequency.setValueAtTime(554,n+.1);o.frequency.setValueAtTime(659,n+.2);o.frequency.setValueAtTime(880,n+.3);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.45);o.start(n);o.stop(n+.45);break;
case'equip':o.type='sine';o.frequency.setValueAtTime(800,n);o.frequency.setValueAtTime(1000,n+.05);g.gain.setValueAtTime(.06,n);g.gain.exponentialRampToValueAtTime(.001,n+.08);o.start(n);o.stop(n+.08);break;
}}

// ── Data ──
const CHARS=[
{id:'amelia',name:'アメリア',cls:'Warrior',emoji:'⚔️',color:'#cc4444',hp:130,atk:28,def:14,dex:10,spd:12,skill:'パワースラッシュ',sCh:.25,sMul:1.8},
{id:'yuri',name:'ユーリ',cls:'Thief',emoji:'🗡️',color:'#44aa44',hp:90,atk:22,def:8,dex:28,spd:22,skill:'急所突き',sCh:.2,sMul:2.2},
{id:'bolton',name:'ボルトン',cls:'Fighter',emoji:'🪓',color:'#aa6622',hp:110,atk:26,def:12,dex:12,spd:14,skill:'ウォークライ',sCh:.22,sMul:2.0},
{id:'tristan',name:'トリスタン',cls:'Priest',emoji:'✝️',color:'#aaaa44',hp:85,atk:12,def:10,dex:12,spd:10,skill:'癒しの光',sCh:.35,sMul:0,isHealer:true},
{id:'delfina',name:'デルフィナ',cls:'Ranger',emoji:'🏹',color:'#44aaaa',hp:95,atk:24,def:9,dex:22,spd:18,skill:'貫通射撃',sCh:.22,sMul:2.0},
];
const ENEMIES=[
{name:'スライム',emoji:'🟢',t:1,hp:45,atk:8,def:2,spd:6,xp:4},
{name:'ゴブリン',emoji:'👺',t:1,hp:60,atk:12,def:4,spd:8,xp:5},
{name:'コウモリ',emoji:'🦇',t:1,hp:35,atk:10,def:2,spd:14,xp:3},
{name:'スケルトン',emoji:'💀',t:2,hp:85,atk:18,def:8,spd:10,xp:8},
{name:'オーク',emoji:'👹',t:2,hp:120,atk:22,def:10,spd:7,xp:10},
{name:'ダークエルフ',emoji:'🧝',t:2,hp:80,atk:26,def:6,spd:16,xp:9},
{name:'ミノタウロス',emoji:'🐂',t:3,hp:170,atk:32,def:14,spd:9,xp:14},
{name:'ワイバーン',emoji:'🐉',t:3,hp:150,atk:36,def:12,spd:18,xp:16},
{name:'デーモン',emoji:'😈',t:3,hp:200,atk:38,def:16,spd:12,xp:18},
{name:'リッチ',emoji:'🧙',t:4,hp:220,atk:42,def:14,spd:14,xp:22},
{name:'ドラゴン',emoji:'🐲',t:4,hp:280,atk:46,def:20,spd:10,xp:28},
];
const BOSSES=[
{name:'スライムキング',emoji:'👑',t:1},{name:'骨の将軍',emoji:'☠️',t:2},
{name:'魔竜ヴァルムング',emoji:'🐲',t:3},{name:'深淵の魔王',emoji:'👿',t:4},
];
const WEAPONS=[
{name:'ショートソード',cls:['Warrior','Fighter'],t:1,atk:5},
{name:'ロングソード',cls:['Warrior','Fighter'],t:2,atk:10},
{name:'バスタードソード',cls:['Warrior','Fighter'],t:3,atk:16},
{name:'聖剣フラガラッハ',cls:['Warrior','Fighter'],t:4,atk:24},
{name:'ダガー',cls:['Thief'],t:1,atk:3,dex:4},{name:'アサシンブレード',cls:['Thief'],t:2,atk:7,dex:8},
{name:'影縫いの短剣',cls:['Thief'],t:3,atk:12,dex:14},{name:'虚無の刃',cls:['Thief'],t:4,atk:18,dex:20},
{name:'ショートボウ',cls:['Ranger'],t:1,atk:4,dex:2},{name:'ロングボウ',cls:['Ranger'],t:2,atk:9,dex:5},
{name:'コンポジットボウ',cls:['Ranger'],t:3,atk:14,dex:9},{name:'銀弓アルテミス',cls:['Ranger'],t:4,atk:22,dex:14},
{name:'木の杖',cls:['Priest'],t:1,atk:3,def:2},{name:'ルーンスタッフ',cls:['Priest'],t:2,atk:7,def:4},
{name:'賢者の杖',cls:['Priest'],t:3,atk:12,def:6},{name:'星杖コスモス',cls:['Priest'],t:4,atk:18,def:10},
];
const ARMORS=[
{name:'革の鎧',cls:null,t:1,def:3,hp:10},{name:'チェインメイル',cls:null,t:2,def:7,hp:20},
{name:'ミスリルメイル',cls:null,t:3,def:12,hp:35},{name:'ドラゴンアーマー',cls:['Warrior','Fighter'],t:4,def:20,hp:55},
{name:'忍びの衣',cls:['Thief','Ranger'],t:2,def:4,hp:12,dex:6},{name:'影の外套',cls:['Thief','Ranger'],t:3,def:7,hp:20,dex:12},
{name:'魔導師のローブ',cls:['Priest'],t:2,def:3,hp:15,atk:4},{name:'星霊のローブ',cls:['Priest'],t:3,def:5,hp:25,atk:10},
{name:'旅人の服',cls:null,t:1,def:1,hp:5},
];
const ALL_EQ=[...WEAPONS,...ARMORS];
const RMUL={Common:1,Uncommon:1.35,Rare:1.75,Epic:2.3};
const RCOL={Common:'#999',Uncommon:'#4c4',Rare:'#48f',Epic:'#c4f'};

function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function ch(p){return Math.random()<p}

function genEquip(floor){
  const tm=Math.min(4,Math.ceil(floor/6)+1);
  const pool=ALL_EQ.filter(e=>e.t<=tm);if(!pool.length)return null;
  const b=pick(pool);
  const r=Math.random(),rar=r<.48?'Common':r<.76?'Uncommon':r<.93?'Rare':'Epic';
  const m=RMUL[rar];
  return{name:b.name,isW:WEAPONS.includes(b),cls:b.cls,rar,atk:Math.round((b.atk||0)*m),def:Math.round((b.def||0)*m),hp:Math.round((b.hp||0)*m),dex:Math.round((b.dex||0)*m)};
}
function statStr(it){const p=[];if(it.atk)p.push('A+'+it.atk);if(it.def)p.push('D+'+it.def);if(it.hp)p.push('H+'+it.hp);if(it.dex)p.push('X+'+it.dex);return p.join(' ')}
function canEquip(cd,it){if(!it.cls)return true;return it.cls.includes(cd.cls)}
function genEnemy(floor){
  const tm=Math.min(4,Math.ceil(floor/5)+1);const pool=ENEMIES.filter(e=>e.t<=tm);const b=pick(pool);const s=1+(floor-1)*.15;
  return{name:b.name,emoji:b.emoji,hp:Math.round(b.hp*s),mhp:Math.round(b.hp*s),atk:Math.round(b.atk*s),def:Math.round(b.def*s),spd:b.spd,xp:Math.round(b.xp*s),isBoss:false};
}
function genBoss(floor){
  const tm=Math.min(4,Math.ceil(floor/10));const pool=BOSSES.filter(b=>b.t<=tm);
  const b=pool.length?pick(pool):BOSSES[0];const s=1+(floor-1)*.2;
  return{name:b.name,emoji:b.emoji,hp:Math.round(300*s),mhp:Math.round(300*s),atk:Math.round(32*s),def:Math.round(16*s),spd:8,xp:Math.round(50*s),isBoss:true};
}

// ── State ──
let G;
function defaults(){return{
  floor:1,maxFloor:1,
  party:CHARS.map(c=>({id:c.id,lvl:1,xp:0,hp:c.hp,mhp:c.hp,weapon:null,armor:null,alive:true})),
  inv:[],healCharges:3,maxHealCharges:3,healReserved:false,
  enemy:null,log:[],cQueue:[],speed:1,selChar:-1,selInv:-1,inCombat:false,
  phase:'walk', // walk, combat
  walkT:0, // walk animation progress 0..1
}}
function save(){try{localStorage.setItem('grail3',JSON.stringify(G))}catch(e){}}
function load(){try{const s=JSON.parse(localStorage.getItem('grail3'));if(s&&s.floor)return s}catch(e){}return null}
function charStats(pm){
  const d=CHARS.find(c=>c.id===pm.id);
  let hp=d.hp+(pm.lvl-1)*12,atk=d.atk+(pm.lvl-1)*3,df=d.def+(pm.lvl-1)*2,dex=d.dex+(pm.lvl-1),spd=d.spd+(pm.lvl-1);
  if(pm.weapon){hp+=(pm.weapon.hp||0);atk+=(pm.weapon.atk||0);df+=(pm.weapon.def||0);dex+=(pm.weapon.dex||0)}
  if(pm.armor){hp+=(pm.armor.hp||0);atk+=(pm.armor.atk||0);df+=(pm.armor.def||0);dex+=(pm.armor.dex||0)}
  return{hp,atk,def:df,dex,spd};
}
function xpNeeded(lvl){return Math.floor(10+lvl*8+lvl*lvl*.5)}
function refreshHP(){G.party.forEach(pm=>{const s=charStats(pm);pm.mhp=s.hp;pm.hp=Math.min(pm.hp,pm.mhp);pm.alive=pm.hp>0})}
function addLog(t,m){G.log.push({t,m});if(G.log.length>50)G.log.shift();renderLogOverlay()}

// ── Procedural brick texture ──
let brickTex;
(function(){
  const c=document.createElement('canvas'),x=c.getContext('2d');c.width=64;c.height=64;
  x.fillStyle='#2a2830';x.fillRect(0,0,64,64);
  for(let row=0;row<7;row++){const off=(row%2)*8;for(let col=-1;col<5;col++){
    const bx=col*16+off,by=row*10,v=Math.random()*18-9|0;
    x.fillStyle=`rgb(${38+v},${34+v},${42+v})`;x.fillRect(bx+1,by+1,14,8);
    x.fillStyle=`rgba(255,255,255,${.02+Math.random()*.02})`;x.fillRect(bx+1,by+1,14,1);
  }}
  brickTex=c;
})();

// ── Canvas ──
const dcv=document.getElementById('dcv'),dx=dcv.getContext('2d');
const $eh=document.getElementById('enemy-hud');
const $lo=document.getElementById('log-overlay');
const $bt=document.getElementById('bottom');
let cf=0,cW=440,cH=300;

function resizeCanvas(){
  const wrap=document.getElementById('dungeon-wrap');
  cW=wrap.clientWidth;cH=wrap.clientHeight;
  dcv.width=cW;dcv.height=cH;
  dcv.style.width=cW+'px';dcv.style.height=cH+'px';
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

function drawDungeon(){
  if(!G)return;
  const W=cW,H=cH,c=dx;cf++;
  // Clear
  c.fillStyle='#08080f';c.fillRect(0,0,W,H);
  // Walk animation: walkT 0→1 pushes camera forward (vanishing point shifts, walls spread)
  const wt=G.walkT||0;
  const walkZoom=wt*.15; // how much "closer" we are (0=start, .15=arrived)
  const vpX=W/2+Math.sin(cf*.01)*2;
  const vpY=H*(.44+walkZoom*.3)+Math.cos(cf*.008)*1.5;
  const wo=(cf*.03+wt*3)%1; // walk offset for floor tiles - speeds up during walk

  // Ceiling gradient
  const cg=c.createLinearGradient(0,0,0,vpY);cg.addColorStop(0,'#060610');cg.addColorStop(1,'#10101e');
  c.fillStyle=cg;c.fillRect(0,0,W,vpY);
  // Floor gradient
  const fg=c.createLinearGradient(0,vpY,0,H);fg.addColorStop(0,'#14141e');fg.addColorStop(1,'#1e1e28');
  c.fillStyle=fg;c.fillRect(0,vpY,W,H-vpY);

  // Draw corridor layers (back to front)
  const layers=7,margin=55-walkZoom*80; // walls spread as we walk forward
  const pat=c.createPattern(brickTex,'repeat');
  for(let i=0;i<layers;i++){
    const t=i/layers,tn=(i+1)/layers;
    const lxF=vpX-(margin+(W/2-margin)*t),rxF=vpX+(margin+(W/2-margin)*t);
    const lxN=vpX-(margin+(W/2-margin)*tn),rxN=vpX+(margin+(W/2-margin)*tn);
    const yTF=vpY-vpY*t*.82,yBF=vpY+(H-vpY)*t*.82;
    const yTN=vpY-vpY*tn*.82,yBN=vpY+(H-vpY)*tn*.82;
    const bright=.25+t*.75;
    // Left wall
    c.save();c.beginPath();c.moveTo(lxF,yTF);c.lineTo(lxN,yTN);c.lineTo(lxN,yBN);c.lineTo(lxF,yBF);c.closePath();c.clip();
    c.fillStyle=pat;c.fillRect(lxN-64,yTN,lxF-lxN+128,yBN-yTN+64);
    c.fillStyle=`rgba(0,0,0,${1-bright})`;c.fillRect(lxN-64,yTN,lxF-lxN+128,yBN-yTN+64);
    c.restore();
    // Right wall
    c.save();c.beginPath();c.moveTo(rxF,yTF);c.lineTo(rxN,yTN);c.lineTo(rxN,yBN);c.lineTo(rxF,yBF);c.closePath();c.clip();
    c.fillStyle=pat;c.fillRect(rxN-64,yTN,rxF-rxN+128,yBN-yTN+64);
    c.fillStyle=`rgba(0,0,0,${1-bright})`;c.fillRect(rxN-64,yTN,rxF-rxN+128,yBN-yTN+64);
    c.restore();
    // Ceiling
    c.save();c.beginPath();c.moveTo(lxF,yTF);c.lineTo(rxF,yTF);c.lineTo(rxN,yTN);c.lineTo(lxN,yTN);c.closePath();c.clip();
    c.fillStyle=`rgb(${8+t*10|0},${6+t*8|0},${14+t*12|0})`;c.fillRect(0,0,W,H);c.restore();
    // Floor
    c.save();c.beginPath();c.moveTo(lxF,yBF);c.lineTo(rxF,yBF);c.lineTo(rxN,yBN);c.lineTo(lxN,yBN);c.closePath();c.clip();
    c.fillStyle=`rgb(${14+t*14|0},${12+t*12|0},${18+t*14|0})`;c.fillRect(0,0,W,H);
    // tile lines
    c.strokeStyle=`rgba(60,55,80,${.06+t*.05})`;c.lineWidth=1;
    const fy=(yBF+yBN)/2;c.beginPath();c.moveTo(lxF,fy);c.lineTo(rxF,fy);c.stroke();
    c.restore();
  }

  // Floor tiles (perspective grid on floor)
  c.strokeStyle='rgba(70,60,90,0.1)';c.lineWidth=1;
  for(let i=0;i<10;i++){
    const t=(i+wo)/10,y=vpY+(H-vpY)*Math.pow(t,.65);
    const sp=(y-vpY)/(H-vpY);
    c.beginPath();c.moveTo(vpX-margin-sp*(W/2-margin+20),y);c.lineTo(vpX+margin+sp*(W/2-margin+20),y);c.stroke();
  }

  // Torches
  const tp=Math.sin(cf*.06)*.3+.7;
  [[.22,-1],[.22,1],[.55,-1],[.55,1]].forEach(([t,side])=>{
    const tx=vpX+side*(margin+(W/2-margin)*t),ty=vpY-vpY*t*.4;
    const fs=3+t*5;
    c.fillStyle=`rgba(255,180,40,${(.5+tp*.3)*t})`;c.beginPath();c.arc(tx,ty-fs,fs*.7,0,Math.PI*2);c.fill();
    c.fillStyle=`rgba(255,220,100,${(.3+tp*.2)*t})`;c.beginPath();c.arc(tx,ty-fs-Math.sin(cf*.12+t*7)*2,fs*.35,0,Math.PI*2);c.fill();
    const gl=c.createRadialGradient(tx,ty,0,tx,ty,25+t*50);
    gl.addColorStop(0,`rgba(255,150,40,${.06*tp*t})`);gl.addColorStop(1,'rgba(255,150,40,0)');c.fillStyle=gl;c.fillRect(tx-60,ty-50,120,100);
    const gg=c.createRadialGradient(tx,ty,0,tx,ty,20+t*35);
    gg.addColorStop(0,`rgba(100,255,100,${.02*tp*t})`);gg.addColorStop(1,'rgba(100,255,100,0)');c.fillStyle=gg;c.fillRect(tx-50,ty-40,100,80);
  });

  // Monster
  if(G.enemy&&G.phase==='combat'){
    const e=G.enemy,ms=e.isBoss?1.5:1.0,sz=H*.22*ms;
    const bob=Math.sin(cf*.05)*4;
    const mx=vpX,my=vpY+bob-sz*.1;
    // Shadow
    c.fillStyle='rgba(0,0,0,0.25)';c.beginPath();c.ellipse(mx,vpY+H*.15,sz*.4,8,0,0,Math.PI*2);c.fill();
    // Glow
    const mg=c.createRadialGradient(mx,my,sz*.15,mx,my,sz*1.3);
    mg.addColorStop(0,e.isBoss?'rgba(200,0,60,0.18)':'rgba(150,40,40,0.12)');mg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=mg;c.fillRect(mx-sz*1.5,my-sz*1.5,sz*3,sz*3);
    // Emoji
    c.font=`${sz}px serif`;c.textAlign='center';c.textBaseline='middle';
    c.shadowColor=e.isBoss?'rgba(255,40,40,0.7)':'rgba(200,100,100,0.5)';c.shadowBlur=25;
    c.fillText(e.emoji,mx,my);c.shadowBlur=0;
    if(e.isBoss){c.font=`${sz*.3}px serif`;c.fillText('👑',mx,my-sz*.55)}
  }

  // Walk phase: darkened corridor, advancing feel
  if(G.phase==='walk'){
    // Subtle overlay that lightens as we approach
    c.fillStyle=`rgba(0,0,0,${.15*(1-wt)})`;c.fillRect(0,0,W,H);
  }

  // Floor label under monster (or center during walk)
  const floorY = (G.enemy&&G.phase==='combat') ? vpY+H*.22+20 : vpY+10;
  c.font='bold 13px sans-serif';c.textAlign='center';c.textBaseline='middle';
  c.fillStyle='rgba(0,0,0,0.5)';
  const ftw=c.measureText('Floor '+G.floor).width;
  c.fillRect(W/2-ftw/2-8,floorY-8,ftw+16,18);
  c.fillStyle='#c8b8ff';c.fillText('Floor '+G.floor,W/2,floorY);

  // Vignette
  const v=c.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.85);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(6,6,12,0.55)');c.fillStyle=v;c.fillRect(0,0,W,H);
}

// ── Enemy HUD (overlay on canvas, only HP bar) ──
function renderEnemyHUD(){
  $eh.innerHTML='';
  if(!G.enemy||G.phase!=='combat')return;
  const e=G.enemy,hp=e.mhp>0?(e.hp/e.mhp*100):0;
  const n=document.createElement('div');n.className='eh-name';n.textContent=(e.isBoss?'★ ':'')+e.name;
  const bg=document.createElement('div');bg.className='eh-hp-bg';
  const bar=document.createElement('div');bar.className='eh-hp';bar.style.width=hp+'%';
  bg.appendChild(bar);
  const st=document.createElement('div');st.className='eh-stats';st.textContent=e.hp+'/'+e.mhp;
  $eh.appendChild(n);$eh.appendChild(bg);$eh.appendChild(st);
}

// ── Bottom panel (only rebuilt on user action, NOT on every combat tick) ──
let bottomDirty=true;
function markBottomDirty(){bottomDirty=true}

function renderBottom(){
  if(!bottomDirty)return;
  bottomDirty=false;
  $bt.innerHTML='';
  // Party
  const pr=document.createElement('div');pr.className='party-row';
  G.party.forEach((pm,i)=>{
    const d=CHARS.find(c=>c.id===pm.id);
    const hpP=pm.mhp>0?(pm.hp/pm.mhp*100):0;
    const card=document.createElement('div');
    card.className='pm'+(i===G.selChar?' sel':'')+(pm.alive?'':' dead');
    card.onclick=()=>{G.selChar=G.selChar===i?-1:i;G.selInv=-1;bottomDirty=true;renderBottom()};
    card.innerHTML=`<div class="av">${d.emoji}</div><div class="nm">${d.name}</div><div class="lv">Lv.${pm.lvl}</div><div class="hpb"><div class="hp ${hpP>50?'hi':hpP>25?'mid':'lo'}" style="width:${hpP}%"></div></div><div class="eq" style="color:${pm.weapon?RCOL[pm.weapon.rar]:'#333'}">⚔${pm.weapon?pm.weapon.name:'-'}</div><div class="eq" style="color:${pm.armor?RCOL[pm.armor.rar]:'#333'}">🛡${pm.armor?pm.armor.name:'-'}</div>`;
    pr.appendChild(card);
  });
  $bt.appendChild(pr);

  // Heal + speed
  const cr=document.createElement('div');cr.className='ctrl-row';
  const hb=document.createElement('button');hb.className='btn-heal'+(G.healReserved?' reserved':'');
  if(G.inCombat){
    hb.textContent=G.healReserved?'❤️ 予約中':'❤️ 回復予約 ('+G.healCharges+')';
    hb.onclick=()=>{if(G.healCharges>0){G.healReserved=!G.healReserved;bottomDirty=true;renderBottom()}};
    if(G.healCharges<=0)hb.disabled=true;
  }else{
    hb.textContent='❤️ 全体回復 ('+G.healCharges+')';
    const allFull=G.party.every(p=>p.hp>=p.mhp&&p.alive);
    hb.onclick=()=>{if(G.healCharges>0&&!allFull){G.healCharges--;G.party.forEach(p=>{p.hp=p.mhp;p.alive=true});sfx('heal');addLog('heal','❤️ 全体回復！');bottomDirty=true;renderBottom();save()}};
    if(G.healCharges<=0||allFull)hb.disabled=true;
  }
  cr.appendChild(hb);
  const sb=document.createElement('button');sb.textContent=G.speed+'x';sb.style.width='40px';
  sb.onclick=()=>{G.speed=G.speed===1?2:G.speed===2?3:1;bottomDirty=true;renderBottom()};
  cr.appendChild(sb);
  $bt.appendChild(cr);

  // Inventory
  const it=document.createElement('div');it.className='inv-title';
  it.innerHTML='<span>BAG '+G.inv.length+'/10</span>';
  if(G.selInv>=0){const db=document.createElement('button');db.style.cssText='font-size:9px;padding:2px 5px;color:#f88;border-color:#833';db.textContent='捨てる';db.onclick=()=>{G.inv.splice(G.selInv,1);G.selInv=-1;sfx('equip');bottomDirty=true;renderBottom();save()};it.appendChild(db)}
  $bt.appendChild(it);

  const ig=document.createElement('div');ig.className='inv-grid';
  for(let i=0;i<10;i++){
    const item=G.inv[i];const sl=document.createElement('div');
    if(item){
      sl.className='inv-slot'+(i===G.selInv?' sel':'');
      sl.innerHTML=`<div class="iname r-${item.rar}">${item.name}</div><div class="ist">${statStr(item)}</div>`;
      sl.onclick=()=>{if(G.selChar>=0){tryEquip(G.selChar,i)}else{G.selInv=G.selInv===i?-1:i}bottomDirty=true;renderBottom()};
    }else{sl.className='inv-slot empty';sl.textContent='·'}
    ig.appendChild(sl);
  }
  $bt.appendChild(ig);

  if(G.selChar>=0){
    const pm=G.party[G.selChar],d=CHARS.find(c=>c.id===pm.id),s=charStats(pm);
    const box=document.createElement('div');box.className='eq-detail';
    box.innerHTML=`<div class="tl">${d.emoji} ${d.name} (${d.cls})</div><div class="st">HP:${s.hp} ATK:${s.atk} DEF:${s.def} DEX:${s.dex} SPD:${s.spd}</div>`;
    if(pm.weapon){const b=document.createElement('button');b.textContent='⚔ '+pm.weapon.name+' 外す';b.onclick=()=>{unequip(G.selChar,'weapon');bottomDirty=true;renderBottom()};if(G.inv.length>=10)b.disabled=true;box.appendChild(b)}
    if(pm.armor){const b=document.createElement('button');b.textContent='🛡 '+pm.armor.name+' 外す';b.onclick=()=>{unequip(G.selChar,'armor');bottomDirty=true;renderBottom()};if(G.inv.length>=10)b.disabled=true;box.appendChild(b)}
    $bt.appendChild(box);
  }
}

// Only update HP bars without full rebuild
function updatePartyHP(){
  const bars=document.querySelectorAll('.pm .hpb');
  G.party.forEach((pm,i)=>{
    if(bars[i]){
      const hpP=pm.mhp>0?(pm.hp/pm.mhp*100):0;
      const inner=bars[i].firstChild;
      if(inner){inner.style.width=hpP+'%';inner.className='hp '+(hpP>50?'hi':hpP>25?'mid':'lo')}
    }
    // dead state
    const cards=document.querySelectorAll('.pm');
    if(cards[i]){cards[i].classList.toggle('dead',!pm.alive)}
  });
}

function renderLogOverlay(){
  $lo.innerHTML='';
  G.log.slice(-4).forEach(l=>{
    const d=document.createElement('div');d.className=l.t;d.textContent=l.m;$lo.appendChild(d);
  });
}

function tryEquip(ci,ii){
  const pm=G.party[ci],item=G.inv[ii];if(!item)return;
  const d=CHARS.find(c=>c.id===pm.id);
  if(!canEquip(d,item)){addLog('info',d.name+'は'+item.name+'を装備不可');return}
  const slot=item.isW?'weapon':'armor';
  const old=pm[slot];pm[slot]=item;G.inv.splice(ii,1);
  if(old&&G.inv.length<10)G.inv.push(old);
  refreshHP();sfx('equip');addLog('info',d.name+'が'+item.name+'を装備');
  G.selChar=-1;G.selInv=-1;save();
}
function unequip(ci,slot){
  const pm=G.party[ci];if(!pm[slot]||G.inv.length>=10)return;
  G.inv.push(pm[slot]);pm[slot]=null;refreshHP();sfx('equip');save();
}

// ── Game Flow ──
let timer=null;

let walkAnim=null;
function startWalk(){
  G.phase='walk';G.enemy=null;G.inCombat=false;G.walkT=0;
  renderEnemyHUD();
  if(walkAnim)cancelAnimationFrame(walkAnim);
  const dur=1400/G.speed; // walk duration ms
  const t0=performance.now();
  function step(now){
    const elapsed=now-t0;
    G.walkT=Math.min(1,elapsed/dur);
    if(G.walkT<1){walkAnim=requestAnimationFrame(step)}
    else{G.walkT=0;startCombat()}
  }
  walkAnim=requestAnimationFrame(step);
}

function startCombat(){
  const isBoss=G.floor%10===0;
  G.enemy=isBoss?genBoss(G.floor):genEnemy(G.floor);
  G.cQueue=[];G.phase='combat';G.inCombat=true;
  addLog('info','— F'+G.floor+(isBoss?' ★BOSS':'')+' '+G.enemy.name+' —');
  if(isBoss)sfx('boss');
  renderEnemyHUD();markBottomDirty();renderBottom();
  schedTick();
}

function schedTick(){
  if(timer)clearTimeout(timer);
  timer=setTimeout(combatTick,600/G.speed);
}

function combatTick(){
  if(!G.enemy||!G.inCombat)return;
  const e=G.enemy;
  if(e.hp<=0){onWin();return}
  if(!G.party.some(p=>p.alive)){onLose();return}
  if(!G.cQueue||G.cQueue.length===0){
    const u=[];G.party.forEach((pm,i)=>{if(pm.alive)u.push({t:'a',i,spd:charStats(pm).spd})});
    u.push({t:'e',spd:e.spd});u.sort((a,b)=>b.spd-a.spd);G.cQueue=u;
  }
  const unit=G.cQueue.shift();
  if(unit.t==='a'){
    const pm=G.party[unit.i];if(!pm.alive){schedTick();return}
    const d=CHARS.find(c=>c.id===pm.id),st=charStats(pm);
    if(d.isHealer&&ch(d.sCh)){
      const tgt=G.party.filter(p=>p.alive).sort((a,b)=>a.hp/a.mhp-b.hp/b.mhp)[0];
      if(tgt&&tgt.hp<tgt.mhp){
        const amt=Math.round(st.atk*2.5);tgt.hp=Math.min(tgt.mhp,tgt.hp+amt);
        addLog('heal',d.name+' '+d.skill+'→'+CHARS.find(c=>c.id===tgt.id).name+'+'+amt);
        sfx('heal');renderEnemyHUD();updatePartyHP();schedTick();return;
      }
    }
    let mul=1,sk=false;
    if(d.sMul>0&&ch(d.sCh)){mul=d.sMul;sk=true}
    let dmg=Math.max(1,Math.round(st.atk*mul-e.def*.4));
    if(ch(st.dex*.01)){dmg=Math.round(dmg*1.5);addLog('skill','CRIT!');sfx('crit')}
    e.hp=Math.max(0,e.hp-dmg);
    addLog(sk?'skill':'dmg',d.name+(sk?' '+d.skill+'! ':' → ')+dmg);sfx('hit');
  }else{
    const alive=G.party.filter(p=>p.alive);if(!alive.length){onLose();return}
    const tgt=pick(alive),td=CHARS.find(c=>c.id===tgt.id),st=charStats(tgt);
    let dmg=Math.max(1,Math.round(e.atk-st.def*.4));
    tgt.hp=Math.max(0,tgt.hp-dmg);if(tgt.hp<=0)tgt.alive=false;
    addLog('dmg',e.name+'→'+td.name+' '+dmg+(tgt.alive?'':' 💀'));sfx('hit');
  }
  // Only update HP bars + enemy HUD, NOT full bottom rebuild
  renderEnemyHUD();updatePartyHP();
  if(e.hp<=0){setTimeout(()=>onWin(),300/G.speed);return}
  if(!G.party.some(p=>p.alive)){setTimeout(()=>onLose(),300/G.speed);return}
  schedTick();
}

function onWin(){
  const e=G.enemy;
  G.party.forEach(pm=>{
    if(!pm.alive)return;
    pm.xp+=e.xp;const need=xpNeeded(pm.lvl);
    if(pm.xp>=need){pm.xp-=need;pm.lvl++;refreshHP();pm.hp=pm.mhp;pm.alive=true;
      sfx('lvl');addLog('skill','★ '+CHARS.find(c=>c.id===pm.id).name+' Lv.'+pm.lvl+'!')}
  });
  if(G.inv.length<10&&ch(e.isBoss?.95:.3)){
    const item=genEquip(G.floor);if(item){G.inv.push(item);sfx('drop');addLog('drop','🎁 '+item.name+' ['+item.rar+']');markBottomDirty()}
  }
  if(G.healReserved&&G.healCharges>0){
    G.healCharges--;G.healReserved=false;
    G.party.forEach(p=>{p.hp=p.mhp;p.alive=true});
    addLog('heal','❤️ 予約回復！ 全員全回復');sfx('heal');
  }
  if(G.floor%10===0&&G.healCharges<G.maxHealCharges){G.healCharges++;addLog('heal','❤️ チャージ+1')}
  if(G.floor>G.maxFloor)G.maxFloor=G.floor;
  G.floor++;
  save();markBottomDirty();renderBottom();updatePartyHP();
  // Walk phase before next combat
  startWalk();
}

function onLose(){
  sfx('die');addLog('dmg','— 全滅！ Floor -5 —');
  G.floor=Math.max(1,G.floor-5);
  G.party.forEach(p=>{p.hp=p.mhp;p.alive=true});
  G.enemy=null;G.inCombat=false;G.healReserved=false;
  save();markBottomDirty();renderBottom();updatePartyHP();
  timer=setTimeout(()=>{addLog('info','…再起 F'+G.floor);startWalk()},1200);
}

// ── Init ──
function init(){
  G=load()||defaults();
  G.party.forEach(pm=>{
    if(pm.mhp===undefined){const s=charStats(pm);pm.mhp=s.hp;pm.hp=Math.min(pm.hp||s.hp,pm.mhp)}
    if(pm.alive===undefined)pm.alive=pm.hp>0;if(pm.xp===undefined)pm.xp=0;
  });
  if(G.healCharges===undefined){G.healCharges=3;G.maxHealCharges=3}
  if(G.inv===undefined)G.inv=[];if(G.log===undefined)G.log=[];
  if(!G.phase)G.phase='walk';
  refreshHP();markBottomDirty();renderBottom();
  startWalk();
}

document.addEventListener('click',()=>ea(),{once:true});
init();
function animLoop(){drawDungeon();requestAnimationFrame(animLoop)}
animLoop();
</script>
