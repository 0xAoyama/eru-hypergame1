<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Factory Builder - 眺めるだけで楽しい</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;color:#c8c8d0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;display:flex;height:100vh;user-select:none}
#gameArea{flex:1;position:relative}
canvas{display:block;width:100%;height:100%}
#minimap{position:absolute;bottom:10px;left:10px;border:1px solid #333;background:#0a0a12;border-radius:4px}
#rightPanel{width:260px;background:#0e0e18;border-left:1px solid #222;display:flex;flex-direction:column;overflow-y:auto;padding:10px;gap:8px}
.panel-section{background:#12121e;border:1px solid #1e1e30;border-radius:6px;padding:10px}
.panel-section h3{font-size:12px;text-transform:uppercase;color:#666;margin-bottom:8px;letter-spacing:1px}
.palette-btn{display:inline-block;width:48px;height:48px;margin:2px;border:2px solid #2a2a40;border-radius:6px;background:#16162a;cursor:pointer;text-align:center;font-size:20px;line-height:48px;transition:all .15s}
.palette-btn:hover{border-color:#4a4a70;background:#1e1e38}
.palette-btn.selected{border-color:#6a6aff;background:#22224a;box-shadow:0 0 8px #3333aa44}
.stat-row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.stat-val{color:#aaf;font-weight:bold}
#bottomBar{position:absolute;bottom:0;left:0;right:0;height:40px;background:#0c0c16ee;border-top:1px solid #222;display:flex;align-items:center;padding:0 12px;gap:12px;font-size:13px;z-index:5}
#bottomBar button{background:#1a1a2e;border:1px solid #2a2a44;color:#aaa;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
#bottomBar button:hover{background:#24243e;color:#ddd}
#bottomBar button.active{background:#2a2a5a;border-color:#4a4aaa;color:#ccf}
#graphCanvas{width:100%;height:80px;border-radius:4px}
.ai-status{font-size:12px;color:#5a5;padding:4px 0}
.ai-status.off{color:#a55}
#tooltip{position:absolute;background:#1a1a2eee;border:1px solid #333;padding:6px 10px;border-radius:4px;font-size:12px;pointer-events:none;display:none;z-index:10}
.item-legend{display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0}
.item-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<div id="gameArea">
<canvas id="canvas"></canvas>
<canvas id="minimap" width="180" height="180"></canvas>
<div id="bottomBar">
<button id="btnSpeed1" class="active" onclick="setSpeed(1)">1x</button>
<button id="btnSpeed2" onclick="setSpeed(2)">2x</button>
<button id="btnSpeed5" onclick="setSpeed(5)">5x</button>
<span style="color:#555">|</span>
<button id="btnAI" class="active" onclick="toggleAI()">AI: ON</button>
<span style="color:#555">|</span>
<span>Circuits: <b id="circuitCount" style="color:#5f5">0</b></span>
<span style="margin-left:8px">Rate: <b id="circuitRate" style="color:#5f5">0</b>/min</span>
<span style="flex:1"></span>
<span style="color:#555;font-size:11px">WASD/Drag:Pan Scroll:Zoom RClick:Remove</span>
</div>
<div id="tooltip"></div>
</div>
<div id="rightPanel">
<div class="panel-section">
<h3>Buildings</h3>
<div id="palette"></div>
<div id="buildInfo" style="font-size:11px;color:#777;margin-top:6px">Select a building to place</div>
</div>
<div class="panel-section">
<h3>Production</h3>
<canvas id="graphCanvas" height="80"></canvas>
</div>
<div class="panel-section">
<h3>Stats</h3>
<div id="stats"></div>
</div>
<div class="panel-section">
<h3>Items</h3>
<div class="item-legend"><span class="item-dot" style="background:#888"></span> Iron Ore</div>
<div class="item-legend"><span class="item-dot" style="background:#d0862a"></span> Copper Ore</div>
<div class="item-legend"><span class="item-dot" style="background:#3ad"></span> Crystal</div>
<div class="item-legend"><span class="item-dot" style="background:#c0c0d0"></span> Iron Plate</div>
<div class="item-legend"><span class="item-dot" style="background:#daa520"></span> Wire</div>
<div class="item-legend"><span class="item-dot" style="background:#3c3"></span> Circuit</div>
</div>
<div class="panel-section">
<h3>AI Status</h3>
<div id="aiStatus" class="ai-status">Initializing...</div>
</div>
</div>

<script>
// ---- Constants ----
const GRID=60, CELL=32;
const DIR_R=0,DIR_D=1,DIR_L=2,DIR_U=3;
const DX=[1,0,-1,0], DY=[0,1,0,-1];
const ARROWS=['→','↓','←','↑'];

const ITEM_IRON=0,ITEM_COPPER=1,ITEM_CRYSTAL=2,ITEM_PLATE=3,ITEM_WIRE=4,ITEM_CIRCUIT=5;
const ITEM_NAMES=['Iron','Copper','Crystal','Plate','Wire','Circuit'];
const ITEM_COLORS=['#888','#d0862a','#3ad','#c0c0d0','#daa520','#3c3'];
const ITEM_RADIUS=[4,4,4,5,4,6];

const BUILD_NONE=0,BUILD_SOURCE=1,BUILD_BELT=2,BUILD_SMELTER=3,BUILD_WIREMILL=4,BUILD_ASSEMBLER=5,BUILD_STORAGE=6;
const BUILD_NAMES=['','Source','Belt','Smelter','Wire Mill','Assembler','Storage'];
const BUILD_ICONS=['','⛏','➡','🔥','⚡','🔧','📦'];
const BUILD_COLORS=['','#555','#3a3a50','#a33','#da5','#36a','#555'];

// ---- State ----
let grid=new Array(GRID*GRID).fill(0); // building type
let gridDir=new Array(GRID*GRID).fill(0); // direction for belts
let gridData=new Array(GRID*GRID).fill(null); // extra data per cell

let items=[]; // moving items on belts
let machines=[]; // machine state objects
let sources=[]; // source positions
let totalCircuits=0;
let circuitHistory=[]; // {time, count} for rate graph
let rateHistory=[]; // circuits/min samples
let gameTime=0;
let speedMul=1;
let aiEnabled=true;
let aiPhase=0, aiTimer=0, aiPlan=null;

// Camera
let camX=GRID*CELL/2, camY=GRID*CELL/2, camZoom=1.0;
let dragStart=null, camDragStart=null;
let keysDown={};

// Player build
let selectedBuild=0, selectedDir=0;
let hoverX=-1,hoverY=-1;

// Canvas
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const mmCanvas=document.getElementById('minimap');
const mmCtx=mmCanvas.getContext('2d');
const graphCanvas=document.getElementById('graphCanvas');
const graphCtx=graphCanvas.getContext('2d');

// ---- Audio ----
let audioCtx=null, masterGain=null;
let ambientNode=null, ambientGain=null;
let lastDingTime=0;

function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0.3;
  masterGain.connect(audioCtx.destination);
  // ambient hum
  ambientGain=audioCtx.createGain();
  ambientGain.gain.value=0.04;
  ambientGain.connect(masterGain);
  ambientNode=audioCtx.createOscillator();
  ambientNode.type='sawtooth';
  ambientNode.frequency.value=55;
  ambientNode.connect(ambientGain);
  ambientNode.start();
}
function playSound(type){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const g=audioCtx.createGain();
  g.connect(masterGain);
  const o=audioCtx.createOscillator();
  o.connect(g);
  if(type==='ding'){
    if(now-lastDingTime<0.08)return;
    lastDingTime=now;
    o.type='sine';o.frequency.value=880;
    g.gain.setValueAtTime(0.15,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
    o.start(now);o.stop(now+0.3);
  } else if(type==='place'){
    o.type='square';o.frequency.value=220;
    g.gain.setValueAtTime(0.1,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
    o.start(now);o.stop(now+0.1);
  } else if(type==='remove'){
    o.type='sawtooth';o.frequency.value=150;
    g.gain.setValueAtTime(0.08,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    o.start(now);o.stop(now+0.15);
  } else if(type==='process'){
    o.type='triangle';o.frequency.value=330;
    g.gain.setValueAtTime(0.06,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    o.start(now);o.stop(now+0.2);
  }
}

// ---- Grid helpers ----
function idx(x,y){return y*GRID+x;}
function inBounds(x,y){return x>=0&&x<GRID&&y>=0&&y<GRID;}
function getCell(x,y){return inBounds(x,y)?grid[idx(x,y)]:0;}
function setCell(x,y,type,dir,data){
  if(!inBounds(x,y))return false;
  const i=idx(x,y);
  if(grid[i]!==BUILD_NONE&&type!==BUILD_NONE)return false;
  grid[i]=type;gridDir[i]=dir||0;gridData[i]=data||null;
  if(type>=BUILD_SMELTER&&type<=BUILD_ASSEMBLER){
    machines.push({x,y,type,progress:0,processing:false,inputA:[],inputB:[],output:[],pulseTime:0});
  }
  if(type===BUILD_STORAGE){
    machines.push({x,y,type:BUILD_STORAGE,items:[],maxItems:20});
  }
  if(type===BUILD_SOURCE&&data){
    sources.push({x,y,resource:data.resource,timer:0,cooldown:1.5});
  }
  return true;
}
function removeCell(x,y){
  if(!inBounds(x,y))return;
  const i=idx(x,y);
  const t=grid[i];
  grid[i]=BUILD_NONE;gridDir[i]=0;gridData[i]=null;
  machines=machines.filter(m=>!(m.x===x&&m.y===y));
  sources=sources.filter(s=>!(s.x===x&&s.y===y));
  items=items.filter(it=>!(Math.floor(it.x)===x&&Math.floor(it.y)===y));
}

// ---- Init sources ----
function initSources(){
  const positions=[];
  // top/bottom edges
  for(let x=5;x<GRID-5;x+=8){
    positions.push({x,y:0,r:ITEM_IRON});
    positions.push({x:x+4,y:GRID-1,r:ITEM_COPPER});
  }
  // left/right edges
  for(let y=5;y<GRID-5;y+=8){
    positions.push({x:0,y,r:ITEM_COPPER});
    positions.push({x:GRID-1,y:y+4,r:ITEM_IRON});
  }
  // crystal corners
  [{x:0,y:0},{x:GRID-1,y:0},{x:0,y:GRID-1},{x:GRID-1,y:GRID-1}].forEach(p=>{
    positions.push({x:p.x,y:p.y,r:ITEM_CRYSTAL});
  });
  positions.forEach(p=>{
    setCell(p.x,p.y,BUILD_SOURCE,0,{resource:p.r});
  });
}

// ---- Item movement ----
function spawnItem(x,y,type){
  items.push({x:x+0.5,y:y+0.5,type,age:0});
}

function updateItems(dt){
  const speed=1.8*dt; // cells per second
  const toRemove=[];
  for(let i=0;i<items.length;i++){
    const it=items[i];
    it.age+=dt;
    const gx=Math.floor(it.x), gy=Math.floor(it.y);
    if(!inBounds(gx,gy)){toRemove.push(i);continue;}
    const ci=idx(gx,gy);
    const ct=grid[ci];
    if(ct===BUILD_BELT){
      const d=gridDir[ci];
      const tx=gx+0.5+DX[d]*0.5, ty=gy+0.5+DY[d]*0.5;
      const dx=tx-it.x, dy=ty-it.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<speed){
        // move to next cell
        const nx=gx+DX[d], ny=gy+DY[d];
        if(!inBounds(nx,ny)){toRemove.push(i);continue;}
        const nt=grid[idx(nx,ny)];
        if(nt===BUILD_BELT){
          it.x=nx+0.5-DX[gridDir[idx(nx,ny)]]*0.4;
          it.y=ny+0.5-DY[gridDir[idx(nx,ny)]]*0.4;
        } else if(nt>=BUILD_SMELTER&&nt<=BUILD_STORAGE){
          // try feed into machine
          const m=machines.find(m=>m.x===nx&&m.y===ny);
          if(m&&tryFeedMachine(m,it.type)){
            toRemove.push(i);
          } // else item stays at belt edge
        } else {
          // dead end, item just stops
          it.x=gx+0.5+DX[d]*0.45;
          it.y=gy+0.5+DY[d]*0.45;
        }
      } else {
        it.x+=dx/dist*speed;
        it.y+=dy/dist*speed;
      }
    } else if(ct>=BUILD_SMELTER&&ct<=BUILD_STORAGE){
      const m=machines.find(m=>m.x===gx&&m.y===gy);
      if(m&&tryFeedMachine(m,it.type)){
        toRemove.push(i);
      } else {
        toRemove.push(i); // can't feed, discard
      }
    } else if(ct===BUILD_SOURCE){
      // source output: find adjacent belt
      const s=sources.find(s=>s.x===gx&&s.y===gy);
      // move toward nearest belt
      let moved=false;
      for(let d=0;d<4;d++){
        const nx=gx+DX[d],ny=gy+DY[d];
        if(inBounds(nx,ny)&&grid[idx(nx,ny)]===BUILD_BELT){
          it.x=nx+0.5;it.y=ny+0.5;moved=true;break;
        }
      }
      if(!moved)toRemove.push(i);
    } else {
      toRemove.push(i); // on empty cell
    }
  }
  for(let i=toRemove.length-1;i>=0;i--) items.splice(toRemove[i],1);
}

function tryFeedMachine(m,itemType){
  if(m.type===BUILD_SMELTER){
    if(itemType===ITEM_IRON&&m.inputA.length<5){m.inputA.push(itemType);return true;}
  } else if(m.type===BUILD_WIREMILL){
    if(itemType===ITEM_COPPER&&m.inputA.length<5){m.inputA.push(itemType);return true;}
  } else if(m.type===BUILD_ASSEMBLER){
    if(itemType===ITEM_PLATE&&m.inputA.length<5){m.inputA.push(itemType);return true;}
    if(itemType===ITEM_WIRE&&m.inputB.length<5){m.inputB.push(itemType);return true;}
  } else if(m.type===BUILD_STORAGE){
    if(m.items.length<m.maxItems){m.items.push(itemType);return true;}
  }
  return false;
}

// ---- Machine processing ----
function updateMachines(dt){
  for(const m of machines){
    if(m.type===BUILD_STORAGE){
      // output to adjacent belt
      if(m.items.length>0){
        for(let d=0;d<4;d++){
          const nx=m.x+DX[d],ny=m.y+DY[d];
          if(inBounds(nx,ny)&&grid[idx(nx,ny)]===BUILD_BELT){
            // check if belt direction is away from storage
            const bd=gridDir[idx(nx,ny)];
            if(DX[bd]===DX[d]&&DY[bd]===DY[d]){
              // check no item already there
              const hasItem=items.some(it=>Math.floor(it.x)===nx&&Math.floor(it.y)===ny);
              if(!hasItem){
                spawnItem(nx,ny,m.items.shift());
                break;
              }
            }
          }
        }
      }
      continue;
    }
    if(m.processing){
      const ptime=m.type===BUILD_ASSEMBLER?3:2;
      m.progress+=dt/ptime;
      if(m.progress>=1){
        m.progress=0;m.processing=false;
        let outType=m.type===BUILD_SMELTER?ITEM_PLATE:m.type===BUILD_WIREMILL?ITEM_WIRE:ITEM_CIRCUIT;
        m.output.push(outType);
        m.pulseTime=0.4;
        if(outType===ITEM_CIRCUIT){totalCircuits++;circuitHistory.push({t:gameTime,c:totalCircuits});playSound('ding');}
        else playSound('process');
      }
    } else {
      // try start
      if(m.type===BUILD_SMELTER&&m.inputA.length>0){
        m.inputA.pop();m.processing=true;m.progress=0;
      } else if(m.type===BUILD_WIREMILL&&m.inputA.length>0){
        m.inputA.pop();m.processing=true;m.progress=0;
      } else if(m.type===BUILD_ASSEMBLER&&m.inputA.length>0&&m.inputB.length>0){
        m.inputA.pop();m.inputB.pop();m.processing=true;m.progress=0;
      }
    }
    // output to adjacent belt
    if(m.output.length>0){
      for(let d=0;d<4;d++){
        const nx=m.x+DX[d],ny=m.y+DY[d];
        if(inBounds(nx,ny)&&grid[idx(nx,ny)]===BUILD_BELT){
          const bd=gridDir[idx(nx,ny)];
          // belt should go away from machine
          if(DX[bd]===DX[d]&&DY[bd]===DY[d]){
            const hasItem=items.some(it=>Math.floor(it.x)===nx&&Math.floor(it.y)===ny);
            if(!hasItem){spawnItem(nx,ny,m.output.shift());break;}
          }
        }
      }
    }
    if(m.pulseTime>0)m.pulseTime-=dt;
  }
}

// ---- Sources ----
function updateSources(dt){
  for(const s of sources){
    s.timer+=dt;
    if(s.timer>=s.cooldown){
      s.timer=0;
      // spawn if adjacent belt exists and no item there
      for(let d=0;d<4;d++){
        const nx=s.x+DX[d],ny=s.y+DY[d];
        if(inBounds(nx,ny)&&grid[idx(nx,ny)]===BUILD_BELT){
          const hasItem=items.some(it=>Math.floor(it.x)===nx&&Math.floor(it.y)===ny);
          if(!hasItem){spawnItem(nx,ny,s.resource);break;}
        }
      }
    }
  }
}

// ---- AI Builder ----
let aiHighlight=null, aiHighlightTime=0;
let aiActionQueue=[];
let aiWaitTimer=0;
let aiBuildCount=0;

function placeBelt(x,y,dir){
  if(setCell(x,y,BUILD_BELT,dir)){playSound('place');highlightAI(x,y);return true;}
  return false;
}
function placeMachine(x,y,type){
  if(setCell(x,y,type)){playSound('place');highlightAI(x,y);return true;}
  return false;
}
function highlightAI(x,y){aiHighlight={x,y};aiHighlightTime=0.5;}

function buildBeltPath(x1,y1,x2,y2){
  // L-shaped path: horizontal then vertical, with correct direction at each cell
  const acts=[];
  const cells=[];
  let cx=x1,cy=y1;
  cells.push({x:cx,y:cy});
  while(cx!==x2){cx+=cx<x2?1:-1;cells.push({x:cx,y:cy});}
  while(cy!==y2){cy+=cy<y2?1:-1;cells.push({x:cx,y:cy});}
  for(let i=0;i<cells.length;i++){
    const c=cells[i];
    // direction: toward next cell, or same as prev if last
    let d=DIR_R;
    if(i<cells.length-1){
      const n=cells[i+1];
      if(n.x>c.x)d=DIR_R;else if(n.x<c.x)d=DIR_L;
      else if(n.y>c.y)d=DIR_D;else d=DIR_U;
    } else if(i>0){
      const p=cells[i-1];
      if(c.x>p.x)d=DIR_R;else if(c.x<p.x)d=DIR_L;
      else if(c.y>p.y)d=DIR_D;else d=DIR_U;
    }
    if(inBounds(c.x,c.y)&&getCell(c.x,c.y)===BUILD_NONE)
      acts.push({type:'belt',x:c.x,y:c.y,dir:d});
  }
  return acts;
}

function findNearestSource(cx,cy,resourceType){
  let best=null,bestD=Infinity;
  for(const s of sources){
    if(s.resource===resourceType){
      const d=Math.abs(s.x-cx)+Math.abs(s.y-cy);
      if(d<bestD){bestD=d;best=s;}
    }
  }
  return best;
}

function findEmptyNear(cx,cy,minDist){
  for(let r=minDist||2;r<15;r++){
    for(let dx=-r;dx<=r;dx++){
      for(let dy=-r;dy<=r;dy++){
        if(Math.abs(dx)+Math.abs(dy)!==r)continue;
        const x=cx+dx,y=cy+dy;
        if(inBounds(x,y)&&getCell(x,y)===BUILD_NONE)return{x,y};
      }
    }
  }
  return null;
}

function findEmptyBlock(cx,cy,w,h){
  // find wxh empty block near cx,cy
  for(let r=0;r<20;r++){
    for(let dx=-r;dx<=r;dx++){
      for(let dy=-r;dy<=r;dy++){
        const sx=cx+dx,sy=cy+dy;
        let ok=true;
        for(let bx=0;bx<w&&ok;bx++)
          for(let by=0;by<h&&ok;by++)
            if(!inBounds(sx+bx,sy+by)||getCell(sx+bx,sy+by)!==BUILD_NONE) ok=false;
        if(ok)return{x:sx,y:sy};
      }
    }
  }
  return null;
}

function countMachines(type){return machines.filter(m=>m.type===type).length;}

function aiThink(){
  const smelters=countMachines(BUILD_SMELTER);
  const wireMills=countMachines(BUILD_WIREMILL);
  const assemblers=countMachines(BUILD_ASSEMBLER);

  // Phase 0: Build initial factory
  if(smelters===0){
    return aiPlanProductionLine(GRID/2, GRID/2);
  }
  // Phase 1+: expand based on bottleneck
  // Check which machine outputs are bottlenecked
  const smelterBusy=machines.filter(m=>m.type===BUILD_SMELTER&&m.processing).length;
  const wmBusy=machines.filter(m=>m.type===BUILD_WIREMILL&&m.processing).length;
  const asmWaiting=machines.filter(m=>m.type===BUILD_ASSEMBLER&&!m.processing&&(m.inputA.length===0||m.inputB.length===0)).length;

  if(assemblers===0||(assemblers<smelters&&assemblers<wireMills)){
    return aiPlanAssembler();
  }
  if(smelters<=wireMills&&smelters<assemblers*2){
    return aiPlanSmelter();
  }
  if(wireMills<smelters&&wireMills<assemblers*2){
    return aiPlanWireMill();
  }
  // add another full line
  return aiPlanProductionLine(GRID/2+Math.random()*20-10|0, GRID/2+Math.random()*20-10|0);
}

function aiPlanProductionLine(cx,cy){
  const acts=[];
  const block=findEmptyBlock(cx,cy,12,7);
  if(!block)return[];
  const bx=block.x, by=block.y;

  // Layout:
  // Row by+1: [input belts] -> Smelter(bx+4) -> [output belts] ->
  // Row by+3: [input belts] -> WireMill(bx+4) -> [output belts] ->  Assembler(bx+8) -> [output]
  // Smelter output goes right then down to assembler
  // WireMill output goes right to assembler

  const smX=bx+4, smY=by+1;
  const wmX=bx+4, wmY=by+4;
  const asX=bx+8, asY=by+2;

  acts.push({type:'machine',x:smX,y:smY,mtype:BUILD_SMELTER});
  acts.push({type:'machine',x:wmX,y:wmY,mtype:BUILD_WIREMILL});
  acts.push({type:'machine',x:asX,y:asY,mtype:BUILD_ASSEMBLER});

  // Iron source -> smelter input belt chain
  const ironSrc=findNearestSource(bx,smY,ITEM_IRON);
  if(ironSrc){
    // belt adjacent to source pointing inward
    let sx=ironSrc.x,sy=ironSrc.y;
    let startD, startX, startY;
    if(sx===0){startX=1;startY=sy;startD=DIR_R;}
    else if(sx===GRID-1){startX=GRID-2;startY=sy;startD=DIR_L;}
    else if(sy===0){startX=sx;startY=1;startD=DIR_D;}
    else{startX=sx;startY=sy-1;startD=DIR_U;}
    if(getCell(startX,startY)===BUILD_NONE)
      acts.push({type:'belt',x:startX,y:startY,dir:startD});
    // path from start to one cell before smelter
    acts.push(...buildBeltPath(startX+(startD===DIR_R?1:startD===DIR_L?-1:0),
                                startY+(startD===DIR_D?1:startD===DIR_U?-1:0),
                                smX-1,smY));
    // final belt into smelter
    if(getCell(smX-1,smY)===BUILD_NONE)
      acts.push({type:'belt',x:smX-1,y:smY,dir:DIR_R});
  }

  // Smelter output -> assembler: right then down-right
  acts.push({type:'belt',x:smX+1,y:smY,dir:DIR_R});
  acts.push({type:'belt',x:smX+2,y:smY,dir:DIR_R});
  acts.push({type:'belt',x:smX+3,y:smY,dir:DIR_D});
  acts.push({type:'belt',x:smX+3,y:asY,dir:DIR_R});

  // Copper source -> wire mill
  const copperSrc=findNearestSource(bx,wmY,ITEM_COPPER);
  if(copperSrc){
    let sx=copperSrc.x,sy=copperSrc.y;
    let startD, startX, startY;
    if(sx===0){startX=1;startY=sy;startD=DIR_R;}
    else if(sx===GRID-1){startX=GRID-2;startY=sy;startD=DIR_L;}
    else if(sy===0){startX=sx;startY=1;startD=DIR_D;}
    else{startX=sx;startY=sy-1;startD=DIR_U;}
    if(getCell(startX,startY)===BUILD_NONE)
      acts.push({type:'belt',x:startX,y:startY,dir:startD});
    acts.push(...buildBeltPath(startX+(startD===DIR_R?1:startD===DIR_L?-1:0),
                                startY+(startD===DIR_D?1:startD===DIR_U?-1:0),
                                wmX-1,wmY));
    if(getCell(wmX-1,wmY)===BUILD_NONE)
      acts.push({type:'belt',x:wmX-1,y:wmY,dir:DIR_R});
  }

  // WireMill output -> assembler: right, up to assembler row, right
  acts.push({type:'belt',x:wmX+1,y:wmY,dir:DIR_R});
  acts.push({type:'belt',x:wmX+2,y:wmY,dir:DIR_U});
  acts.push({type:'belt',x:wmX+2,y:wmY-1,dir:DIR_U});
  // wmX+2 = bx+6, asY = by+2, wmY-2 = by+2 = asY (since wmY=by+4)
  // so belt at bx+6,by+2 goes right to assembler at bx+8
  acts.push({type:'belt',x:wmX+2,y:asY,dir:DIR_R});

  // Assembler output
  acts.push({type:'belt',x:asX+1,y:asY,dir:DIR_R});
  acts.push({type:'belt',x:asX+2,y:asY,dir:DIR_R});

  // Filter out acts on occupied cells or out of bounds
  return acts.filter(a=>inBounds(a.x,a.y));
}

function aiPlanSmelter(){
  const acts=[];
  // find an assembler that's starved for plates
  const starved=machines.find(m=>m.type===BUILD_ASSEMBLER&&m.inputA.length<2);
  if(!starved)return aiPlanProductionLine(GRID/2+Math.random()*16-8|0,GRID/2+Math.random()*16-8|0);
  const pos=findEmptyNear(starved.x-4,starved.y,2);
  if(!pos)return[];
  acts.push({type:'machine',x:pos.x,y:pos.y,mtype:BUILD_SMELTER});
  // connect iron source
  const src=findNearestSource(pos.x,pos.y,ITEM_IRON);
  if(src){
    const start=src.x===0?{x:1,y:src.y}:src.x===GRID-1?{x:GRID-2,y:src.y}:src.y===0?{x:src.x,y:1}:{x:src.x,y:src.y-1};
    if(getCell(start.x,start.y)===BUILD_NONE){
      const d=src.x===0?DIR_R:src.x===GRID-1?DIR_L:src.y===0?DIR_D:DIR_U;
      acts.push({type:'belt',x:start.x,y:start.y,dir:d});
    }
    acts.push(...buildBeltPath(start.x+(start.x<pos.x?1:-1),start.y,pos.x-1,pos.y));
    acts.push({type:'belt',x:pos.x-1,y:pos.y,dir:DIR_R});
  }
  // output belt toward assembler
  const path=buildBeltPath(pos.x+1,pos.y,starved.x-1,starved.y);
  acts.push(...path);
  acts.push({type:'belt',x:starved.x-1,y:starved.y,dir:DIR_R});
  return acts;
}

function aiPlanWireMill(){
  const acts=[];
  const starved=machines.find(m=>m.type===BUILD_ASSEMBLER&&m.inputB.length<2);
  if(!starved)return aiPlanProductionLine(GRID/2+Math.random()*16-8|0,GRID/2+Math.random()*16-8|0);
  const pos=findEmptyNear(starved.x-4,starved.y+2,2);
  if(!pos)return[];
  acts.push({type:'machine',x:pos.x,y:pos.y,mtype:BUILD_WIREMILL});
  const src=findNearestSource(pos.x,pos.y,ITEM_COPPER);
  if(src){
    const start=src.x===0?{x:1,y:src.y}:src.x===GRID-1?{x:GRID-2,y:src.y}:src.y===0?{x:src.x,y:1}:{x:src.x,y:src.y-1};
    if(getCell(start.x,start.y)===BUILD_NONE){
      const d=src.x===0?DIR_R:src.x===GRID-1?DIR_L:src.y===0?DIR_D:DIR_U;
      acts.push({type:'belt',x:start.x,y:start.y,dir:d});
    }
    acts.push(...buildBeltPath(start.x+(start.x<pos.x?1:-1),start.y,pos.x-1,pos.y));
    acts.push({type:'belt',x:pos.x-1,y:pos.y,dir:DIR_R});
  }
  const path=buildBeltPath(pos.x+1,pos.y,starved.x-1,starved.y);
  acts.push(...path);
  return acts;
}

function aiPlanAssembler(){
  const acts=[];
  // find area with plates and wires flowing
  const cx=GRID/2+Math.random()*10-5|0, cy=GRID/2+Math.random()*10-5|0;
  const pos=findEmptyNear(cx,cy,3);
  if(!pos)return[];
  acts.push({type:'machine',x:pos.x,y:pos.y,mtype:BUILD_ASSEMBLER});
  // output belt
  if(inBounds(pos.x+1,pos.y)&&getCell(pos.x+1,pos.y)===BUILD_NONE)
    acts.push({type:'belt',x:pos.x+1,y:pos.y,dir:DIR_R});
  return acts;
}

function updateAI(dt){
  if(!aiEnabled)return;
  aiHighlightTime-=dt;

  if(aiActionQueue.length>0){
    aiWaitTimer-=dt;
    if(aiWaitTimer<=0){
      const act=aiActionQueue.shift();
      if(act.type==='belt'){
        placeBelt(act.x,act.y,act.dir);
      } else if(act.type==='machine'){
        placeMachine(act.x,act.y,act.mtype);
      }
      aiWaitTimer=0.15/speedMul;
      aiBuildCount++;
      updateAIStatus();
    }
    return;
  }

  // Think every few seconds
  aiTimer-=dt;
  if(aiTimer<=0){
    aiTimer=3+Math.random()*4;
    const plan=aiThink();
    if(plan&&plan.length>0){
      aiActionQueue=plan;
      aiWaitTimer=0.5;
    }
  }
}

function updateAIStatus(){
  const el=document.getElementById('aiStatus');
  if(!aiEnabled){el.textContent='AI Disabled';el.className='ai-status off';return;}
  if(aiActionQueue.length>0){
    el.textContent=`Building... (${aiActionQueue.length} actions left)`;
  } else {
    const s=countMachines(BUILD_SMELTER),w=countMachines(BUILD_WIREMILL),a=countMachines(BUILD_ASSEMBLER);
    el.textContent=`Planning... S:${s} W:${w} A:${a}`;
  }
  el.className='ai-status';
}

// ---- Rendering ----
function resize(){
  canvas.width=canvas.parentElement.clientWidth;
  canvas.height=canvas.parentElement.clientHeight-40;
  graphCanvas.width=graphCanvas.parentElement.clientWidth-20;
}

function worldToScreen(wx,wy){
  const cx=canvas.width/2, cy=canvas.height/2;
  return{x:(wx-camX)*camZoom+cx, y:(wy-camY)*camZoom+cy};
}
function screenToWorld(sx,sy){
  const cx=canvas.width/2, cy=canvas.height/2;
  return{x:(sx-cx)/camZoom+camX, y:(sy-cy)/camZoom+camY};
}

function render(){
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#08080f';
  ctx.fillRect(0,0,W,H);

  const tl=screenToWorld(0,0);
  const br=screenToWorld(W,H);
  const x0=Math.max(0,Math.floor(tl.x/CELL)-1);
  const y0=Math.max(0,Math.floor(tl.y/CELL)-1);
  const x1=Math.min(GRID,Math.ceil(br.x/CELL)+1);
  const y1=Math.min(GRID,Math.ceil(br.y/CELL)+1);

  ctx.save();
  const cx=W/2, cy=H/2;
  ctx.translate(cx,cy);
  ctx.scale(camZoom,camZoom);
  ctx.translate(-camX,-camY);

  // Grid lines
  ctx.strokeStyle='#151525';
  ctx.lineWidth=0.5;
  for(let x=x0;x<=x1;x++){
    ctx.beginPath();ctx.moveTo(x*CELL,y0*CELL);ctx.lineTo(x*CELL,y1*CELL);ctx.stroke();
  }
  for(let y=y0;y<=y1;y++){
    ctx.beginPath();ctx.moveTo(x0*CELL,y*CELL);ctx.lineTo(x1*CELL,y*CELL);ctx.stroke();
  }

  // Buildings
  for(let gy=y0;gy<y1;gy++){
    for(let gx=x0;gx<x1;gx++){
      const i=idx(gx,gy);
      const t=grid[i];
      if(t===BUILD_NONE)continue;
      const px=gx*CELL, py=gy*CELL;

      if(t===BUILD_SOURCE){
        const s=sources.find(s=>s.x===gx&&s.y===gy);
        ctx.fillStyle=s?ITEM_COLORS[s.resource]+'44':'#33333366';
        ctx.fillRect(px+1,py+1,CELL-2,CELL-2);
        ctx.strokeStyle=s?ITEM_COLORS[s.resource]:'#555';
        ctx.lineWidth=1.5;
        ctx.strokeRect(px+2,py+2,CELL-4,CELL-4);
        // icon
        ctx.fillStyle=s?ITEM_COLORS[s.resource]:'#888';
        ctx.font='14px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('⛏',px+CELL/2,py+CELL/2);
      } else if(t===BUILD_BELT){
        const d=gridDir[i];
        ctx.fillStyle='#1a1a2e';
        ctx.fillRect(px+1,py+1,CELL-2,CELL-2);
        // animated arrows
        ctx.fillStyle='#2a2a44';
        const phase=(gameTime*3+gx*0.3+gy*0.3)%1;
        for(let a=0;a<3;a++){
          const p=(phase+a/3)%1;
          const ax=px+CELL/2+DX[d]*(p-0.5)*CELL*0.8;
          const ay=py+CELL/2+DY[d]*(p-0.5)*CELL*0.8;
          ctx.beginPath();
          ctx.moveTo(ax+DX[d]*4,ay+DY[d]*4);
          ctx.lineTo(ax-DX[d]*2+DY[d]*3,ay-DY[d]*2+DX[d]*3);
          ctx.lineTo(ax-DX[d]*2-DY[d]*3,ay-DY[d]*2-DX[d]*3);
          ctx.fill();
        }
      } else if(t>=BUILD_SMELTER&&t<=BUILD_ASSEMBLER){
        const m=machines.find(m=>m.x===gx&&m.y===gy);
        let baseColor=BUILD_COLORS[t];
        if(m&&m.pulseTime>0){
          ctx.fillStyle='#ffffff'+Math.floor(m.pulseTime*200).toString(16).padStart(2,'0');
          ctx.fillRect(px-2,py-2,CELL+4,CELL+4);
        }
        ctx.fillStyle=baseColor+'cc';
        ctx.fillRect(px+1,py+1,CELL-2,CELL-2);
        ctx.strokeStyle=baseColor;
        ctx.lineWidth=1.5;
        ctx.strokeRect(px+2,py+2,CELL-4,CELL-4);
        // processing bar
        if(m&&m.processing){
          ctx.fillStyle='#fff3';
          ctx.fillRect(px+3,py+CELL-6,Math.floor((CELL-6)*m.progress),3);
        }
        // icon
        ctx.fillStyle='#fff';
        ctx.font='14px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(BUILD_ICONS[t],px+CELL/2,py+CELL/2-2);
        // input/output indicators
        if(m){
          const inCount=(m.inputA?m.inputA.length:0)+(m.inputB?m.inputB.length:0);
          const outCount=m.output?m.output.length:0;
          if(inCount>0){
            ctx.fillStyle='#aaa';ctx.font='8px sans-serif';
            ctx.fillText('in:'+inCount,px+CELL/2,py+CELL-3);
          }
        }
        // spin animation for active machines
        if(m&&m.processing){
          ctx.save();
          ctx.translate(px+CELL/2,py+CELL/2);
          ctx.rotate(gameTime*3);
          ctx.strokeStyle='#fff3';ctx.lineWidth=1;
          ctx.beginPath();ctx.arc(0,0,CELL/2-4,0,Math.PI*0.5);ctx.stroke();
          ctx.restore();
        }
      } else if(t===BUILD_STORAGE){
        const m=machines.find(m=>m.x===gx&&m.y===gy);
        ctx.fillStyle='#222238';
        ctx.fillRect(px+1,py+1,CELL-2,CELL-2);
        ctx.strokeStyle='#444';ctx.lineWidth=1;
        ctx.strokeRect(px+2,py+2,CELL-4,CELL-4);
        if(m){
          const fill=m.items.length/m.maxItems;
          ctx.fillStyle='#3a3a5a';
          ctx.fillRect(px+4,py+CELL-4-fill*(CELL-8),CELL-8,fill*(CELL-8));
        }
        ctx.fillStyle='#888';ctx.font='12px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('📦',px+CELL/2,py+CELL/2);
      }
    }
  }

  // Items
  for(const it of items){
    const sx=it.x*CELL, sy=it.y*CELL;
    if(sx<tl.x-CELL||sx>br.x+CELL||sy<tl.y-CELL||sy>br.y+CELL)continue;
    ctx.fillStyle=ITEM_COLORS[it.type];
    ctx.beginPath();
    ctx.arc(sx,sy,ITEM_RADIUS[it.type],0,Math.PI*2);
    ctx.fill();
    // slight glow
    ctx.fillStyle=ITEM_COLORS[it.type]+'33';
    ctx.beginPath();
    ctx.arc(sx,sy,ITEM_RADIUS[it.type]+2,0,Math.PI*2);
    ctx.fill();
  }

  // AI highlight
  if(aiHighlight&&aiHighlightTime>0){
    ctx.strokeStyle=`rgba(100,100,255,${aiHighlightTime*2})`;
    ctx.lineWidth=2;
    ctx.strokeRect(aiHighlight.x*CELL-1,aiHighlight.y*CELL-1,CELL+2,CELL+2);
  }

  // Hover preview
  if(selectedBuild>0&&hoverX>=0&&hoverY>=0&&getCell(hoverX,hoverY)===BUILD_NONE){
    ctx.fillStyle='#ffffff22';
    ctx.fillRect(hoverX*CELL,hoverY*CELL,CELL,CELL);
    ctx.strokeStyle='#6666ff88';ctx.lineWidth=1;
    ctx.strokeRect(hoverX*CELL,hoverY*CELL,CELL,CELL);
    if(selectedBuild===BUILD_BELT){
      ctx.fillStyle='#aaf';ctx.font='16px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(ARROWS[selectedDir],hoverX*CELL+CELL/2,hoverY*CELL+CELL/2);
    }
  }

  ctx.restore();

  // Item count
  ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.textAlign='left';
  ctx.fillText(`Items: ${items.length}`,10,20);
}

function renderMinimap(){
  const S=180, cs=S/GRID;
  mmCtx.fillStyle='#0a0a12';
  mmCtx.fillRect(0,0,S,S);
  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){
      const t=grid[idx(x,y)];
      if(t===BUILD_NONE)continue;
      mmCtx.fillStyle=t===BUILD_SOURCE?'#555':t===BUILD_BELT?'#222':BUILD_COLORS[t]||'#333';
      mmCtx.fillRect(x*cs,y*cs,Math.max(cs,1.5),Math.max(cs,1.5));
    }
  }
  // camera view rect
  const tl=screenToWorld(0,0);
  const br=screenToWorld(canvas.width,canvas.height);
  mmCtx.strokeStyle='#66f';mmCtx.lineWidth=1;
  mmCtx.strokeRect(tl.x/CELL*cs,tl.y/CELL*cs,(br.x-tl.x)/CELL*cs,(br.y-tl.y)/CELL*cs);
}

function renderGraph(){
  const W=graphCanvas.width, H=80;
  graphCtx.fillStyle='#0a0a14';
  graphCtx.fillRect(0,0,W,H);

  // compute rate over last 120s in 5s buckets
  const now=gameTime;
  const buckets=24;
  const bw=5;
  const rates=[];
  for(let i=0;i<buckets;i++){
    const t0=now-(buckets-i)*bw, t1=t0+bw;
    const c0=circuitHistory.filter(h=>h.t<=t0).length>0?circuitHistory.filter(h=>h.t<=t0).pop().c:0;
    const c1=circuitHistory.filter(h=>h.t<=t1).length>0?circuitHistory.filter(h=>h.t<=t1).pop().c:0;
    rates.push((c1-c0)/bw*60);
  }
  const maxR=Math.max(1,...rates);
  graphCtx.strokeStyle='#3c3';graphCtx.lineWidth=1.5;
  graphCtx.beginPath();
  for(let i=0;i<buckets;i++){
    const x=i/(buckets-1)*W;
    const y=H-4-(rates[i]/maxR)*(H-8);
    i===0?graphCtx.moveTo(x,y):graphCtx.lineTo(x,y);
  }
  graphCtx.stroke();
  // fill
  graphCtx.lineTo(W,H);graphCtx.lineTo(0,H);
  graphCtx.fillStyle='#3c322210';
  graphCtx.fill();
  // label
  graphCtx.fillStyle='#5a5';graphCtx.font='10px sans-serif';graphCtx.textAlign='right';
  graphCtx.fillText(maxR.toFixed(1)+'/min',W-4,12);
}

function updateStats(){
  const s=countMachines(BUILD_SMELTER),w=countMachines(BUILD_WIREMILL),a=countMachines(BUILD_ASSEMBLER),st=countMachines(BUILD_STORAGE);
  const beltCount=grid.filter(g=>g===BUILD_BELT).length;
  const html=`
    <div class="stat-row"><span>Smelters</span><span class="stat-val">${s}</span></div>
    <div class="stat-row"><span>Wire Mills</span><span class="stat-val">${w}</span></div>
    <div class="stat-row"><span>Assemblers</span><span class="stat-val">${a}</span></div>
    <div class="stat-row"><span>Storage</span><span class="stat-val">${st}</span></div>
    <div class="stat-row"><span>Belts</span><span class="stat-val">${beltCount}</span></div>
    <div class="stat-row"><span>Items</span><span class="stat-val">${items.length}</span></div>
    <div class="stat-row"><span>Total Circuits</span><span class="stat-val" style="color:#3c3">${totalCircuits}</span></div>
  `;
  document.getElementById('stats').innerHTML=html;

  // circuit rate
  const now=gameTime;
  const recent=circuitHistory.filter(h=>h.t>now-60);
  const rate=recent.length>0?(recent[recent.length-1].c-(circuitHistory.find(h=>h.t<=now-60)||{c:0}).c):0;
  document.getElementById('circuitCount').textContent=totalCircuits;
  document.getElementById('circuitRate').textContent=(rate).toFixed(1);
}

function initPalette(){
  const pal=document.getElementById('palette');
  const buildable=[
    {t:BUILD_BELT,icon:'➡',name:'Belt (R to rotate)'},
    {t:BUILD_SMELTER,icon:'🔥',name:'Smelter (Iron→Plate)'},
    {t:BUILD_WIREMILL,icon:'⚡',name:'Wire Mill (Copper→Wire)'},
    {t:BUILD_ASSEMBLER,icon:'🔧',name:'Assembler (Plate+Wire→Circuit)'},
    {t:BUILD_STORAGE,icon:'📦',name:'Storage (Buffer)'},
  ];
  buildable.forEach(b=>{
    const btn=document.createElement('div');
    btn.className='palette-btn';
    btn.textContent=b.icon;
    btn.title=b.name;
    btn.onclick=()=>{
      selectedBuild=selectedBuild===b.t?0:b.t;

    };
    pal.appendChild(btn);
  });
}

// ---- Input ----
function initInput(){
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const w=screenToWorld(mx,my);
    hoverX=Math.floor(w.x/CELL);
    hoverY=Math.floor(w.y/CELL);
    if(dragStart){
      camX-=(e.clientX-dragStart.x)/camZoom;
      camY-=(e.clientY-dragStart.y)/camZoom;
      dragStart={x:e.clientX,y:e.clientY};
    }
  });
  canvas.addEventListener('mousedown',e=>{
    if(e.button===1||(e.button===0&&selectedBuild===0)){
      dragStart={x:e.clientX,y:e.clientY};
      return;
    }
    if(e.button===0&&selectedBuild>0){
      if(hoverX>=0&&hoverY>=0&&inBounds(hoverX,hoverY)){
        if(getCell(hoverX,hoverY)===BUILD_NONE){
          if(selectedBuild===BUILD_BELT){
            setCell(hoverX,hoverY,BUILD_BELT,selectedDir);
          } else {
            setCell(hoverX,hoverY,selectedBuild);
          }
          playSound('place');
        }
      }
    }
    if(e.button===2){
      e.preventDefault();
      if(hoverX>=0&&hoverY>=0&&inBounds(hoverX,hoverY)){
        const t=getCell(hoverX,hoverY);
        if(t!==BUILD_NONE&&t!==BUILD_SOURCE){
          removeCell(hoverX,hoverY);
          playSound('remove');
        }
      }
    }
  });
  canvas.addEventListener('mouseup',()=>{dragStart=null;});
  canvas.addEventListener('mouseleave',()=>{dragStart=null;hoverX=-1;hoverY=-1;});
  canvas.addEventListener('contextmenu',e=>e.preventDefault());
  canvas.addEventListener('wheel',e=>{
    const zf=e.deltaY>0?0.9:1.1;
    camZoom=Math.max(0.3,Math.min(3,camZoom*zf));
  });

  window.addEventListener('keydown',e=>{
    keysDown[e.key]=true;
    if(e.key==='r'||e.key==='R'){
      selectedDir=(selectedDir+1)%4;
    }
    if(e.key==='Escape'){
      selectedBuild=0;selectedDir=0;
      document.querySelectorAll('.palette-btn').forEach(e=>e.classList.remove('selected'));
      document.getElementById('buildInfo').textContent='Select a building to place';
    }
  });
  window.addEventListener('keyup',e=>{keysDown[e.key]=false;});
}

function updateCamera(dt){
  const spd=400*dt/camZoom;
  if(keysDown['w']||keysDown['W']||keysDown['ArrowUp'])camY-=spd;
  if(keysDown['s']||keysDown['S']||keysDown['ArrowDown'])camY+=spd;
  if(keysDown['a']||keysDown['A']||keysDown['ArrowLeft'])camX-=spd;
  if(keysDown['d']||keysDown['D']||keysDown['ArrowRight'])camX+=spd;
}

// ---- Speed / AI toggle ----
window.setSpeed=function(s){
  speedMul=s;
  document.querySelectorAll('#bottomBar button[id^=btnSpeed]').forEach(b=>b.classList.remove('active'));
  document.getElementById('btnSpeed'+s).classList.add('active');
};
window.toggleAI=function(){
  aiEnabled=!aiEnabled;
  const btn=document.getElementById('btnAI');
  btn.textContent='AI: '+(aiEnabled?'ON':'OFF');
  btn.classList.toggle('active',aiEnabled);
  updateAIStatus();
};

// ---- Main loop ----
const TICK=1/60;
let accumulator=0, lastTime=0, frameCount=0;

function gameLoop(timestamp){
  if(!lastTime)lastTime=timestamp;
  let dt=(timestamp-lastTime)/1000;
  lastTime=timestamp;
  if(dt>0.1)dt=0.1; // cap

  accumulator+=dt*speedMul;

  while(accumulator>=TICK){
    gameTime+=TICK;
    updateSources(TICK);
    updateItems(TICK);
    updateMachines(TICK);
    updateAI(TICK);
    updateCamera(TICK);
    accumulator-=TICK;
  }

  render();
  frameCount++;
  if(frameCount%30===0){
    renderMinimap();
    renderGraph();
    updateStats();
    updateAIStatus();
  }

  requestAnimationFrame(gameLoop);
}

// ---- Init ----
function init(){
  resize();
  window.addEventListener('resize',resize);
  initPalette();
  initInput();
  initSources();
  canvas.addEventListener('click',()=>{if(!audioCtx)initAudio();},{once:true});
  requestAnimationFrame(gameLoop);
}

init();
</script>
</body>
